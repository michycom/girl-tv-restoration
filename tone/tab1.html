<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Tab Viewer</title>
</head>
<body>
    <h1>Guitar Tab for A4</h1>
    <script>
        const TUNING = ['E2', 'A2', 'D3', 'G3', 'B3', 'E4'];
        function findPosition(note) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const noteIndex = notes.indexOf(note.slice(0, -1));
            const octave = parseInt(note.slice(-1), 10);

            for (let string = 0; string < TUNING.length; string++) {
                const stringNote = TUNING[string];
                const stringNoteIndex = notes.indexOf(stringNote.slice(0, -1));
                const stringOctave = parseInt(stringNote.slice(-1), 10);
                let fret = (noteIndex - stringNoteIndex) + 12 * (octave - stringOctave);
                if (fret >= 0 && fret <= 24) {
                    return { string: string + 1, fret };
                }
            }
            return null;
        }

        function guitarTabDrawer(note) {
            const position = findPosition(note);
            if (!position) {
                console.error('Note out of range');
                return;
            }

            const { string, fret } = position;
            const svgWidth = 300, svgHeight = 600, stringSpacing = 40, fretSpacing = 25;
            let svgContent = `<svg width="${svgWidth}" height="${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;

            // Draw fretboard
            svgContent += `<rect x="0" y="0" width="${svgWidth}" height="${svgHeight}" fill="#964B00" />`;

            // Draw strings
            for (let i = 0; i < 6; i++) {
                svgContent += `<line x1="${i * stringSpacing + 30}" y1="10" x2="${i * stringSpacing + 30}" y2="${svgHeight - 10}" stroke="black" stroke-width="2" />`;
            }

            // Draw frets
            for (let j = 0; j <= 24; j++) {
                svgContent += `<line x1="0" y1="${j * fretSpacing + 10}" x2="${svgWidth}" y2="${j * fretSpacing + 10}" stroke="grey" />`;
            }

            // Draw fret markers
            const markers = [3, 5, 7, 9, 12, 15, 17, 19, 21, 24];
            markers.forEach(marker => {
                if (marker === 12 || marker === 24) {
                    svgContent += `<circle cx="20" cy="${marker * fretSpacing - fretSpacing/2 + 10}" r="5" fill="white" />`;
                    svgContent += `<circle cx="80" cy="${marker * fretSpacing - fretSpacing/2 + 10}" r="5" fill="white" />`;
                } else {
                    svgContent += `<circle cx="50" cy="${marker * fretSpacing - fretSpacing/2 + 10}" r="5" fill="white" />`;
                }
            });

            // Draw the note position
            svgContent += `<circle cx="${(string - 1) * stringSpacing + 30}" cy="${fret * fretSpacing + 10}" r="10" fill="red" />`;
            svgContent += '</svg>';

            document.body.innerHTML += svgContent;
        }

        guitarTabDrawer("A2");
    </script>
</body>
</html>
