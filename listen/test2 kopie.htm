<div id="note">Note will be displayed here</div>
<canvas id="sineWave"  style="border:0 solid black;width:100%;height:50%;"></canvas>


<script>

window.AudioContext = window.AudioContext || window.webkitAudioContext;

var audioContext = new AudioContext();
var analyser = audioContext.createAnalyser();
var isAnalyzing = false;
var mediaStreamSource = null;
var noteElem = document.getElementById("note"); // Ensure you have an element with id="note" in your HTML
var canvasElem = document.getElementById("sineWave"); // Ensure you have a canvas element with id="sineWave" in your HTML
var canvasContext = canvasElem.getContext("2d");
var buflen = 2048;
var buf = new Float32Array(buflen);
var WIDTH = canvasElem.width;
var HEIGHT = canvasElem.height;

var noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

function noteFromPitch(frequency) {
    var noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
    return Math.round(noteNum) + 69;
}

function frequencyFromNoteNumber(note) {
    return 440 * Math.pow(2, (note - 69) / 12);
}

function autoCorrelate(buf, sampleRate) {
    var SIZE = buf.length;
    var rms = 0;

    for (var i = 0; i < SIZE; i++) {
        var val = buf[i];
        rms += val * val;
    }
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.01) return -1;

    var r1 = 0,
        r2 = SIZE - 1,
        thres = 0.2;
    for (var i = 0; i < SIZE / 2; i++)
        if (Math.abs(buf[i]) < thres) {
            r1 = i;
            break;
        }
    for (var i = 1; i < SIZE / 2; i++)
        if (Math.abs(buf[SIZE - i]) < thres) {
            r2 = SIZE - i;
            break;
        }

    buf = buf.slice(r1, r2);
    SIZE = buf.length;

    var c = new Array(SIZE).fill(0);
    for (var i = 0; i < SIZE; i++)
        for (var j = 0; j < SIZE - i; j++)
            c[i] = c[i] + buf[j] * buf[j + i];

    var d = 0;
    while (c[d] > c[d + 1]) d++;
    var maxval = -1,
        maxpos = -1;
    for (var i = d; i < SIZE; i++) {
        if (c[i] > maxval) {
            maxval = c[i];
            maxpos = i;
        }
    }
    var T0 = maxpos;

    var x1 = c[T0 - 1],
        x2 = c[T0],
        x3 = c[T0 + 1];
    var a = (x1 + x3 - 2 * x2) / 2;
    var b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
}

function updatePitch() {
    analyser.getFloatTimeDomainData(buf);
    var ac = autoCorrelate(buf, audioContext.sampleRate);

    if (ac != -1) {
        var pitch = ac;
        var note = noteFromPitch(pitch);
        noteElem.innerHTML = noteStrings[note % 12];
    }

    if (!window.requestAnimationFrame)
        window.requestAnimationFrame = window.webkitRequestAnimationFrame;
    window.requestAnimationFrame(drawSineWave);
}

function drawSineWave() {
    if (!isAnalyzing) return;

    canvasContext.clearRect(0, 0, WIDTH, HEIGHT);

    canvasContext.strokeStyle = "black";
    canvasContext.beginPath();
    canvasContext.moveTo(0, HEIGHT / 2);

    for (var i = 0; i < WIDTH; i++) {
        var t = (i / WIDTH) * buflen;
        var amplitude = buf[Math.floor(t)];
        var y = HEIGHT / 2 + amplitude * HEIGHT / 2;
        canvasContext.lineTo(i, y);
    }

    canvasContext.stroke();
    requestAnimationFrame(updatePitch);
}

function startAnalyzing() {
    navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
        mediaStreamSource = audioContext.createMediaStreamSource(stream);
        mediaStreamSource.connect(analyser);
        isAnalyzing = true;
        updatePitch();
    }).catch(function(err) {
        alert('Error accessing microphone');
    });
}

startAnalyzing();

</script>
