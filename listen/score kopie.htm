<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musical Notes</title>
</head>
<body>
    <div id="staff-container"></div>
    <div id="note"></div>
<script>
// Hier das obige JavaScript-Script einfügen

class MusicalNotes {
    constructor() {
        this.svgNS = "http://www.w3.org/2000/svg";
        // Mapping von Noten zu ihrer Y-Position auf dem Notensystem
        // "C4" ist das mittlere C, "C5" ist das C eine Oktave darüber, usw.
        this.notePositions = {
            "C4": 5,
            "D4": 4.5,
            "E4": 4,
            // Add all other notes in similar fashion
            // ...
            "A3": 2,
            "B3": 1.5,
            "C3": 1, // C im Bassschlüssel
            // ...
        };
        this.lineHeight = 20;
        this.clefSize = 60;
    }
    
    // Funktion zum Zeichnen von Notenlinien
    drawStaffLines(containerId, lineLength = 120) {
        const container = document.getElementById(containerId);
        if (!container) return;

        // Erstelle ein neues SVG-Element
        const svg = document.createElementNS(this.svgNS, "svg");
        svg.setAttribute("width", lineLength);
        svg.setAttribute("height", "100");
        svg.style.border = "1px solid black"; // Optional: SVG-Rahmen
        container.appendChild(svg);

        // Zeichne fünf Notenlinien
        for (let i = 0; i < 5; i++) {
            const line = document.createElementNS(this.svgNS, "line");
            line.setAttribute("x1", "0");
            line.setAttribute("y1", `${20 + i * 20}`); // Notenlinien sind 20px auseinander
            line.setAttribute("x2", lineLength);
            line.setAttribute("y2", `${20 + i * 20}`);
            line.setAttribute("stroke", "black");
            svg.appendChild(line);
        }

        return svg;
    }

    // 𝄞 das hier gehört rechts über alle zeilen ca. 240px hier

    // Funktion zum Zeichnen einer Note
    drawNote(containerId, noteSymbol, notePosition, Schlüssel) {
        const svg = this.drawStaffLines(containerId);
        
        // Text-Element für die Note
        const text = document.createElementNS(this.svgNS, "text");
        text.setAttribute("x", "60"); // X-Position in der Mitte der Linien
        text.setAttribute("y", `${20 + notePosition * 20}`); // Y-Position basierend auf der notePosition
        text.textContent = noteSymbol; // Note-Symbol, z.B. "A", "B", "C", ...
        text.setAttribute("font-family", "serif");
        text.setAttribute("font-size", "36px"); 
        text.setAttribute("font-style","italic");
        text.setAttribute("text-anchor", "middle");
        svg.appendChild(text);
    }
}

// Nutze die Klasse MusicalNotes, um Noten und Notenlinien zu zeichnen
const musicalNotes = new MusicalNotes();
musicalNotes.drawNote('note', '⬭', 2); // Zeichne eine Note auf der dritten Linie (C)
musicalNotes.drawNote('note', '⬭', 1.5); // Zeichne eine Note auf der dritten Linie (D)
musicalNotes.drawNote('note', '#⬭', 1.5); // Zeichne eine Note auf der dritten Linie (#D)
musicalNotes.drawNote('note', '⬭', 1); // Zeichne eine Note weiter oben im zwischenrraum (E)

musicalNotes.drawNote('note', '⬭', 0); // Zeichne eine Note noch weieter weiter oben im zwischenrraum  (G)

</script>

</body>
</html>
