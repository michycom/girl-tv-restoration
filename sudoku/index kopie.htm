  function resetDuelCarryBonus(){
    duelCarryBonusSec = { human:0, bot:0 };
  }

  function startDuelTurn(actor){
    const a = actor === 'bot' ? 'bot' : 'human';
    const budget = currentDuelTurnStartSec(a);
    duelCarryBonusSec[a] = 0;
    duelTurn = a;
    duelTurnStartSec = budget;
    duelTurnSec = budget;
    duelActionLockUntilMs = 0;
    duelTurnStartedAtMs = Date.now();
    if(a==='human') markHumanMoveReady(duelTurnStartedAtMs);
    refreshDuelBoardVisibility();
  }

  function settleActiveDuelTurn(actor){
    if(!twoPlayerMode) return 0;
    if(!duelTurnStartedAtMs) return 0;
    const a = actor === 'bot' ? 'bot' : 'human';
    const elapsed = Math.max(0, (Date.now() - duelTurnStartedAtMs) / 1000);
    const used = Math.min(duelTurnStartSec, elapsed);
    addDuelUsedTime(a, used);
    duelTurnSec = Math.max(0, duelTurnStartSec - used);
    return used;
  }

  function duelRemainingFor(actor){
    if(!twoPlayerMode) return 0;
    const a = actor === 'bot' ? 'bot' : 'human';
    if(a !== duelTurn) return currentDuelTurnStartSec(a);
    if(!duelTurnStartedAtMs) return Math.max(0, duelTurnSec);
    const elapsed = Math.max(0, (Date.now() - duelTurnStartedAtMs) / 1000);
    return Math.max(0, duelTurnStartSec - elapsed);
  }

  function otherDuelPlayer(player){
    return player === 'bot' ? 'human' : 'bot';
  }

  function clearBotThink(){
    if(botThinkId){
      clearTimeout(botThinkId);
      botThinkId = null;
    }
  }

  function clearDuelTurnSwitch(){
    if(duelTurnSwitchId){
      clearTimeout(duelTurnSwitchId);
      duelTurnSwitchId = null;
    }
  }

  function clearDuelBoardFade(){
    if(duelBoardFadeId){
      clearTimeout(duelBoardFadeId);
      duelBoardFadeId = null;
    }
    if(elBoard) elBoard.classList.remove('duelTurnFade');
  }

  function lockDuelInteractionFor(ms=0){
    const n = Math.max(0, Number(ms) || 0);
    if(n<=0) return;
    const until = Date.now() + n;
    duelActionLockUntilMs = Math.max(duelActionLockUntilMs, until);
  }

  function duelActionLockRemainingMs(){
    return Math.max(0, duelActionLockUntilMs - Date.now());
  }

  function melodyWindowRemainingMs(){
    if(!soundOn) return 0;
    return Math.max(0, melodyBusyUntilMs - Date.now());
  }

  function duelHumanCanActNow(){
    if(!twoPlayerMode) return true;
    if(duelTurn !== 'human') return false;
    if(!(duelTurnStartedAtMs > 0)) return false;
    if(duelActionLockRemainingMs() > 0) return false;
    return !duelTurnSwitchId;
  }

  function liveWaitingForStart(){
    return !!(liveIsConnected() && liveRole === 'guest' && !liveGameStartedForSession && !(twoPlayerMode && duelOpponentMode==='live'));
  }

  function refreshLiveBoardGate(){
    const waiting = liveWaitingForStart();
    if(elLiveBoardWait){
      elLiveBoardWait.classList.toggle('on', waiting);
      elLiveBoardWait.hidden = !waiting;
    }
    if(elBoard) elBoard.hidden = waiting;
    if(elBoardHud) elBoardHud.hidden = waiting;
    if(elPalette) elPalette.hidden = waiting;
    if(elAnalysis) elAnalysis.hidden = waiting;
    if(elSolvedShareBar) elSolvedShareBar.hidden = waiting;
    if(elSharedSenderHud) elSharedSenderHud.hidden = waiting;
  }

  function refreshDuelBoardVisibility(){
    if(!elBoard) return;
    refreshLiveBoardGate();
    if(liveWaitingForStart()) return;
    // Never dim/lock the board during solved-end states (outro + hidden-layer gimmick).
    const allowInteractiveSolvedState = finalArcadeActive || isSolved();
    const hide = twoPlayerMode && !allowInteractiveSolvedState && !duelHumanCanActNow();
    elBoard.classList.toggle('duelOpponentTurn', hide);
  }

  function triggerDuelBoardFade(durationMs=DUEL_TURN_FADE_MS){
    if(!elBoard) return;
    const ms = Math.max(120, Number(durationMs)||DUEL_TURN_FADE_MS);
    clearDuelBoardFade();
    void elBoard.offsetWidth;
    elBoard.classList.add('duelTurnFade');
    duelBoardFadeId = setTimeout(()=>{
      duelBoardFadeId = null;
      if(elBoard) elBoard.classList.remove('duelTurnFade');
    }, ms);
  }

  function transitionDuelTurn(nextActor, {delayMs=0, fade=true}={}){
    if(!twoPlayerMode) return;
    const target = nextActor==='bot' ? 'bot' : 'human';
    const waitMs = Math.max(0, Number(delayMs)||0);
    const fadeMs = fade ? Math.max(DUEL_TURN_FADE_MS, waitMs + 120) : 0;
    const lockMs = duelActionLockRemainingMs();
    const liveDuel = duelOpponentMode==='live';
    const melodyMs = melodyWindowRemainingMs();
    const melodyTailMs = melodyMs > 0 ? 90 : 0;
    const melodyBlockMs = liveDuel ? 0 : (melodyMs + melodyTailMs);
    const startAfterMs = Math.max(waitMs, fadeMs, lockMs, melodyBlockMs);

    clearBotThink();
    clearDuelTurnSwitch();
    if(fade) triggerDuelBoardFade(fadeMs);

    // Lock next actor immediately; countdown starts only when player can act.
    duelTurn = target;
    duelTurnStartSec = currentDuelTurnStartSec(target);
    duelTurnSec = duelTurnStartSec;
    duelTurnStartedAtMs = 0;
    refreshDuelBoardVisibility();
    updateTimerHud();

    const run = ()=>{
      duelTurnSwitchId = null;
      if(!twoPlayerMode || isSolved()) return;
      startDuelTurn(target);
      refreshDuelBoardVisibility();
      updateTimerHud();
      queueBotTurn();
    };

    if(startAfterMs>0) duelTurnSwitchId = setTimeout(run, startAfterMs);
    else run();
  }

  function updateTimerHud(){
    if(twoPlayerMode){
      duelTurnSec = duelRemainingFor(duelTurn);
      const plus = duelIdleBonusActive ? '+' : '';
      const totalSec = Math.max(0, Math.round(Number(duelStats.totalUsedSec)||0));
      if(elTimer){
        if(duelOpponentMode==='live'){
          const roleShort = liveRoleShort(liveRoleForActor(duelTurn));
          elTimer.textContent = `${roleShort} ${liveDuelTurnLabel(duelTurnSec)}${plus} · Σ${totalSec}s`;
        } else {
          const sec = Math.max(0, Math.ceil(duelTurnSec));
          const icon = duelTurn === 'bot' ? '🤖' : '👤';
          elTimer.textContent = `${icon}${String(sec).padStart(2,'0')}${plus} · Σ${totalSec}s`;
        }
      }
      refreshHudStats();
      if(!presetBoardEditMode) renderAnalysis(selectedCandForAnalysis());
      return;
    }
    if(elTimer) elTimer.textContent = fmtTime(timerSec);
    refreshHudStats();
  }

  function chooseBotMove(){
    const hint = computeHintSingle();
    if(hint && /^[1-9]$/.test(String(hint.digit||''))){
      return { index: hint.index, digit: String(hint.digit), guess: false };
    }

    let cand = null;
    try{ cand = candidatesFromBoard(boardString()); }catch(_e){ cand = null; }
    if(!cand) return null;

    let bestIndex = -1;
    let bestDigits = '';
    for(let i=0;i<81;i++){
      if(grid[i]!==BLANK) continue;
      const ds = cand[SQUARES[i]] || '';
      if(ds.length < 2) continue;
      if(bestIndex < 0 || ds.length < bestDigits.length){
        bestIndex = i;
        bestDigits = ds;
      }
    }
    if(bestIndex < 0 || !bestDigits) return null;
    const pick = bestDigits[Math.floor(Math.random()*bestDigits.length)];
    return { index: bestIndex, digit: pick, guess: true };
  }

  function queueBotTurn(){
    clearBotThink();
    if(!twoPlayerMode || duelOpponentMode!=='bot' || duelTurn!=='bot' || isSolved()) return;

    const waitMs = 120 + Math.floor(Math.random()*140);
    botThinkId = setTimeout(()=>{
      botThinkId = null;
      if(!twoPlayerMode || duelTurn!=='bot' || isSolved()) return;

      // Never let the bot start while previous move melody/locks are still active.
      const pendingWaitMs = Math.max(melodyWindowRemainingMs(), duelActionLockRemainingMs());
      if(pendingWaitMs > 0){
        botThinkId = setTimeout(()=>{
          botThinkId = null;
          queueBotTurn();
        }, pendingWaitMs + 36);
        return;
      }

      const mv = chooseBotMove();
      if(!mv) return;

      selected = mv.index;
      render();
      setCell(mv.index, mv.digit, {countMistake:true, duelActor:'bot'});
    }, waitMs);
  }

  function onDuelTimeout({broadcast=true, forcedActor=''}={}){
    if(!twoPlayerMode) return;

    const forced = forcedActor==='bot' ? 'bot' : (forcedActor==='human' ? 'human' : '');
    const timedOut = forced || duelTurn;
    if(timedOut!=='human' && timedOut!=='bot') return;
    if(duelTurn !== timedOut) return;

    settleActiveDuelTurn(timedOut);

    const liveDuel = duelOpponentMode==='live';
    if(liveDuel){
      duelIdleTimeoutStreak = 0;
      duelIdleBonusActive = false;
      if(broadcast && liveIsConnected()){
        const timedStats = duelStatsFor(timedOut);
        sendLiveMessage('turn', {
          kind:'timeout',
          actor:timedOut,
          at:Date.now(),
          score: Math.round(Number(timedStats.score)||0),
          mistakes: Math.max(0, Math.round(Number(timedStats.mistakes)||0)),
          usedSec: Math.max(0, Number(timedStats.usedSec)||0),
        });
      }
    } else {
      duelIdleTimeoutStreak++;
      if(duelIdleTimeoutStreak >= 2) duelIdleBonusActive = true;
    }

    const next = otherDuelPlayer(timedOut);
    const delayMs = (!liveDuel && timedOut==='human' && next==='bot') ? DUEL_HUMAN_TO_BOT_DELAY_MS : 0;
    transitionDuelTurn(next, {delayMs, fade:!liveDuel});

    if(duelIdleBonusActive) toast('⏳ +3');
    else {
      const botTimeoutLabel = duelOpponentMode==='live' ? '👥 Zeit' : '🤖 Zeit';
      toast(timedOut==='bot' ? botTimeoutLabel : '👤 Zeit');
    }
  }

  function onDuelMoveResolved(actor, correct){
    if(!twoPlayerMode) return;
    if(actor!=='human' && actor!=='bot') return;
    if(actor !== duelTurn) return;

    settleActiveDuelTurn(actor);

    if(isSolved()){
      updateTimerHud();
      return;
    }

    duelIdleTimeoutStreak = 0;
    duelIdleBonusActive = false;

    const liveDuel = duelOpponentMode==='live';
    if(correct && !liveDuel){
      duelCarryBonusSec[actor] = Math.max(0, Number(duelCarryBonusSec[actor]) || 0) + DUEL_BONUS_SEC;
    }

    // Rule: after every drag (right or wrong), the other player is next.
    const next = otherDuelPlayer(actor);
    const delayMs = (!liveDuel && actor==='human' && next==='bot') ? DUEL_HUMAN_TO_BOT_DELAY_MS : 0;
    transitionDuelTurn(next, {delayMs, fade:!liveDuel});
  }


  function canUseLiveCameraScan(){
    return !!(
      window.isSecureContext &&
      navigator.mediaDevices &&
      typeof navigator.mediaDevices.getUserMedia === 'function'
    );
  }

  function canUseBarcodeDetector(){
    return typeof BarcodeDetector === 'function';
  }

  function liveScanSupported(){
    return canUseLiveCameraScan();
  }

  async function ensureLiveJsQr(){
    // Privacy: no remote script injection; use only locally bundled jsQR if present.
    return typeof window.jsQR === 'function';
  }


  async function ensureLiveQrGenerator(){
    return typeof window.QRCode === 'function';
  }

  async function ensureLiveScanDetector(){
    if(liveScanDetector) return liveScanDetector;
    if(!canUseBarcodeDetector()) return null;

    try{
      if(typeof BarcodeDetector.getSupportedFormats === 'function'){
        const formats = await BarcodeDetector.getSupportedFormats();
        if(Array.isArray(formats) && formats.includes('qr_code')){
          liveScanDetector = new BarcodeDetector({ formats:['qr_code'] });
          return liveScanDetector;
        }
      }
      liveScanDetector = new BarcodeDetector({ formats:['qr_code'] });
      return liveScanDetector;
    }catch(_e){
      try{
        liveScanDetector = new BarcodeDetector();
        return liveScanDetector;
      }catch(_e2){
        liveScanDetector = null;
        return null;
      }
    }
  }

  async function ensureLiveScanDecoder(){
    liveScanUseJsQr = false;

    const detector = await ensureLiveScanDetector();
    if(detector) return 'barcode';

    const jsQrReady = await ensureLiveJsQr();
    if(jsQrReady){
      liveScanUseJsQr = true;
      return 'jsqr';
    }

    return null;
  }

  function loadLiveImageElement(src){
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = src;
    });
  }

  async function decodeLiveQrFromCanvas(canvas){
    if(!canvas) return '';
    let raw = '';

    const detector = await ensureLiveScanDetector();
    if(detector){
      try{
        const hits = await detector.detect(canvas);
        if(hits && hits.length){
          raw = String(hits[0] && hits[0].rawValue ? hits[0].rawValue : '').trim();
        }
      }catch(_e){}
    }
    if(raw) return raw;

    const jsQrReady = await ensureLiveJsQr();
    if(!jsQrReady || typeof window.jsQR!=='function') return '';
    try{
      const ctx = canvas.getContext('2d', { willReadFrequently:true });
      if(!ctx) return '';
      const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const found = window.jsQR(frame.data, canvas.width, canvas.height, { inversionAttempts:'attemptBoth' });
      return String(found && found.data ? found.data : '').trim();
    }catch(_e){
      return '';
    }
  }

  async function decodeLiveQrFromImageFile(file){
    if(!file) return '';
    const dataUrl = await fileToDataUrl(file);
    const img = await loadLiveImageElement(dataUrl);
    const w = Math.max(1, Number(img.naturalWidth || img.width || 0));
    const h = Math.max(1, Number(img.naturalHeight || img.height || 0));
    const maxSide = 1800;
    const scale = Math.min(1, maxSide / Math.max(w, h));
    const cw = Math.max(1, Math.round(w * scale));
    const ch = Math.max(1, Math.round(h * scale));
    const canvas = document.createElement('canvas');
    canvas.width = cw;
    canvas.height = ch;
    const ctx = canvas.getContext('2d', { willReadFrequently:true });
    if(!ctx) return '';
    ctx.drawImage(img, 0, 0, cw, ch);
    return decodeLiveQrFromCanvas(canvas);
  }

  function stopLiveQrScan({silent=false}={}){
    if(liveScanTimer){
      clearInterval(liveScanTimer);
      liveScanTimer = null;
    }

    if(elLiveScanVideo){
      try{ elLiveScanVideo.pause(); }catch(_e){}
      try{ elLiveScanVideo.srcObject = null; }catch(_e){}
    }

    if(liveScanStream){
      try{
        for(const tr of liveScanStream.getTracks()) tr.stop();
      }catch(_e){}
      liveScanStream = null;
    }

    liveScannerOpen = false;
    liveScanBusy = false;
    if(elLiveScanArea) elLiveScanArea.classList.remove('on');
    refreshLiveUi();
    if(!silent) toast('QR scanner aus');
  }

  async function pollLiveQrScan(){
    if(!liveScannerOpen || liveScanBusy) return;
    if(!elLiveScanVideo || elLiveScanVideo.readyState < 2) return;

    let detector = null;
    if(!liveScanUseJsQr){
      detector = await ensureLiveScanDetector();
      if(!detector){
        const jsQrReady = await ensureLiveJsQr();
        if(!jsQrReady) return;
        liveScanUseJsQr = true;
      }
    }

    const vw = Number(elLiveScanVideo.videoWidth) || 0;
    const vh = Number(elLiveScanVideo.videoHeight) || 0;
    if(vw < 2 || vh < 2) return;

    if(!liveScanCanvas) liveScanCanvas = document.createElement('canvas');
    if(liveScanCanvas.width !== vw) liveScanCanvas.width = vw;
    if(liveScanCanvas.height !== vh) liveScanCanvas.height = vh;

    const ctx = liveScanCanvas.getContext('2d', { willReadFrequently:true });
    if(!ctx) return;
    ctx.drawImage(elLiveScanVideo, 0, 0, vw, vh);

    liveScanBusy = true;
    try{
      let raw = '';

      if(detector && !liveScanUseJsQr){
        const hits = await detector.detect(liveScanCanvas);
        if(hits && hits.length){
          raw = String(hits[0] && hits[0].rawValue ? hits[0].rawValue : '').trim();
        }
      }

      if(!raw && liveScanUseJsQr && typeof window.jsQR === 'function'){
        const frame = ctx.getImageData(0, 0, vw, vh);
        const found = window.jsQR(frame.data, vw, vh, { inversionAttempts:'attemptBoth' });
        raw = String(found && found.data ? found.data : '').trim();
      }

      if(!raw) return;

      const now = Date.now();
      if(raw===liveScanLastValue && (now-liveScanLastAtMs)<1800) return;
      liveScanLastValue = raw;
      liveScanLastAtMs = now;

      if(elLiveInCode) elLiveInCode.value = raw;
      if(elLiveScanHint) elLiveScanHint.textContent = 'QR erkannt. Verarbeite…';
      const ok = await processLiveIncomingCode(raw);
      if(ok){
        stopLiveQrScan({silent:true});
        toast('QR erkannt');
      }
    }catch(_e){}
    finally{
      liveScanBusy = false;
    }
  }

  async function startLiveQrScan(){
    if(!canUseLiveCameraScan()){
      toast('QR scanner nicht verfügbar');
      refreshLiveUi();
      return false;
    }

    const decoderKind = await ensureLiveScanDecoder();
    if(!decoderKind){
      toast('QR decoder nicht verfügbar');
      refreshLiveUi();
      return false;
    }

    stopLiveQrScan({silent:true});

    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{
          facingMode:{ ideal:'environment' },
          width:{ ideal:1280 },
          height:{ ideal:1280 },
        },
      });

      liveScanStream = stream;
      if(elLiveScanVideo){
        elLiveScanVideo.srcObject = stream;
        try{ await elLiveScanVideo.play(); }catch(_e){}
      }

      liveScannerOpen = true;
      liveScanBusy = false;
      liveScanLastValue = '';
      liveScanLastAtMs = 0;
      if(elLiveScanArea) elLiveScanArea.classList.add('on');
      if(elLiveScanHint){
        const decoderLabel = decoderKind === 'jsqr' ? ' (fallback)' : '';
        elLiveScanHint.textContent = `Richte den QR Code in den Rahmen${decoderLabel}`;
      }

      liveScanTimer = setInterval(()=>{ void pollLiveQrScan(); }, 220);
      refreshLiveUi();
      toast('QR scanner an');
      return true;
    }catch(_e){
      stopLiveQrScan({silent:true});
      toast('Kamera Zugriff fehlgeschlagen');
      return false;
    }
  }

    const chosen = requested || (liveNextStarterRole === 'p1' || liveNextStarterRole === 'p2'
      ? liveNextStarterRole
      : (Math.random() < 0.5 ? 'p1' : 'p2'));

  function syncRemoteLiveStats(meta=null){
    if(!(twoPlayerMode && duelOpponentMode==='live') || !meta || typeof meta!=='object') return;
    const remote = duelStats.bot;
    const remoteScore = Number(meta.score);
    const remoteMistakes = Number(meta.mistakes);
    const remoteUsedSec = Number(meta.usedSec);
    if(Number.isFinite(remoteScore)) remote.score = Math.round(remoteScore);
    if(Number.isFinite(remoteMistakes)) remote.mistakes = Math.max(0, Math.round(remoteMistakes));
    if(Number.isFinite(remoteUsedSec)) remote.usedSec = Math.max(0, remoteUsedSec);
    duelStats.totalUsedSec = Math.max(0, (Number(duelStats.human.usedSec)||0) + (Number(duelStats.bot.usedSec)||0));
    refreshHudStats();
  }

  function buildLivePreferencePacket(){
    const prefs = { ...snapshotShareablePreferences() };
    delete prefs.userName;
    delete prefs.twoPlayerMode;

    const packet = {
      prefs,
      webrtc: {
        liveTurnSec: normalizeLiveDuelTurnSec(liveDuelTurnSecPref),
      },
    };
    const emoji = sanitizeEmojiPreset(customEmojiPreset);
    const colors = sanitizeColorPreset(customColorSet);
    const images = sanitizeImagePreset(customImageSet);
    if(emoji) packet.customEmojiPreset = emoji;
    if(colors) packet.customColorSet = colors;
    if(images && images.some(v=>String(v||'').trim())) packet.customImageSet = images;
    return packet;
  }

  function applyLivePreferencePacket(packet){
    if(!packet || typeof packet!=='object') return false;
    const prefs = (packet.prefs && typeof packet.prefs==='object') ? { ...packet.prefs } : {};
    delete prefs.userName;
    delete prefs.twoPlayerMode;
    applyShareablePreferences(prefs);
    const webrtc = (packet.webrtc && typeof packet.webrtc==='object') ? packet.webrtc : null;
    if(webrtc) liveDuelTurnSecPref = normalizeLiveDuelTurnSec(webrtc.liveTurnSec);

    const emoji = sanitizeEmojiPreset(packet.customEmojiPreset);
    const colors = sanitizeColorPreset(packet.customColorSet);
    const images = sanitizeImagePreset(packet.customImageSet);
    if(emoji){
      customEmojiPreset = emoji.slice(0, 9);
      persistCustomEmojiPreset();
    }
    if(colors){
      customColorSet = colors.slice(0, 9);
      persistCustomColorPreset();

    if(images){
      customImageSet = images.slice(0, 9);
      persistCustomImagePreset();

    persistUiSkinState();

    persistMistGameOverLimitState();

    persistPaletteOnlyMissingState();

  function liveFlowButtonIcon(){
    if(liveIsConnected() || (twoPlayerMode && duelOpponentMode==='live')) return '👥';

  function normalizeLiveStunList(urls){
    const out = [];
    const seen = new Set();
    for(const raw of urls || []){
      const u = String(raw || '').trim();
      if(!u || seen.has(u)) continue;
      seen.add(u);
      out.push(u);
      if(out.length >= 4) break;
    }
    return out;
  }

  function liveStunForProfile(profile, roleLabel){
    const base = roleLabel === 'Player 1' ? LIVE_STUN_BASE_P1 : LIVE_STUN_BASE_P2;
    const filters = {
      verified: u => u.includes('cloudflare') || u.includes('nextcloud') || u.includes('sipnet') || u.includes('google'),
      mix: () => true,
      cloudflare: u => u.includes('cloudflare'),
      nextcloud: u => u.includes('nextcloud'),
      sipnet: u => u.includes('sipnet'),
      google: u => u.includes('google'),
    };
    const normalizedProfile = normalizeLiveStunProfile(profile);
    if(normalizedProfile === 'custom'){
      const raw = String((taLiveCustomStun && taLiveCustomStun.value) || liveCustomStunPref || '').trim();
      const lines = raw.split(/\r?\n/).map(s=>s.trim()).filter(s=>/^stun:/i.test(s));
      return normalizeLiveStunList(lines.length ? lines : liveStunForProfile('verified', roleLabel));
    }
    const selected = base.filter(filters[normalizedProfile] || filters.verified);
    return normalizeLiveStunList(selected.length ? selected : base.filter(filters.verified));
  }

  function stopConnectFlowQrScan({silent=true}={}){
    if(connectFlowScanTimer){

    if(connectFlowScanStream){
      try{
        for(const tr of connectFlowScanStream.getTracks()) tr.stop();
      }catch(_e){}
      connectFlowScanStream = null;
    }
    const video = document.getElementById('connectFlowQrVideo');
    if(video){
      try{ video.pause(); }catch(_e){}
      try{ video.srcObject = null; }catch(_e){}
      video.classList.remove('on');
    }
    connectFlowScanBusy = false;
    connectFlowScanLastValue = '';
    connectFlowScanLastAtMs = 0;
    const status = document.getElementById('connectFlowQrStatus');
    if(status && !silent) status.textContent = 'Scanner gestoppt.';
  }

  async function pollConnectFlowQrScan(){
    if(connectFlowScanBusy || !connectFlowScanStream) return;
    const video = document.getElementById('connectFlowQrVideo');
    if(!video || video.readyState < 2) return;

    const vw = Number(video.videoWidth) || 0;
    const vh = Number(video.videoHeight) || 0;
    if(vw < 2 || vh < 2) return;

    if(!connectFlowScanCanvas) connectFlowScanCanvas = document.createElement('canvas');
    if(connectFlowScanCanvas.width !== vw) connectFlowScanCanvas.width = vw;
    if(connectFlowScanCanvas.height !== vh) connectFlowScanCanvas.height = vh;

    const ctx = connectFlowScanCanvas.getContext('2d', { willReadFrequently:true });
    if(!ctx) return;
    ctx.drawImage(video, 0, 0, vw, vh);

    connectFlowScanBusy = true;
    try{
      const raw = String(await decodeLiveQrFromCanvas(connectFlowScanCanvas) || '').trim();
      if(!raw) return;
      const now = Date.now();
      if(raw===connectFlowScanLastValue && (now-connectFlowScanLastAtMs)<1800) return;
      connectFlowScanLastValue = raw;
      connectFlowScanLastAtMs = now;
      const input = document.getElementById('connectFlowOfferInput');
      const status = document.getElementById('connectFlowQrStatus');
      if(input) input.value = raw;
      if(status) status.textContent = 'QR erkannt. Link wird geöffnet …';
      stopConnectFlowQrScan({silent:true});
      await acceptLiveOfferFromFlow(raw);
    }catch(_e){
      // Keep scanner alive; decode errors are transient.
    } finally {
      connectFlowScanBusy = false;
    }
  }

  async function startConnectFlowQrScan(){
    const status = document.getElementById('connectFlowQrStatus');
    const video = document.getElementById('connectFlowQrVideo');
    if(!video || !status){
      toast('QR-Scanner nicht bereit');
      return false;
    }
    if(!canUseLiveCameraScan()){
      status.textContent = 'Kamera-Scan braucht HTTPS und Kamerazugriff.';
      return false;
    }
    const decoderKind = await ensureLiveScanDecoder();
    if(!decoderKind){
      status.textContent = 'QR-Erkennung im Browser nicht verfügbar.';
      return false;
    }

    stopConnectFlowQrScan({silent:true});
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{
          facingMode:{ ideal:'environment' },
          width:{ ideal:1280 },
          height:{ ideal:1280 },
        },
      });
      connectFlowScanStream = stream;
      video.srcObject = stream;
      try{ await video.play(); }catch(_e){}
      video.classList.add('on');
      status.textContent = decoderKind === 'jsqr'
        ? 'Kamera aktiv. QR vor die Kamera halten. (Fallback-Decoder)'
        : 'Kamera aktiv. QR vor die Kamera halten.';
      connectFlowScanTimer = setInterval(()=>{ void pollConnectFlowQrScan(); }, 220);
      return true;
    }catch(_e){
      stopConnectFlowQrScan({silent:true});
      status.textContent = 'Kamera konnte nicht gestartet werden.';
      return false;
    }
  }

  function b64uEncodeString(str){
    const bytes = new TextEncoder().encode(String(str||''));
    let bin = '';
    for(const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }

  function b64uDecodeString(b64u){
    const raw = String(b64u||'').trim();
    if(!raw) return '';
    const b64 = raw.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((raw.length + 3) % 4);
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function getLiveHashRaw(loc=window.location){
    const h = (loc && typeof loc.hash === 'string') ? loc.hash : '';
    return h.startsWith('#') ? h.slice(1) : h;
  }

  function getLiveSearchRaw(loc=window.location){
    const s = (loc && typeof loc.search === 'string') ? loc.search : '';
    return s.startsWith('?') ? s.slice(1) : s;
  }

  function getPrefixedLiveSignalToken(rawValue, prefix){
    const raw = String(rawValue || '').replace(/^[?#]/, '');
    const first = raw.split('&', 1)[0] || '';
    const marker = `${prefix}.`;
    if(!first.startsWith(marker)) return null;
    const token = first.slice(marker.length).trim();
    return token || null;
  }

  function getLiveParamToken(rawValue, prefix, namedKey){
    const raw = String(rawValue || '').replace(/^[?#]/, '');
    if(!raw) return null;
    const prefixed = getPrefixedLiveSignalToken(raw, prefix);
    if(prefixed) return prefixed;
    const params = new URLSearchParams(raw);
    const unnamed = String(params.get('') || '').trim();
    if(unnamed.startsWith(`${prefix}.`)){
      return unnamed.slice(prefix.length + 1).trim() || null;
    }
    return params.get(namedKey);
  }

  function getLiveOfferToken(rawValue=null){
    if(rawValue == null){
      return getLiveParamToken(getLiveSearchRaw(), 'o', 'offer')
        || getLiveParamToken(getLiveHashRaw(), 'o', 'offer');
    }
    return getLiveParamToken(rawValue, 'o', 'offer');
  }

  function getLiveAnswerToken(rawValue=null){
    if(rawValue == null){
      return getLiveParamToken(getLiveSearchRaw(), 'a', 'answer')
        || getLiveParamToken(getLiveHashRaw(), 'a', 'answer');
    }
    return getLiveParamToken(rawValue, 'a', 'answer');
  }

  function getLiveSessionIdFromLocation(loc=window.location){

  function extractLiveSessionId(input){
    const raw = String(input||'').trim();
    if(!raw) return '';
    if(/^[A-Za-z0-9_-]{6,64}$/.test(raw)) return raw;
    try{
      return String(new URL(raw, window.location.href).searchParams.get('s') || '').trim();
    }catch(_e){
      return '';
    }
  }

  function extractRawLivePayload(input){
    const raw = String(input||'').trim();
    return /^[A-Za-z0-9_-]+$/.test(raw) ? raw : '';
  }

  function extractLiveOfferPayload(input){
    const raw = String(input||'').trim();
    if(!raw) return '';
    try{
      const u = new URL(raw, window.location.href);
      return getLiveOfferToken(u.search) || getLiveOfferToken(u.hash) || '';
    }catch(_e){
      return getLiveOfferToken(raw) || '';
    }
  }

  function extractLiveAnswerPayload(input){
    const raw = String(input||'').trim();
    if(!raw) return '';
    try{
      const u = new URL(raw, window.location.href);
      return getLiveAnswerToken(u.search) || getLiveAnswerToken(u.hash) || '';
    }catch(_e){
      return getLiveAnswerToken(raw) || '';
    }
  }

  function buildLivePublicBaseUrl(){
    const u = new URL(window.location.href);
    u.hash = '';
    u.search = '';
    return u;
  }

  function buildLiveSignalApiUrl(params={}){
    const u = buildLivePublicBaseUrl();
    u.pathname = u.pathname.replace(/\/[^/]*$/, '/signal.php');
    for(const [key, value] of Object.entries(params)){
      if(value == null || value === '') continue;
      u.searchParams.set(key, value);
    }
    return u.toString();
  }

  function buildLiveSessionLink(sessionId){
    const cleanId = String(sessionId||'').trim();
    if(!cleanId) return '';
    const u = buildLivePublicBaseUrl();
    u.searchParams.set('s', cleanId);
    return u.toString();
  }

  function normalizeLiveSessionLink(rawLink='', sessionId=''){
    const cleanId = String(sessionId || extractLiveSessionId(rawLink) || '').trim();
    if(!cleanId) return '';
    return buildLiveSessionLink(cleanId);
  }

  function buildLiveSignalLink(kind, payload){
    const cleanPayload = String(payload||'').trim();
    if(!cleanPayload) return '';
    const u = buildLivePublicBaseUrl();
    const prefix = kind === 'answer' ? 'a.' : 'o.';
    u.search = `=${prefix}${cleanPayload}`;
    return u.toString();
  }

  function clearLiveSignalParamsFromLocation(){
    if(!(window.history && typeof window.history.replaceState === 'function')) return;
    try{
      const u = new URL(window.location.href);
      u.hash = '';
      u.searchParams.delete('');
      u.searchParams.delete('offer');
      u.searchParams.delete('answer');
      u.searchParams.delete('s');
      u.searchParams.delete('liveoffer');
      u.searchParams.delete('liveanswer');
      u.searchParams.delete('lo');
      u.searchParams.delete('la');
      const qs = u.searchParams.toString();
      window.history.replaceState(null, '', qs ? `${u.pathname}?${qs}` : u.pathname);
    }catch(_e){}
  }

  function liveHasRemoteAnswer(){
    return !!(livePc && livePc.remoteDescription && livePc.remoteDescription.type === 'answer');
  }

  function liveErrorText(err){
    const raw = String((err && err.message) ? err.message : (err || '')).trim();
    return raw || 'Unbekannter Fehler';
  }

  async function liveSignalRequest(method, params={}, body=null){
    const init = {
      method,
      headers: { Accept:'application/json' },
    };
    if(body !== null){
      init.headers['Content-Type'] = 'application/json';
      init.body = JSON.stringify(body);
    }

    let res;
    try{
      res = await fetch(buildLiveSignalApiUrl(params), init);
    }catch(_e){
      throw new Error('Kurzlink-Server nicht erreichbar.');
    }

    let data = null;
    try{
      data = await res.json();
    }catch(_e){
      throw new Error('Kurzlink-Server antwortet nicht als JSON.');
    }

    if(!res.ok || !data || data.ok !== true){
      throw new Error(data && data.error ? data.error : `Kurzlink-Serverfehler (${res.status})`);
    }

    return data;
  }

  async function createLiveSignalSession(offerPayload){
    return liveSignalRequest('POST', { action:'create' }, { offer:offerPayload, mode:effectiveLiveMode() });
  }

  async function fetchLiveSignalSession(sessionId){
    return liveSignalRequest('GET', { id:sessionId });
  }

  async function storeLiveSignalAnswer(sessionId, answerPayload){
    return liveSignalRequest('POST', { action:'answer' }, { id:sessionId, answer:answerPayload });
  }

  function stopLiveAnswerPolling(){
    if(liveSignalState.answerPollTimer){
      clearTimeout(liveSignalState.answerPollTimer);
      liveSignalState.answerPollTimer = 0;
    }
    liveSignalState.pollInFlight = false;
  }

  function clearLiveSignalState(){
    stopLiveAnswerPolling();
    liveSignalState.sessionId = '';
    liveSignalState.sharedLink = '';
    liveSignalState.lastAnswerPayload = '';
  }

  function setActiveLiveSignalSession(sessionId, sharedLink=''){
    const cleanId = String(sessionId||'').trim();
    liveSignalState.sessionId = cleanId;
    liveSignalState.sharedLink = cleanId
      ? normalizeLiveSessionLink(sharedLink, cleanId)
      : '';
    if(cleanId) liveSessionId = cleanId;
  }

  async function pollForLiveAnswer(sessionId){
    if(!sessionId || liveSignalState.sessionId !== sessionId || liveSignalState.pollInFlight) return;
    liveSignalState.pollInFlight = true;
    try{
      const session = await fetchLiveSignalSession(sessionId);
      if(liveSignalState.sessionId !== sessionId) return;
      const answerPayload = String(session.answer || '').trim();
      if(!answerPayload){
        if(liveFlowState === LIVE_FLOW.host_wait && !liveHasRemoteAnswer()){
          if(elLiveConnectInfo) elLiveConnectInfo.textContent = 'Warte auf Player 2. Der Answer wird automatisch über denselben Kurzlink abgeholt.';
        }
        return;
      }
      liveSignalState.lastAnswerPayload = answerPayload;
      await applyLiveAnswer(answerPayload, {
        sessionId,
        sharedLink: normalizeLiveSessionLink(session.link, sessionId),
      });
      if(liveHasRemoteAnswer() || liveIsConnected()) stopLiveAnswerPolling();
    }catch(err){
      if(liveFlowState === LIVE_FLOW.host_wait && elLiveConnectInfo){
        elLiveConnectInfo.textContent = `Warte auf Player 2. Kurzlink-Server meldet: ${liveErrorText(err)}`;
      }
    }finally{
      liveSignalState.pollInFlight = false;
      if(liveSignalState.sessionId === sessionId && liveFlowState !== LIVE_FLOW.error && !liveHasRemoteAnswer() && !liveIsConnected()){
        liveSignalState.answerPollTimer = window.setTimeout(()=>{
          void pollForLiveAnswer(sessionId);
        }, LIVE_SIGNAL_POLL_MS);
      }
    }
  }

  function startLiveAnswerPolling(sessionId, sharedLink=''){
    stopLiveAnswerPolling();
    if(!sessionId) return;
    setActiveLiveSignalSession(sessionId, sharedLink);
    void pollForLiveAnswer(sessionId);
  }

  function buildLocalLiveQrDataUrl(payload, sizePx=640){
    const raw = String(payload||'').trim();
    if(!raw) return '';
    if(typeof window.QRCode !== 'function') return '';

    let host = null;
    try{
      host = document.createElement('div');
      host.style.position = 'fixed';
      host.style.left = '-99999px';
      host.style.top = '0';
      host.style.width = '0';
      host.style.height = '0';
      host.style.overflow = 'hidden';
      document.body.appendChild(host);
      new window.QRCode(host, {
        text: raw,
        width: Math.max(280, Math.round(Number(sizePx)||640)),
        height: Math.max(280, Math.round(Number(sizePx)||640)),
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: window.QRCode.CorrectLevel.L,
      });
      const canvas = host.querySelector('canvas');
      if(canvas && typeof canvas.toDataURL === 'function') return canvas.toDataURL('image/png');
      const img = host.querySelector('img');
      return String(img && img.src ? img.src : '');
    }catch(_e){
      return '';
    }finally{
      if(host) host.remove();
    }
  }

  function setLiveOutgoingCode({kind='', link='', payload=''}={}){
    liveOutKind = String(kind||'').trim();
    liveOutLink = String(link||'').trim();
    liveOutPayload = String(payload||'').trim();

    const visibleValue = liveOutLink || liveOutPayload;
    if(elLiveOutCode) elLiveOutCode.value = visibleValue;

    if(!elLiveQrImage) return;
    if(!visibleValue){
      elLiveQrImage.removeAttribute('src');
      elLiveQrImage.classList.add('off');
      return;
    }

    const applyQr = ()=>{
      const src = buildLocalLiveQrDataUrl(visibleValue, 640);
      if(!src) return false;
      elLiveQrImage.src = src;
      elLiveQrImage.classList.remove('off');
      return true;
    };

    if(applyQr()) return;

    elLiveQrImage.removeAttribute('src');
    elLiveQrImage.classList.add('off');

    const expectedLink = liveOutLink;
    const expectedPayload = liveOutPayload;
    void ensureLiveQrGenerator().then((ok)=>{
      if(!ok) return;
      if(expectedLink !== liveOutLink || expectedPayload !== liveOutPayload) return;
      if(!elLiveQrImage) return;
      if(!applyQr()) return;
      refreshLiveUi();
    });
  }

  function waitIceGatheringComplete(pc, timeoutMs=9000){
    return new Promise((resolve)=>{
      if(!pc || pc.iceGatheringState === 'complete'){
        resolve();
        return;
      }
      let done = false;
      let timer = 0;
      const finish = ()=>{
        if(done) return;
        done = true;
        try{ pc.removeEventListener('icegatheringstatechange', onChange); }catch(_e){}
        if(timer) clearTimeout(timer);
        resolve();
      };
      const onChange = ()=>{
        if(pc.iceGatheringState === 'complete') finish();
      };
      timer = setTimeout(finish, Math.max(1500, Number(timeoutMs)||9000));
      try{ pc.addEventListener('icegatheringstatechange', onChange); }catch(_e){ finish(); }
    });
  }

  function bindLiveDataChannel(dc){
    if(!dc) return;
    liveDc = dc;

    dc.onopen = ()=>{
      setLiveFlowState(LIVE_FLOW.connected);
      startLiveKeepalive();
      sendLiveMessage('hello', {
        name: currentLiveDisplayName(),
        id: localLiveUserId,
      });
      if(liveRole==='host'){
        setTimeout(()=>{ sendLivePreferenceSync({quiet:true}); }, 80);
      }
      refreshLiveUi();
      updateButtons();
      toast('Live verbunden');
    };

    dc.onmessage = (ev)=>{
      handleLiveDataMessage(ev && typeof ev.data==='string' ? ev.data : '');
    };

    dc.onerror = ()=>{
      stopLiveKeepalive();
      if(!liveClosingExpected) setLiveFlowState(LIVE_FLOW.error);
      refreshLiveUi();
      updateButtons();
    };

    dc.onclose = ()=>{
      stopLiveKeepalive();
      liveDc = null;
      clearLiveRemoteMoveQueue();
      if(!liveClosingExpected){
        setLiveFlowState(LIVE_FLOW.error);
      } else if(liveFlowState!==LIVE_FLOW.error){
        setLiveFlowState(LIVE_FLOW.idle);
      }
      if(twoPlayerMode && duelOpponentMode==='live'){
        setTwoPlayerMode(false, {announce:false});
        setLivePanelOpen(false);
        if(!connectFlowVisible()) openConnectFlow();
        toast('Live getrennt');
      }
      refreshLiveUi();
      updateButtons();
    };
  }

  function makeLivePeerConnection(role){
    // Caller must decide when to close/reset an existing session.
    const RTC = liveRtcCtor();
    if(typeof RTC!=='function') throw new Error('WebRTC ctor unavailable');
    const pc = new RTC(buildLiveRtcConfig(role === 'guest' ? 'Player 2' : 'Player 1'));
    livePc = pc;
    liveRole = role || '';

    pc.ondatachannel = (ev)=>{
      const dc = ev && ev.channel ? ev.channel : null;
      if(dc) bindLiveDataChannel(dc);
    };

    pc.onconnectionstatechange = ()=>{
      const st = String(pc.connectionState||'');
      if(st==='connected'){
        setLiveFlowState(LIVE_FLOW.connected);
      } else if(st==='failed' || st==='disconnected'){
        if(!liveClosingExpected) setLiveFlowState(LIVE_FLOW.error);
      } else if(st==='closed'){
        if(!liveClosingExpected) setLiveFlowState(LIVE_FLOW.error);
        if(twoPlayerMode && duelOpponentMode==='live'){
          setTwoPlayerMode(false, {announce:false});
          toast('Live getrennt');
        }
      }
      refreshLiveUi();
      updateButtons();
    };

    pc.oniceconnectionstatechange = ()=>{
      const st = String(pc.iceConnectionState||'');
      if(st==='failed' || st==='disconnected'){
        if(!liveClosingExpected) setLiveFlowState(LIVE_FLOW.error);
        refreshLiveUi();
        updateButtons();
      } else if(st==='closed'){
        if(!liveClosingExpected) setLiveFlowState(LIVE_FLOW.error);
        refreshLiveUi();
        updateButtons();
      }
    };

    return pc;
  }

  async function createLiveOffer(){
    if(!liveSupported()){
      setLiveFlowState(LIVE_FLOW.error);
      if(elLiveConnectStatus) elLiveConnectStatus.textContent = '🤦 Live unavailable (WebRTC API missing)';
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = 'RTCPeerConnection ist in diesem Browser nicht verfügbar.';
      toast('Live nicht unterstützt');
      refreshLiveUi();
      return false;
    }

    try{
      if(elLiveConnectStatus) elLiveConnectStatus.textContent = '👥 Link wird erstellt …';
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = 'WebRTC initialisiert. Bitte kurz warten.';
      closeLiveConnection({keepSession:false});
      clearLiveSignalState();
      setLiveFlowState(LIVE_FLOW.idle);
      liveSessionId = '';
      liveExpectedAnswerSession = '';
      setLiveOutgoingCode();

      const pc = makeLivePeerConnection('host');
      const dc = pc.createDataChannel('emoku-live', { ordered:true });
      bindLiveDataChannel(dc);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitIceGatheringComplete(pc, LIVE_ICE_TIMEOUT());

      const local = pc.localDescription;
      const sdp = String((local && local.sdp) || offer.sdp || '').trim();
      if(!sdp){
        throw new Error('no SDP generated');
      }

      const offerPayload = b64uEncodeString(JSON.stringify(local));
      let sessionId = '';
      let link = '';
      let usedShortLink = preferredLiveLinkFlow() === 'short';

      if(usedShortLink){
        try{
          const session = await createLiveSignalSession(offerPayload);
          sessionId = String(session.id || '').trim();
          if(!sessionId) throw new Error('Kurzlink-Server hat keine Session-ID geliefert.');
          link = normalizeLiveSessionLink(session.link, sessionId);
          liveExpectedAnswerSession = sessionId;
          setActiveLiveSignalSession(sessionId, link);
          startLiveAnswerPolling(sessionId, link);
        }catch(sessionErr){
          usedShortLink = false;
          clearLiveSignalState();
          liveSessionId = '';
          liveExpectedAnswerSession = '';
          link = buildLiveSignalLink('offer', offerPayload);
          toast(`Kurzlink-Fallback: ${liveErrorText(sessionErr)}`);
        }
      } else {
        clearLiveSignalState();
        liveSessionId = '';
        liveExpectedAnswerSession = '';
        link = buildLiveSignalLink('offer', offerPayload);
      }

      setLiveOutgoingCode({ kind:'offer', link, payload:offerPayload });
      if(elLiveInCode) elLiveInCode.value = '';
      setLiveFlowState(LIVE_FLOW.host_share);
      if(elLiveConnectStatus) elLiveConnectStatus.textContent = '👥 Link bereit';
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = usedShortLink
        ? 'Kurzlink erstellt. Jetzt teilen oder als QR zeigen.'
        : 'Direktlink erstellt. Danach den Answer-Link von Player 2 manuell übernehmen.';
      toast(usedShortLink ? 'Kurzlink erstellt' : 'Direktlink erstellt');
      refreshLiveUi();
      updateButtons();
      return true;
    }catch(_e){
      closeLiveConnection({keepSession:false});
      setLiveFlowState(LIVE_FLOW.error);
      const errName = String((_e && _e.name) ? _e.name : '').trim();
      const errMsg = String((_e && _e.message) ? _e.message : (_e || '')).trim();
      const reason = [errName, errMsg].filter(Boolean).join(': ');
      toast(reason ? `Offer fehlgeschlagen: ${reason}` : 'Offer fehlgeschlagen');
      if(elLiveConnectStatus) elLiveConnectStatus.textContent = '🤦 Offer create failed';
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = reason || 'Offer konnte nicht erzeugt werden.';
      refreshLiveUi();
      updateButtons();
      return false;
    }
  }

  async function handleLiveSessionLink(sessionId){
    const cleanId = extractLiveSessionId(sessionId);
    if(!cleanId) throw new Error('Kurzlink-ID fehlt.');

    const sharedLink = buildLiveSessionLink(cleanId);
    if(elLiveInCode) elLiveInCode.value = sharedLink;

    const session = await fetchLiveSignalSession(cleanId);
    const offerPayload = String(session.offer || '').trim();
    const answerPayload = String(session.answer || '').trim();
    const resolvedLink = normalizeLiveSessionLink(session.link || sharedLink, cleanId);

    if(livePc && liveRole === 'host' && liveExpectedAnswerSession && cleanId === liveExpectedAnswerSession){
      setActiveLiveSignalSession(cleanId, resolvedLink);
      if(answerPayload){
        return applyLiveAnswer(answerPayload, { sessionId:cleanId, sharedLink:resolvedLink });
      }
      setLiveFlowState(LIVE_FLOW.host_wait);
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = 'Warte auf Player 2. Der Answer wird automatisch über denselben Kurzlink abgeholt.';
      startLiveAnswerPolling(cleanId, resolvedLink);
      refreshLiveUi();
      updateButtons();
      return true;
    }

    if(!offerPayload) throw new Error('Im Kurzlink wurde kein Offer gefunden.');
    return applyLiveOffer(offerPayload, {
      sessionId: String(session.id || cleanId).trim(),
      sharedLink: resolvedLink,
    });
  }

  async function applyLiveOffer(offerPayload, options={}){
    const rawPayload = String(offerPayload || '').trim();
    if(!rawPayload) return false;
    if(!liveSupported()) return false;

    try{
      closeLiveConnection({keepSession:false});
      setLiveFlowState(LIVE_FLOW.guest_incoming);
      const sessionId = String(options.sessionId || '').trim();
      const sharedLink = String(options.sharedLink || '').trim() || (sessionId ? buildLiveSessionLink(sessionId) : '');
      if(sessionId){
        setActiveLiveSignalSession(sessionId, sharedLink);
        liveExpectedAnswerSession = sessionId;
      }else{
        clearLiveSignalState();
        liveSessionId = '';
        liveExpectedAnswerSession = '';
      }
      setLiveOutgoingCode();
      livePeerMeta = null;

      const pc = makeLivePeerConnection('guest');
      const offerObj = JSON.parse(b64uDecodeString(rawPayload));
      if(!offerObj || offerObj.type !== 'offer' || !offerObj.sdp) throw new Error('Offer-Link ist ungültig.');
      await pc.setRemoteDescription(offerObj);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await waitIceGatheringComplete(pc, LIVE_ICE_TIMEOUT());

      const local = pc.localDescription;
      if(!local || !local.sdp){
        throw new Error('Answer konnte nicht erzeugt werden.');
      }

      const answerPayload = b64uEncodeString(JSON.stringify(local));
      let answerLink = buildLiveSignalLink('answer', answerPayload);
      let storedOnServer = false;

      if(sessionId){
        try{
          const stored = await storeLiveSignalAnswer(sessionId, answerPayload);
          answerLink = normalizeLiveSessionLink(stored.link || sharedLink, sessionId);
          setActiveLiveSignalSession(sessionId, answerLink);
          storedOnServer = true;
        }catch(storeErr){
          toast(`Kurzlink-Fallback: ${liveErrorText(storeErr)}`);
        }
      }

      setLiveOutgoingCode({ kind:'answer', link:answerLink, payload:answerPayload });
      setLiveFlowState(LIVE_FLOW.guest_reply);
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = storedOnServer
        ? 'Answer gespeichert. Player 1 verbindet automatisch über denselben Kurzlink.'
        : 'Answer erstellt. Diesen Link oder QR an Player 1 zurückgeben.';
      toast(storedOnServer ? 'Answer gespeichert' : 'Answer erstellt');
      clearLiveSignalParamsFromLocation();
      refreshLiveUi();
      updateButtons();
      return true;
    }catch(_e){
      closeLiveConnection({keepSession:false});
      setLiveFlowState(LIVE_FLOW.error);
      toast(`Answer fehlgeschlagen: ${liveErrorText(_e)}`);
      if(elLiveConnectStatus) elLiveConnectStatus.textContent = '🤦 Reply create failed';
      if(elLiveConnectInfo) elLiveConnectInfo.textContent = liveErrorText(_e);
      refreshLiveUi();
      updateButtons();
      return false;
    }
  }

  async function applyLiveAnswer(input, options={}){
    const rawInput = String(input || '').trim();
    if(!rawInput) return false;
    if(!livePc || liveRole!=='host'){
      setLiveFlowState(LIVE_FLOW.host_scan);
      toast('Kein offenes Offer');
      return false;
    }

    let answerPayload = extractLiveAnswerPayload(rawInput);
    const inputSessionId = String(options.sessionId || extractLiveSessionId(rawInput) || '').trim();
    if(!answerPayload){
      answerPayload = extractRawLivePayload(rawInput);
    }
    if(!answerPayload && inputSessionId){
      const session = await fetchLiveSignalSession(inputSessionId);
      answerPayload = String(session.answer || '').trim();
    }
    if(!answerPayload){
      setLiveFlowState(LIVE_FLOW.host_scan);
      toast('Kein Answer-Link gefunden');
      return false;
    }

    if(liveExpectedAnswerSession && inputSessionId && inputSessionId !== liveExpectedAnswerSession){
      setLiveFlowState(LIVE_FLOW.host_scan);
      toast('Answer gehört zu anderer Session');
      return false;
    }

    try{
      const answerObj = JSON.parse(b64uDecodeString(answerPayload));
      if(!answerObj || answerObj.type !== 'answer' || !answerObj.sdp){
        throw new Error('Answer-Link ist ungültig.');
      }
      if(inputSessionId){
        setActiveLiveSignalSession(inputSessionId, String(options.sharedLink || '').trim());
      }

      if(livePc.remoteDescription && livePc.remoteDescription.type === 'answer'){
        if(String(livePc.remoteDescription.sdp || '') === String(answerObj.sdp || '')){
          liveExpectedAnswerSession = '';
          stopLiveAnswerPolling();
          setLiveFlowState(LIVE_FLOW.host_wait);
          refreshLiveUi();
          updateButtons();
          return true;
        }
        throw new Error('Dieser Offer hat bereits einen Answer.');
      }

      await livePc.setRemoteDescription(answerObj);
      liveExpectedAnswerSession = '';
      stopLiveAnswerPolling();
      setLiveOutgoingCode();
      setLiveFlowState(LIVE_FLOW.host_wait);
      toast('Answer angewendet, verbinde…');
      refreshLiveUi();
      updateButtons();
      return true;
    }catch(_e){
      setLiveFlowState(LIVE_FLOW.error);
      toast(`Answer ungültig: ${liveErrorText(_e)}`);
      refreshLiveUi();
      updateButtons();
      return false;
    }
  }

  async function processLiveIncomingCode(input){
    setLivePanelOpen(true);
    const raw = String(input || '').trim();
    if(!raw){
      toast('Kein Live-Link gefunden');
      return false;
    }

    try{
      const sessionId = extractLiveSessionId(raw);
      if(sessionId){
        return handleLiveSessionLink(sessionId);
      }

      const answerPayload = extractLiveAnswerPayload(raw);
      if(answerPayload){
        if(liveFlowState === LIVE_FLOW.host_wait) setLiveFlowState(LIVE_FLOW.host_scan);
        return applyLiveAnswer(answerPayload);
      }

      const offerPayload = extractLiveOfferPayload(raw);
      if(offerPayload){
        setLiveFlowState(LIVE_FLOW.guest_incoming);
        return applyLiveOffer(offerPayload);
      }

      const nakedPayload = extractRawLivePayload(raw);
      if(nakedPayload){
        if(livePc && liveRole === 'host'){
          if(liveFlowState === LIVE_FLOW.host_wait) setLiveFlowState(LIVE_FLOW.host_scan);
          return applyLiveAnswer(nakedPayload);
        }
        setLiveFlowState(LIVE_FLOW.guest_incoming);
        return applyLiveOffer(nakedPayload);
      }
    }catch(err){
      setLiveFlowState(LIVE_FLOW.error);
      toast(`Live-Link ungültig: ${liveErrorText(err)}`);
      refreshLiveUi();
      updateButtons();
      return false;
    }

    toast('Kein gültiger Live-Link gefunden');
    return false;
  }

  function sendLiveMessage(type, data={}){
    if(!liveDc || liveDc.readyState!=='open') return false;
    const message = {
      v: LIVE_SIGNAL_VERSION,
      type: String(type||''),
      sid: liveSessionId || '',
      from: {
        name: currentLiveDisplayName(),
        id: localLiveUserId,
      },
      ...data,
    };

    try{
      liveDc.send(JSON.stringify(message));
      return true;
    }catch(_e){
      return false;
    }
  }

  function enqueueLiveRemoteMove(index, digit, peerAtMs=null, meta=null){
    const i = Number(index);
    const d = String(digit||'');
    const at = Number(peerAtMs);
    if(!(i>=0 && i<81) || !/^[1-9]$/.test(d)) return;
    livePendingRemoteMoves.push({ index:i, digit:d, at: Number.isFinite(at) ? at : null, meta:(meta && typeof meta==='object') ? meta : null });

    const pump = ()=>{
      liveRemotePumpId = null;
      if(!livePendingRemoteMoves.length) return;
      if(!twoPlayerMode || duelOpponentMode!=='live' || gameOverLocked || boardIntroAnimating || isSolved() || finalArcadeActive){
        livePendingRemoteMoves.length = 0;
        return;
      }

      if(duelTurn!=='bot' || duelTurnSwitchId || duelActionLockRemainingMs()>0 || !(duelTurnStartedAtMs>0)){
        liveRemotePumpId = setTimeout(pump, 70);
        return;
      }

      const mv = livePendingRemoteMoves.shift();
      if(mv){
        setCell(mv.index, mv.digit, {countMistake:true, duelActor:'bot', liveRemote:true});
        syncRemoteLiveStats(mv.meta);
        syncLiveTurnClock(mv.at);
      }
      if(livePendingRemoteMoves.length) liveRemotePumpId = setTimeout(pump, 22);
    };

    if(!liveRemotePumpId) liveRemotePumpId = setTimeout(pump, 0);
  }

  function syncLiveTurnClock(peerAtMs){
    if(!(twoPlayerMode && duelOpponentMode==='live')) return;
    if(!(duelTurnStartedAtMs>0)) return;
    const peerTs = Number(peerAtMs);
    if(!Number.isFinite(peerTs)) return;
    const lagMs = Date.now() - peerTs;
    if(!(lagMs>0) || lagMs>6500) return;
    duelTurnStartedAtMs = Math.max(0, duelTurnStartedAtMs - lagMs);
    duelTurnSec = duelRemainingFor(duelTurn);
    updateTimerHud();
  }

  function sendLiveMove(index, digit){
    if(!(twoPlayerMode && duelOpponentMode==='live')) return;
    if(!liveIsConnected()) return;
    const i = Number(index);
    const d = String(digit||'');
    if(!(i>=0 && i<81) || !/^[1-9]$/.test(d)) return;
    const local = duelStats.human || { score:0, mistakes:0, usedSec:0 };
    const liveTurnUsedSec = (duelTurn === 'human' && duelTurnStartedAtMs > 0)
      ? Math.min(duelTurnStartSec, Math.max(0, (Date.now() - duelTurnStartedAtMs) / 1000))
      : 0;
    sendLiveMessage('move', {
      index:i,
      digit:d,
      at:Date.now(),
      score: Math.round(Number(local.score)||0),
      mistakes: Math.max(0, Math.round(Number(local.mistakes)||0)),
      usedSec: Math.max(0, (Number(local.usedSec)||0) + liveTurnUsedSec),
    });
  }

  function makeLiveStartState(){
    const cleanName = sanitizeUserName(inpUserName ? inpUserName.value : userName);
    return {
      puzzle,
      grid: boardString(),
      fixedMask: buildFixedMaskForPuzzle(puzzle, fixed.map(v=>v ? '1' : '0').join('')),
      notes: notesSetsToArray(),
      levelId: activeLevelId,
      logicWaveEnabled: !!logicWaveEnabled,
      twoPlayerMode: true,
      duelHumanTurnBaseSec,
      duelBotTurnBaseSec,
      symbolMode,
      activeEmojiPreset,
      activeSoundPreset,
      activeMelodyPattern,
      activeUiSkin,
      liveTurnSec: normalizeLiveDuelTurnSec(liveDuelTurnSecPref),
      userName: cleanName,
      score,
      mistakes,
      timeSec: currentElapsedSec(),
    };
  }

  function buildLiveStartPayload(state=null){
    const src = (state && typeof state==='object') ? state : makeLiveStartState();
    const liveTurnSec = Object.prototype.hasOwnProperty.call(src, 'liveTurnSec')
      ? normalizeLiveDuelTurnSec(src.liveTurnSec)
      : normalizeLiveDuelTurnSec(liveDuelTurnSecPref);
    const payload = {
      v: 1,
      p: normalizeBoard81(src.puzzle, {allowBlank:true}) || puzzle,
      gid: sanitizeShareGameId(src.shareGameId) || normalizeActiveShareGameId(src.puzzle || puzzle),
      tp: true,
      lw: !!src.logicWaveEnabled,
      lvl: LEVEL_MAP[src.levelId] ? src.levelId : activeLevelId,
      m: sanitizeSymbolMode(src.symbolMode) || symbolMode,
      ap: sanitizeEmojiPresetId(src.activeEmojiPreset) || activeEmojiPreset,
      snd: sanitizeSoundPreset(src.activeSoundPreset) || activeSoundPreset,
      mel: sanitizeMelodyPattern(src.activeMelodyPattern) || activeMelodyPattern,
      skin: sanitizeUiSkin(src.activeUiSkin) || activeUiSkin,
      dhs: sanitizeDuelTurnSec(src.duelHumanTurnBaseSec, 'human') || duelHumanTurnBaseSec,
      dbs: sanitizeDuelTurnSec(src.duelBotTurnBaseSec, 'bot') || duelBotTurnBaseSec,
      lts: liveTurnSec,
      gs: sanitizeShareStatInt(src.score, -999999, 999999) ?? score,
      gm: sanitizeShareStatInt(src.mistakes, 0, 9999) ?? mistakes,
      gt: sanitizeShareStatInt(src.timeSec, 0, 864000) ?? currentElapsedSec(),
    };

    const mergedGrid = mergePuzzleIntoGrid(payload.p, src.grid);
    if(mergedGrid && mergedGrid !== payload.p) payload.g = mergedGrid;

    const fixedMask = buildFixedMaskForPuzzle(payload.p, src.fixedMask);
    const defaultMask = buildFixedMaskForPuzzle(payload.p, null);
    if(fixedMask && defaultMask && fixedMask !== defaultMask) payload.fm = fixedMask;

    const noteRows = sanitizeNotesArray(src.notes);
    if(noteRows && noteRows.some(Boolean)) payload.n = noteRows;

    const sharedName = sanitizeUserName(src.userName);
    if(sharedName){
      payload.un = sharedName;
      payload.us = payload.gs;
      payload.um = payload.gm;
      payload.ut = payload.gt;
      payload.ud = Date.now();
    }

    return payload;
  }


  function sendLiveStartSignal({quiet=false, force=false, starterRole=''}={}){
    if(!(force || (twoPlayerMode && duelOpponentMode==='live'))) return false;
    if(!liveIsConnected()) return false;
    if(liveRole!=='host'){
      if(!quiet) toast('Nur Player 1 startet das Live Game');
      return false;
    }
    if(liveGameStartedForSession){
      if(!quiet) toast('Live Game läuft bereits');
      return false;
    }
    const chosenStarter = chooseNextLiveStarterRole(starterRole);
    const state = makeLiveStartState();
    const startPayload = buildLiveStartPayload(state);
    const sent = sendLiveMessage('start', { state:startPayload, starterRole:chosenStarter });
    if(!sent && !quiet) toast('Live start konnte nicht gesendet werden');
    return sent;
  }

  async function startLiveGame({sendSignal=true, starterRole=''}={}){
    if(!liveIsConnected()){
      toast('Live nicht verbunden');
      refreshLiveUi();
      return false;
    }
    if(liveRole!=='host'){
      toast('Player 1 startet das Live Game');
      refreshLiveUi();
      return false;
    }
    if(liveGameStartedForSession){
      toast('Live Game läuft bereits');
      refreshLiveUi();
      return false;
    }

    const chosenStarter = chooseNextLiveStarterRole(starterRole);
    const startPayload = buildLiveStartPayload(makeLiveStartState());
    sendLivePreferenceSync({quiet:true});

    if(sendSignal){
      const sent = sendLiveStartSignal({quiet:false, force:true, starterRole:chosenStarter});
      if(!sent) return false;
    }

    liveRoundStarterRole = chosenStarter;
    liveGameStartedForSession = true;
    duelOpponentMode = 'live';
    applySharedState(startPayload, {source:'live', keepSharedMeta:false});
    setTwoPlayerMode(true, {announce:false, opponentMode:'live'});
    closeConnectFlow();
    setLivePanelOpen(false);
    clearBotThink();
    updateButtons();
    toast(`Live-Spiel gestartet · ${liveRoleLabel(chosenStarter)} beginnt`);
    return true;
  }

  function handleLiveDataMessage(raw){
    const text = String(raw||'').trim();
    if(!text) return;

    let msg = null;
    try{ msg = JSON.parse(text); }catch(_e){ return; }
    if(!msg || typeof msg!=='object') return;

    const sid = sanitizeShareGameId(msg.sid || '');
    if(sid && liveSessionId && sid !== liveSessionId) return;
    if(sid && !liveSessionId) liveSessionId = sid;

    const from = (msg.from && typeof msg.from==='object') ? msg.from : null;
    if(from){
      const peerName = sanitizeUserName(from.name || '');
      const peerId = sanitizeShareGameId(from.id || '');
      if(peerName || peerId){
        livePeerMeta = { name: peerName || 'Player', id: peerId || '' };
      }
    }

    const type = String(msg.type || '').trim();
    if(type==='hello'){
      if(liveRole==='host'){
        setTimeout(()=>{ sendLivePreferenceSync({quiet:true}); }, 40);
      }
      refreshLiveUi();
      updateButtons();
      return;
    }

    if(type==='prefs'){
      if(liveRole==='guest'){
        const applied = applyLivePreferencePacket(msg.packet);
        if(applied) toast('Player 1 Einstellungen übernommen');
      }
      refreshLiveUi();
      updateButtons();
      return;
    }

    if(type==='ping'){
      sendLiveMessage('pong', { at: msg.at || Date.now() });
      return;
    }

    if(type==='pong'){
      return;
    }

    if(type==='move'){
      enqueueLiveRemoteMove(msg.index, msg.digit, msg.at, {
        score: msg.score,
        mistakes: msg.mistakes,
        usedSec: msg.usedSec,
      });
      refreshLiveUi();
      updateButtons();
      return;
    }

    if(type==='turn'){
      const kind = String(msg.kind || '').trim();
      if(kind==='timeout'){
        const senderActor = msg.actor==='bot' ? 'bot' : 'human';
        const localTimedOutActor = senderActor==='human' ? 'bot' : 'human';
        onDuelTimeout({broadcast:false, forcedActor:localTimedOutActor});
        syncRemoteLiveStats({
          score: msg.score,
          mistakes: msg.mistakes,
          usedSec: msg.usedSec,
        });
        syncLiveTurnClock(msg.at);
      }
      refreshLiveUi();
      updateButtons();
      return;
    }

    if(type==='round'){
      const kind = String(msg.kind || '').trim();
      if(kind==='solved') toast('Live: Gegner hat entschieden · neues Spiel kommt');
      else if(kind==='game_over') toast('Live: Gegner hat verloren · neues Spiel kommt');
      else toast('Live: Runde beendet');
      refreshLiveUi();
      updateButtons();
      return;
    }

    if(type==='start'){
      const startState = (msg.state && typeof msg.state==='object') ? msg.state : null;
      let decoded = startState;
      if(!decoded){
        const token = extractShareToken(msg.shareToken || '');
        if(token) decoded = decodeShareToken(token);
      }
      if(decoded){
        liveRoundStarterRole = chooseNextLiveStarterRole(msg.starterRole);
        liveGameStartedForSession = true;
        duelOpponentMode = 'live';
        applySharedState(decoded, {source:'live', keepSharedMeta:false});
        setTwoPlayerMode(true, {announce:false, opponentMode:'live'});
        closeConnectFlow();
        setLivePanelOpen(false);
        toast(`Live-Spiel gestartet · ${liveRoleLabel(liveRoundStarterRole)} beginnt`);
      }else{
        toast('Live start payload ungültig');
      }
      refreshLiveUi();
      updateButtons();
      return;
    }

    refreshLiveUi();
    updateButtons();
  }

  async function tryLoadLiveSignalFromLocation(){
    const sessionId = getLiveSessionIdFromLocation();
    const offerPayload = getLiveOfferToken();
    const answerPayload = getLiveAnswerToken();
    if(!sessionId && !offerPayload && !answerPayload) return false;

    const raw = sessionId
      ? buildLiveSessionLink(sessionId)
      : (answerPayload ? buildLiveSignalLink('answer', answerPayload) : buildLiveSignalLink('offer', offerPayload));

    setLivePanelOpen(true);
    if(elLiveInCode) elLiveInCode.value = raw;

    let ok = false;
    try{
      ok = await processLiveIncomingCode(raw);
    }catch(_e){
      ok = false;
    }

    if(!ok){
      setLiveFlowState(LIVE_FLOW.error);
      toast(sessionId ? 'Incoming Kurzlink ungültig' : (answerPayload ? 'Incoming Answer ungültig' : 'Incoming Offer ungültig'));
      refreshLiveUi();
      updateButtons();
    }

    clearLiveSignalParamsFromLocation();
    return ok;
  }

  function setTwoPlayerMode(enabled, {announce=true, opponentMode=null}={}){
    const next = !!enabled;
    const requestedOpponent = opponentMode==='live' ? 'live' : (opponentMode==='bot' ? 'bot' : duelOpponentMode);
    if(requestedOpponent!==duelOpponentMode){
      duelOpponentMode = requestedOpponent;
      if(duelOpponentMode==='live') clearBotThink();
      else clearLiveRemoteMoveQueue();
    }

    if(twoPlayerMode === next){
      refreshDuelBoardVisibility();
      updateButtons();
      if(announce) toast(next ? (duelOpponentMode==='live' ? '2P live an' : '2P vs 🤖 an') : '2P aus');
      if(next && duelOpponentMode==='bot') queueBotTurn();
      return;
    }

    twoPlayerMode = next;
    if(!next) clearLiveRemoteMoveQueue();
    duelTurn = 'human';
    duelIdleTimeoutStreak = 0;
    duelIdleBonusActive = false;
    duelTurnSec = currentDuelBaseSec('human');
    duelTurnStartSec = currentDuelBaseSec('human');
    duelTurnStartedAtMs = 0;
    duelActionLockUntilMs = 0;

    stopTimer();
    startTimer();
    refreshDuelBoardVisibility();
    updateButtons();

    if(announce) toast(next ? (duelOpponentMode==='live' ? '2P live an' : '2P vs 🤖 an') : '2P aus');
  }

    if(gameOverLocked){

  function resetSolveDragTrace(){
    solveDragTrace.length = 0;
    solveDragSeq = 0;
  }

  function recordSolveDrag(index, digit){
    const idx = Number(index);
    const d = String(digit||'');
    if(!(idx>=0 && idx<81)) return;
    if(!/^[1-9]$/.test(d)) return;
    solveDragTrace.push({ index: idx, digit: d, seq: ++solveDragSeq });
  }

  function getUserSolveBacktrackIndices(){
    if(!solution || !puzzle || puzzle.length!==81) return [];

    const lastByIndex = new Map();
    for(const step of solveDragTrace){
      if(!step) continue;
      const idx = Number(step.index);
      const d = String(step.digit||'');
      const seq = Number(step.seq)||0;
      if(!(idx>=0 && idx<81)) continue;
      if(!/^[1-9]$/.test(d)) continue;
      if(solution[idx] !== d) continue;
      lastByIndex.set(idx, { index: idx, seq });
    }

    const forward = [];
    for(let i=0;i<81;i++){
      if(puzzle[i] !== BLANK) continue;
      const step = lastByIndex.get(i);
      if(!step) return [];
      forward.push(step);
    }

    if(!forward.length) return [];
    forward.sort((a,b)=>a.seq - b.seq);
    return forward.map(step=>step.index).reverse();
  }

  function playUserSolveBacktrackPrelude(startDelayMs=0, {token=null}={}){
    const indices = getUserSolveBacktrackIndices();
    if(!indices.length) return 0;
    const stepMs = 92;
    playAndMarkPathOnce(indices, startDelayMs, {
      stepMs,
      amp: 0.145,
      token,
      clearStart: true,
    });
    return pathSequenceDurationMs(indices, stepMs) + 72;
  }

  function scheduleFinalArcade(fn, delayMs=0){
    const id = setTimeout(()=>{
      finalArcadeTimers.delete(id);
      fn();
    }, Math.max(0, Number(delayMs)||0));
    finalArcadeTimers.add(id);
    return id;
  }

  function clearFinalArcadeTimers(){

    const nodes = [];
    for(let i=0;i<81;i++){
      if(!fixed[i]) continue;

  function resetFinalArcade({deactivate=true, stopMelody=true, clearTimers=true}={}){
    if(clearTimers) clearFinalArcadeTimers();
    clearFinalArcadeFxNodes();
    if(stopMelody) stopFinalArcadeMelodyLoop({stopPhrase:true});
    finalArcadeRunning = false;

  function isFinalArcadeVisibleCell(index){
    const i = Number(index);
    if(!(i>=0 && i<81)) return false;
    if(grid[i]===BLANK) return false;
    return !finalArcadeRemoved.has(i);
  }

  function finalArcadeVisibleCells(){
    const out = [];
    for(let i=0;i<81;i++){
      if(isFinalArcadeVisibleCell(i)) out.push(i);
    }
    return out;
  }

  function finalArcadeVisibleCount(){
    return finalArcadeVisibleCells().length;
  }

  function finalArcadeNeighbor(index, dirId){
    const d = FINAL_ARCADE_DIR[dirId];
    if(!d) return -1;
    const [r,c] = idxToRC(index);
    const nr = r + d.dr;
    const nc = c + d.dc;
    if(nr<0 || nr>8 || nc<0 || nc>8) return -1;
    return rcToIdx(nr, nc);
  }

  function finalArcadeNextTarget(index, dirId){
    const next = finalArcadeNeighbor(index, dirId);
    if(next < 0) return -1;
    return isFinalArcadeVisibleCell(next) ? next : -1;
  }

  function finalArcadeCountTargets(index, dirId){
    let count = 0;
    let cur = index;
    while(true){
      cur = finalArcadeNeighbor(cur, dirId);
      if(cur < 0) break;
      if(!isFinalArcadeVisibleCell(cur)) break;
      count++;
    }
    return count;
  }

  function chooseFinalArcadeDirection(index, prevDir=''){
    let best = 0;
    const counts = {};
    for(const dirId of FINAL_ARCADE_DIR_ORDER){
      const n = finalArcadeCountTargets(index, dirId);
      counts[dirId] = n;
      if(n > best) best = n;
    }
    if(best<=0) return '';

    const opposite = prevDir && FINAL_ARCADE_DIR[prevDir] ? FINAL_ARCADE_DIR[prevDir].opposite : '';
    let candidates = FINAL_ARCADE_DIR_ORDER.filter(dirId => counts[dirId]===best);
    if(opposite && candidates.length>1){
      const filtered = candidates.filter(dirId => dirId!==opposite);
      if(filtered.length) candidates = filtered;
    }
    return candidates[0] || '';
  }

  function finalArcadeExplosionTargets(origin, shotCount){
    const shots = Math.max(0, Math.min(9, Number(shotCount)||0));
    if(shots<=0) return [];

    const [r,c] = idxToRC(origin);
    const out = [];
    const blocked = FINAL_ARCADE_DIAGONAL_ORDER.map(()=>false);

    for(let dist=1; dist<=8 && out.length<shots; dist++){
      for(let i=0;i<FINAL_ARCADE_DIAGONAL_ORDER.length && out.length<shots;i++){
        if(blocked[i]) continue;
        const off = FINAL_ARCADE_DIAGONAL_ORDER[i];
        const nr = r + (off.dr * dist);
        const nc = c + (off.dc * dist);

        if(nr<0 || nr>8 || nc<0 || nc>8){
          blocked[i] = true;
          continue;
        }

        const idx = rcToIdx(nr, nc);
        if(!isFinalArcadeVisibleCell(idx)){
          blocked[i] = true;
          continue;
        }

        out.push({ index: idx, dir: off.dir || 'up' });
      }
    }

    return out;
  }

  function finalArcadeImplodeOrigin(origin, attackerDigit){
    if(!isFinalArcadeVisibleCell(origin)) return false;
    const eaten = String(grid[origin] || '');
    finalArcadeRemoved.add(origin);
    playFinalArcadeEatCue(attackerDigit, eaten);
    render();
    finalArcadeSpawnExplosionGlyph(origin, attackerDigit, 'up');
    return true;
  }

  function finalArcadeSpawnExplosionGlyph(index, digit, dirId='up'){
    const cell = elBoard.querySelector(`.cell[data-i="${index}"]`);
    if(!cell) return;

    const ghost = document.createElement('div');
    ghost.className = 'val arcadeExplosionVal';
