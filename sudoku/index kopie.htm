    cell.classList.add('arcadeBlast', 'arcadeHit');
    const d = FINAL_ARCADE_DIR[dirId];
    if(d && d.className) cell.classList.add(d.className);

    scheduleFinalArcade(()=>{
      if(!cell || !cell.isConnected) return;
      ghost.remove();
      cell.classList.remove('arcadeBlast', 'arcadeHit', 'arcadeUp', 'arcadeRight', 'arcadeDown', 'arcadeLeft');
    }, 260);
  }


  function finalArcadeFlash(sourceIndex, targetIndex, dirId){
    const src = elBoard.querySelector(`.cell[data-i="${sourceIndex}"]`);
    if(src){
      src.classList.add('arcadeSource', 'arcadeMuzzleCell');
    }

    const target = elBoard.querySelector(`.cell[data-i="${targetIndex}"]`);
    if(target){
      target.classList.add('arcadeBlast', 'arcadeHit');
      const d = FINAL_ARCADE_DIR[dirId];
      if(d && d.className) target.classList.add(d.className);
    }

    spawnFinalArcadeShotFx(sourceIndex, targetIndex, dirId);

    scheduleFinalArcade(()=>{
      if(src && src.isConnected) src.classList.remove('arcadeSource', 'arcadeMuzzleCell');
      if(target && target.isConnected){
        target.classList.remove('arcadeBlast', 'arcadeHit', 'arcadeUp', 'arcadeRight', 'arcadeDown', 'arcadeLeft');
      }
    }, 230);
  }


  function playFinalArcadeEatCue(attackerDigit, eatenDigit){
    if(!soundOn) return;
    const atk = String(attackerDigit||'');
    const eat = String(eatenDigit||'');
    if(/^[1-9]$/.test(atk)) playToneDigit(atk, 0, 0.20);
    if(/^[1-9]$/.test(eat)) playToneDigit(eat, 0.09, 0.16);
  }

  function playFinalArcadeEmptyCue(){
    if(!soundOn) return;
    const nowMs = Date.now();
    if((nowMs - finalArcadeEmptyCueAtMs) < 72) return;
    finalArcadeEmptyCueAtMs = nowMs;

    const ctx = ensureAudio();
    if(!ctx || ctx.state!=='running') return;
    const t = ctx.currentTime + 0.002;

    // Low thump body.
    try{
      const osc = ctx.createOscillator();
      const bodyGain = ctx.createGain();
      const lp = ctx.createBiquadFilter();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(92, t);
      osc.frequency.exponentialRampToValueAtTime(58, t + 0.085);

      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(420, t);
      lp.Q.setValueAtTime(0.65, t);

      bodyGain.gain.setValueAtTime(0.0001, t);
      bodyGain.gain.exponentialRampToValueAtTime(0.11, t + 0.010);
      bodyGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.118);

      osc.connect(lp);
      lp.connect(bodyGain);
      bodyGain.connect(masterGain);

      osc.start(t);
      osc.stop(t + 0.125);
    }catch(_e){}

    // Soft noisy click on top for percussive attack.
    try{
      const src = ctx.createBufferSource();
      src.buffer = ensurePercNoiseBuffer(ctx);

      const hp = ctx.createBiquadFilter();
      const lp = ctx.createBiquadFilter();
      const nGain = ctx.createGain();

      hp.type = 'highpass';
      hp.frequency.setValueAtTime(90, t);
      hp.Q.setValueAtTime(0.6, t);

      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(760, t);
      lp.Q.setValueAtTime(0.7, t);

      nGain.gain.setValueAtTime(0.0001, t);
      nGain.gain.exponentialRampToValueAtTime(0.050, t + 0.006);
      nGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.075);

      src.connect(hp);
      hp.connect(lp);
      lp.connect(nGain);
      nGain.connect(masterGain);

      src.start(t);
      src.stop(t + 0.085);
    }catch(_e){}
  }

  function playFinalArcadeOutro(){
    if(!soundOn) return;
    const base = TONE_HZ['1'] || 261.626;
    const semis = [0,4,7,12,7,12,16,19,16,12,7,4,0];

    // Slower outro with periodic phrase breaks.
    const baseStepMs = 214;
    const pauseAfterIndexMs = {
      3: 228,
      7: 246,
      11: 212,
    };

    let cursorMs = 0;
    const events = [];
    for(let i=0;i<semis.length;i++){
      const isCadence = (i===3 || i===7 || i===11 || i===semis.length-1);
      const dur = isCadence ? 0.52 : 0.38;
      const amp = isCadence ? 0.22 : 0.20;
      events.push({ semis: semis[i], atMs: cursorMs, amp, dur });
      cursorMs += baseStepMs;
      if(Object.prototype.hasOwnProperty.call(pauseAfterIndexMs, i)){
        cursorMs += Number(pauseAfterIndexMs[i]) || 0;
      }
    }

    const melodyDurationMs = Math.max(1800, cursorMs + 980);
    if(!claimMelodyWindow(melodyDurationMs)) return;

    for(const ev of events){
      playToneHz(hzFromSemis(base, ev.semis), ev.atMs, ev.amp, ev.dur);
    }
  }

  function pickNextFinalArcadeStart(fromIndex=-1){
    const alive = finalArcadeVisibleCells();
    if(!alive.length) return -1;
    if(!(fromIndex>=0 && fromIndex<81)) return alive[0];

    const [fr,fc] = idxToRC(fromIndex);
    let best = alive[0];
    let bestDist = 999;

    for(const idx of alive){
      const [r,c] = idxToRC(idx);
      const dist = Math.abs(r-fr) + Math.abs(c-fc);
      if(dist < bestDist || (dist===bestDist && idx < best)){
        bestDist = dist;
        best = idx;
      }
    }
    return best;
  }

  function finishFinalArcade(){
    finalArcadeRunning = false;
    if(finalArcadeVisibleCount()<=0){
      stopFinalArcadeMelodyLoop({stopPhrase:true});
      toast('Arcade clear');
      playFinalArcadeOutro();
      updateButtons();
      if(!finalArcadeAutoNewQueued){
        finalArcadeAutoNewQueued = true;
        scheduleFinalArcade(()=>{
          finalArcadeAutoNewQueued = false;
          if(!finalArcadeActive) return;
          if(finalArcadeVisibleCount()>0) return;
          genNew(0, { animateIntro:true, showGeneratingToast:false, readyToast:'Neues Sudoku' });
        }, 1850);
      }
    }
  }

  function runFinalArcadeBurst(startIndex, onDone){
    if(!isFinalArcadeVisibleCell(startIndex)){
      onDone(startIndex);
      return;
    }

    const attacker = String(grid[startIndex] || '1');
    const origin = startIndex;
    const state = { lastHit: origin };
    const shots = { left: Math.max(1, Math.min(9, Number(attacker)||1)) };

    const finish = ()=>{
      onDone(state.lastHit);
    };

    const runDirectionSegment = (dirId, done)=>{
      let cursor = origin;

      const fireOne = ()=>{
        if(!finalArcadeActive){
          finalArcadeRunning = false;
          return;
        }
        if(shots.left<=0 || finalArcadeVisibleCount()<=0){
          done();
          return;
        }

        const target = finalArcadeNextTarget(cursor, dirId);
        if(target<0){
          done();
          return;
        }

        const eaten = String(grid[target] || '');
        finalArcadeRemoved.add(target);
        playFinalArcadeEatCue(attacker, eaten);
        render();
        finalArcadeFlash(cursor, target, dirId);

        cursor = target;
        state.lastHit = target;
        shots.left--;

        if(shots.left<=0 || finalArcadeVisibleCount()<=0){
          scheduleFinalArcade(done, 140);
          return;
        }

        scheduleFinalArcade(fireOne, 118);
      };

      fireOne();
    };

    const runExplosion = (done)=>{
      if(shots.left<=0 || finalArcadeVisibleCount()<=0){
        done();
        return;
      }

      const wantedShots = Math.max(0, shots.left);
      const targets = finalArcadeExplosionTargets(origin, wantedShots);

      if(!targets.length){
        const imploded = finalArcadeImplodeOrigin(origin, attacker);
        if(imploded) state.lastHit = origin;
        shots.left = 0;
        scheduleFinalArcade(done, imploded ? 190 : 90);
        return;
      }

      let pos = 0;
      let used = 0;
      const blastNext = ()=>{
        if(!finalArcadeActive){
          finalArcadeRunning = false;
          return;
        }
        if(pos>=targets.length || finalArcadeVisibleCount()<=0){
          shots.left = Math.max(0, wantedShots - used);
          if(shots.left>0){
            const imploded = finalArcadeImplodeOrigin(origin, attacker);
            if(imploded) state.lastHit = origin;
            shots.left = 0;
            scheduleFinalArcade(done, imploded ? 190 : 100);
            return;
          }
          scheduleFinalArcade(done, 140);
          return;
        }

        const item = targets[pos++];
        const target = item.index;
        if(!isFinalArcadeVisibleCell(target)){
          scheduleFinalArcade(blastNext, 66);
          return;
        }

        const eaten = String(grid[target] || '');
        finalArcadeRemoved.add(target);
        playFinalArcadeEatCue(attacker, eaten);
        render();
        finalArcadeFlash(origin, target, item.dir || 'up');
        finalArcadeSpawnExplosionGlyph(target, attacker, item.dir || 'up');

        used++;
        state.lastHit = target;
        scheduleFinalArcade(blastNext, 108);
      };

      blastNext();
    };

    const primaryDir = chooseFinalArcadeDirection(origin, '');
    const fallbackDirs = ['up','right','down','left'];

    const runFallback = (idx)=>{
      if(!finalArcadeActive){
        finalArcadeRunning = false;
        return;
      }
      if(shots.left<=0 || finalArcadeVisibleCount()<=0){
        finish();
        return;
      }
      if(idx >= fallbackDirs.length){
        runExplosion(()=>finish());
        return;
      }
      runDirectionSegment(fallbackDirs[idx], ()=>{
        scheduleFinalArcade(()=>runFallback(idx+1), 66);
      });
    };

    if(primaryDir){
      runDirectionSegment(primaryDir, ()=>{
        scheduleFinalArcade(()=>runFallback(0), 70);
      });
    } else {
      runFallback(0);
    }
  }

  function runFinalArcadeChainFrom(startIndex){
    if(!finalArcadeActive) return;

    const alive = finalArcadeVisibleCount();
    if(alive<=0){
      finishFinalArcade();
      return;
    }

    const start = isFinalArcadeVisibleCell(startIndex) ? startIndex : -1;
    if(start<0){
      finalArcadeRunning = false;
      return;
    }

    runFinalArcadeBurst(start, ()=>{
      if(!finalArcadeActive) return;
      if(finalArcadeVisibleCount()<=0){
        scheduleFinalArcade(finishFinalArcade, 240);
        return;
      }
      finalArcadeRunning = false;
    });
  }

  function startFinalArcadeFrom(index){
    const i = Number(index);
    if(!finalArcadeActive) return;
    if(!(i>=0 && i<81)) return;

    if(finalArcadeRunning){
      toast('Arcade läuft…');
      return;
    }

    if(!isFinalArcadeVisibleCell(i)) return;

    // Keep completion melodies running while arcade shots play.

    finalArcadeRunning = true;
    runFinalArcadeChainFrom(i);
  }

  function activateFinalArcade(){
    if(finalArcadeActive) return;
    resetFinalArcade({deactivate:false, stopMelody:false, clearTimers:false});
    finalArcadeActive = true;
    render();
  }

  function onPuzzleSolved(solver='human'){
    stopTimer();
    if(elBoard){
      elBoard.classList.remove('duelOpponentTurn');
      elBoard.classList.remove('duelTurnFade');
    }
    if(!finalScoreShown){
      finalScoreShown = true;
      const solverActor = (solver==='bot') ? 'bot' : 'human';
      const solvedTitle = twoPlayerMode
        ? (solverActor==='bot' ? 'you lost' : 'you won')
        : 'points';
      showFinalScorePanel({title: solvedTitle});
    }
    snapshotSolvedShareStats();
    const localMeta = solvedShareStats
      ? normalizeShareResultMeta({
          name: sanitizeUserName(inpUserName ? inpUserName.value : userName) || 'Player',
          score: solvedShareStats.score,
          mistakes: solvedShareStats.mistakes,
          timeSec: solvedShareStats.timeSec,
          at: Date.now(),
        }, 'Player')
      : normalizeCurrentResultMeta();
    if(localMeta) upsertSharedGameResult(normalizeActiveShareGameId(puzzle), localMeta);
    if(playEndgameEnabled){
      activateFinalArcade();
      toast('Gelöst! Hidden: Icon klicken');
    } else {
      resetFinalArcade({deactivate:true});
      toast('Gelöst!');
    }
    refreshSolvedShareBar();
    refreshShareComparePanel();
    if(twoPlayerMode && duelOpponentMode==='live' && solver==='human'){
      sendLiveMessage('round', { kind:'solved' });
      scheduleLiveResultRestart(playEndgameEnabled ? 1400 : LIVE_RESULT_RESTART_DELAY_MS);
    }
  }

  function boardString(){ return grid.join(''); }

  function unitOfIndex(index){
    const r = Math.floor(index/9);
    const c = index%9;
    const br = Math.floor(r/3)*3;
    const bc = Math.floor(c/3)*3;
    const unit = new Set();
    for(let k=0;k<9;k++) unit.add(r*9+k);
    for(let k=0;k<9;k++) unit.add(k*9+c);
    for(let rr=br; rr<br+3; rr++) for(let cc=bc; cc<bc+3; cc++) unit.add(rr*9+cc);
    return unit;
  }

  function boxIndicesOf(index){
    const r = Math.floor(index/9);
    const c = index%9;
    const br = Math.floor(r/3)*3;
    const bc = Math.floor(c/3)*3;
    const out = [];
    for(let rr=0; rr<3; rr++){
      for(let cc=0; cc<3; cc++){
        out.push((br+rr)*9 + (bc+cc));
      }
    }
    return out; // row-major within the box
  }

  function isBoxComplete(indices){
    for(const i of indices){
      if(grid[i] === BLANK) return false;
    }
    return true;
  }

  function playAndMarkPathOnce(indices, startDelayMs=0, {stepMs=140, amp=0.16, token=null, clearStart=true, compactSkipped=false, onDone=null}={}){
    if(!Array.isArray(indices) || indices.length===0){
      if(typeof onDone==='function') onDone();
      return 0;
    }

    let baseDelayMs = Math.max(0, Number(startDelayMs)||0);
    if(clearStart){
      const waitMs = melodyWindowRemainingMs();
      if(waitMs>0) baseDelayMs += waitMs + MELODY_QUEUE_GAP_MS;
    }

    const seqDurationMs = Math.max(220, baseDelayMs + pathSequenceDurationMs(indices, stepMs) + 160);
    if(clearStart){
      if(!claimMelodyWindow(seqDurationMs)){
        // The sequence may be intentionally queued behind an active melody.
        // Reserve the window instead of dropping row/box/col playback.
        extendMelodyWindow(seqDurationMs);
      }
    } else {
      extendMelodyWindow(seqDurationMs);
    }

    // cancel previous path sequences unless a shared token is provided (for chained sequences)
    const my = Number.isFinite(token) ? token : ++pathSeqToken;

    // clear any existing marks
    if(clearStart){
      const prevMarks = elBoard.querySelectorAll('.cell.boxMark');
      prevMarks.forEach(n=>n.classList.remove('boxMark'));
    }

    let cursor = 0;
    const finish = ()=>{
      if(typeof onDone==='function'){
        try{ onDone(); }catch(_e){}
      }
    };

    const scheduleStep = (delay)=>{
      setTimeout(runStep, Math.max(0, Number(delay)||0));
    };

    const runStep = ()=>{
      if(my !== pathSeqToken){
        finish();
        return;
      }

      while(cursor < indices.length){
        const idx = indices[cursor++];

        // clear previous mark in this sequence
        const marks = elBoard.querySelectorAll('.cell.boxMark');
        marks.forEach(n=>n.classList.remove('boxMark'));

        // Outro/Gimmick sync: play only cells that are still present and filled.
        const removedByArcade = finalArcadeRemoved.has(idx);
        const vNow = grid[idx];
        const playable = !removedByArcade && vNow !== BLANK;

        if(!playable){
          if(compactSkipped) continue; // skip fully: no replacement pause
          scheduleStep(stepMs);
          return;
        }

        const node = elBoard.querySelector(`.cell[data-i="${idx}"]`);
        if(node) node.classList.add('boxMark');
        playToneDigit(String(vNow), 0, amp);

        if(cursor >= indices.length){
          setTimeout(()=>{
            if(my !== pathSeqToken) return;
            const n2 = elBoard.querySelector(`.cell[data-i="${idx}"]`);
            if(n2) n2.classList.remove('boxMark');
          }, 180);
          finish();
        } else {
          if(compactSkipped){
            let hasPlayableAhead = false;
            for(let j=cursor; j<indices.length; j++){
              const nx = indices[j];
              if(finalArcadeRemoved.has(nx)) continue;
              if(grid[nx]===BLANK) continue;
              hasPlayableAhead = true;
              break;
            }
            if(!hasPlayableAhead){
              finish();
              return;
            }
          }
          scheduleStep(stepMs);
        }
        return;
      }

      finish();
    };

    scheduleStep(baseDelayMs);
    return seqDurationMs;
  }

  function playAndMarkBoxOnce(indices, startDelayMs=0, {stepMs=140, amp=0.16, token=null, clearStart=true, compactSkipped=false, onDone=null}={}){
    if(!indices || indices.length!==9){
      if(typeof onDone==='function') onDone();
      return 0;
    }
    // cancel any previous box sequences
    if(!Number.isFinite(token)) ++boxSeqToken;
    return playAndMarkPathOnce(indices, startDelayMs, {stepMs, amp, token, clearStart, compactSkipped, onDone});
  }

  function playAndMarkSequenceChain(sequences, startDelayMs=0, {token=null, compactSkipped=false, onDone=null}={}){
    const baseDelay = Math.max(0, Number(startDelayMs)||0);
    if(!Array.isArray(sequences) || !sequences.length){
      if(typeof onDone==='function'){
        try{ onDone(); }catch(_e){}
      }
      return baseDelay;
    }

    const my = Number.isFinite(token) ? token : ++pathSeqToken;
    const baseDelayMs = baseDelay;
    let idx = 0;
    let finished = false;

    const finish = ()=>{
      if(finished) return;
      finished = true;
      if(typeof onDone==='function'){
        try{ onDone(); }catch(_e){}
      }
    };

    const runNext = ()=>{
      if(my !== pathSeqToken) return;
      if(idx >= sequences.length){
        finish();
        return;
      }

      const s = sequences[idx] || {};
      const isFirst = idx===0;
      const step = Math.max(1, Number(s.stepMs)||140);
      const ampVal = Math.max(0.02, Number(s.amp)||0.16);

      const done = ()=>{
        if(my !== pathSeqToken) return;
        const gapMs = Math.max(0, Number(s.gapAfterMs)||0);
        idx++;
        if(idx >= sequences.length){
          finish();
          return;
        }
        setTimeout(runNext, gapMs);
      };

      if(s.kind==='box'){
        playAndMarkBoxOnce(s.indices, isFirst ? baseDelayMs : 0, {
          stepMs: step,
          amp: ampVal,
          token: my,
          clearStart: isFirst,
          compactSkipped,
          onDone: done,
        });
      } else {
        playAndMarkPathOnce(s.indices, isFirst ? baseDelayMs : 0, {
          stepMs: step,
          amp: ampVal,
          token: my,
          clearStart: isFirst,
          compactSkipped,
          onDone: done,
        });
      }
    };

    runNext();

    let estimateMs = baseDelayMs;
    for(let i=0;i<sequences.length;i++){
      const s = sequences[i] || {};
      const step = Math.max(1, Number(s.stepMs)||140);
      estimateMs += pathSequenceDurationMs(s.indices || [], step);
      if(i < sequences.length-1) estimateMs += Math.max(0, Number(s.gapAfterMs)||0);
    }
    return estimateMs;
  }


  function finalArcadeFinaleSequences(){
    const sequences = [];

    // 9 boxes: left->right, top->bottom.
    for(let br=0; br<3; br++){
      for(let bc=0; bc<3; bc++){
        const startIdx = br*27 + bc*3;
        const bi = boxIndicesOf(startIdx);
        sequences.push({ kind:'box', indices: bi, stepMs: 140, amp: 0.16, gapAfterMs: MELODY_CHAIN_GAP_MS });
      }
    }

    if(sequences.length) sequences[sequences.length-1].gapAfterMs = MELODY_CHAIN_BREAK_MS;

    // 9 rows: top->bottom (left->right within row).
    for(let rr=0; rr<9; rr++){
      const ri = rowIndicesOf(rr, {reverse:false});
      sequences.push({ kind:'row', indices: ri, stepMs: 120, amp: 0.15, gapAfterMs: MELODY_CHAIN_GAP_MS });
    }

    if(sequences.length) sequences[sequences.length-1].gapAfterMs = MELODY_CHAIN_BREAK_MS;

    // 9 columns: left->right (top->bottom within column).
    for(let cc=0; cc<9; cc++){
      const ci = colIndicesOf(cc, {reverse:false});
      sequences.push({ kind:'col', indices: ci, stepMs: 120, amp: 0.15, gapAfterMs: MELODY_CHAIN_GAP_MS });
    }

    if(sequences.length) sequences[sequences.length-1].gapAfterMs = 0;
    return sequences;
  }

  function stopFinalArcadeMelodyLoop({stopPhrase=false}={}){
    finalArcadeMelodyLoopToken++;
    if(stopPhrase){
      pathSeqToken++;
      boxSeqToken++;
    }
  }

  function startFinalArcadeMelodyLoop(startDelayMs=0, {allowPreArcade=false}={}){
    const delayMs = Math.max(0, Number(startDelayMs)||0);
    if(!soundOn || !completionMelodiesEnabled) return 0;

    const sequences = finalArcadeFinaleSequences();
    if(!sequences.length) return 0;

    const loopToken = ++finalArcadeMelodyLoopToken;
    let firstEstimateMs = 0;

    const runPass = (passDelayMs=0, isFirst=false)=>{
      if(loopToken !== finalArcadeMelodyLoopToken) return;
      if(!soundOn || !completionMelodiesEnabled) return;

      const canRunNow = (isFirst && allowPreArcade)
        ? true
        : (finalArcadeActive && finalArcadeVisibleCount()>0);
      if(!canRunNow) return;

      // Avoid long artificial waits from estimated melody windows when many cells are already removed.
      releaseMelodyWindow();

      const token = ++pathSeqToken;
      const passDelay = Math.max(0, Number(passDelayMs)||0);
      let seqDelayMs = isFirst ? Math.max(48, passDelay) : passDelay;

      if(isFirst){
        const preludeStartMs = seqDelayMs;
        seqDelayMs = Math.max(420, preludeStartMs + 280);
        seqDelayMs += playUserSolveBacktrackPrelude(preludeStartMs, { token });
      }

      const loopStepMs = 208;
      const passSequences = sequences.map((s, i)=>{
        const baseGap = Math.max(0, Number(s && s.gapAfterMs)||0);
        return {
          ...s,
          stepMs: loopStepMs,
          gapAfterMs: (i===sequences.length-1) ? 0 : Math.max(228, baseGap),
        };
      });

      const estimateMs = playAndMarkSequenceChain(passSequences, seqDelayMs, {
        token,
        compactSkipped: true,
        onDone: ()=>{
          if(loopToken !== finalArcadeMelodyLoopToken) return;
          if(!finalArcadeActive || finalArcadeVisibleCount()<=0) return;

          // Reset busy-window bookkeeping so the next loop starts without dead air.
          releaseMelodyWindow();

          scheduleFinalArcade(()=>{
            if(loopToken !== finalArcadeMelodyLoopToken) return;
            if(!finalArcadeActive || finalArcadeVisibleCount()<=0) return;
            runPass(0, false);
          }, Math.max(420, MELODY_CHAIN_BREAK_MS + 260));
        },
      });
      if(isFirst) firstEstimateMs = estimateMs;
    };

    runPass(delayMs, true);
    return firstEstimateMs;
  }

  function pathSequenceDurationMs(indices, stepMs=140){
    const len = Array.isArray(indices) ? indices.length : Number(indices);
    if(!Number.isFinite(len) || len<=0) return 0;
    return (len-1)*stepMs + 72;
  }

  function rowIndicesOf(row, {reverse=false}={}){
    const out = [];
    for(let c=0;c<9;c++) out.push(row*9+c);
    return reverse ? out.reverse() : out;
  }

  function colIndicesOf(col, {reverse=false}={}){
    const out = [];
    for(let r=0;r<9;r++) out.push(r*9+col);
    return reverse ? out.reverse() : out;
  }

  function isRowComplete(row){
    for(let c=0;c<9;c++) if(grid[row*9+c]===BLANK) return false;
    return true;
  }

  function isColComplete(col){

    return true;

  function boxIdOfIndex(index){
    const r = Math.floor(index/9);
    const c = index%9;
    const br = Math.floor(r/3);
    const bc = Math.floor(c/3);
    return br*3 + bc; // 0..8
  }

  function isBoardFull(){
    for(let i=0;i<81;i++) if(grid[i]===BLANK) return false;

  function computeConflicts(){
    const conf = Array(81).fill(false);
    for(let r=0;r<9;r++){
      const seen = new Map();
      for(let c=0;c<9;c++){
        const i=r*9+c;
        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    for(let c=0;c<9;c++){
      const seen = new Map();
      for(let r=0;r<9;r++){
        const i=r*9+c;
        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    for(let br=0;br<3;br++) for(let bc=0;bc<3;bc++){
      const seen = new Map();
      for(let rr=0;rr<3;rr++) for(let cc=0;cc<3;cc++){
        const r=br*3+rr;
        const c=bc*3+cc;
        const i=r*9+c;
        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    return conf;
  }

  function applyLogicWaveOnce(){
    wavePlaced.clear();
    logicWavePlaced.clear();

    const before = boardString();
    let cand = null;
    try{ cand = candidatesFromBoard(before); }catch(_e){ cand=null; }
    if(!cand) return 0;

    const acts=[];
    for(const s of SQUARES){
      const i=SQUARE_INDEX[s];
      if(grid[i]!==BLANK) continue;
      const cs=cand[s];
      if(cs.length===1) acts.push({i, v:cs});
    }
    for(const unit of MAPS.units){
      const empties = unit.filter(t=>grid[SQUARE_INDEX[t]]===BLANK);
      if(!empties.length) continue;
      for(const d of DIGITS){
        const places = empties.filter(t=>cand[t].includes(d));
        if(places.length===1) acts.push({i:SQUARE_INDEX[places[0]], v:d});
      }
    }

    const seen = new Set();
    let n=0;
    for(const a of acts){
      if(seen.has(a.i) || grid[a.i]!==BLANK) continue;
      grid[a.i]=a.v;
      if(notes[a.i]) notes[a.i].clear();
      wavePlaced.add(a.i);
      logicWavePlaced.set(a.i, a.v);
      seen.add(a.i);
      n++;
    }
    return n;
  }

  function unapplyLogicWaveOnce(){
    if(!logicWavePlaced.size) return 0;
    let n = 0;
    for(const [i, v] of logicWavePlaced){
      if(i<0 || i>80) continue;
      if(fixed[i]) continue;
      if(grid[i]===v){
        grid[i]=BLANK;
        n++;
      }
    }
    logicWavePlaced.clear();
    wavePlaced.clear();
    return n;
  }

  function boardHasMinCandidates(board, minCandidates=2){
    if(!(minCandidates>1)) return true;
    let cand = null;

    for(const s of SQUARES){

  function compactToolbarLabel(raw, maxLen=11){
    const text = String(raw||'').replace(/\s+/g,' ').trim();
    if(!text) return '';
    const glyphs = splitGraphemes(text);
    const lim = Math.max(4, Number(maxLen)||11);
    if(glyphs.length<=lim) return text;
    return `${glyphs.slice(0, lim-1).join('')}…`;
  }

  function compactPresetButtonLabel(raw){
    let text = String(raw||'').replace(/\s+/g,' ').trim();
    if(!text) return 'Preset';
    if(/^Würfelaugen/i.test(text)) text = text.replace(/^Würfelaugen/i, 'Würfel');
    else if(/^Emoji Zahlen/i.test(text)) text = text.replace(/^Emoji Zahlen/i, 'Emoji');
    else if(/^Farbfelder/i.test(text)) text = text.replace(/^Farbfelder/i, 'Farben');
    else if(/^Classic/i.test(text)) text = text.replace(/^Classic/i, 'Klassik');
    text = text.replace(/1️⃣…9️⃣|1-9|✎/g, '').replace(/\s+/g,' ').trim();
    return compactToolbarLabel(text || 'Preset', 8);
  }

  function normalizeBoard81(raw, {allowBlank=true}={}){
    const s = String(raw||'').trim().replace(/0/g,'.');
    const re = allowBlank ? /^[1-9.]{81}$/ : /^[1-9]{81}$/;
    return re.test(s) ? s : null;
  }

  function encodeShareToken(payload){
    const json = JSON.stringify(payload || {});
    try{
      if(typeof TextEncoder==='function' && typeof btoa==='function'){
        const bytes = new TextEncoder().encode(json);
        let bin = '';
        for(const b of bytes) bin += String.fromCharCode(b);
        return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      }
    }catch(_e){}
    try{
      return btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }catch(_e){
      return '';
    }
  }

  function decodeShareToken(token){
    const raw = String(token||'').trim();
    if(!raw) return null;
    const b64 = raw.replace(/-/g,'+').replace(/_/g,'/');
    const pad = b64 + '='.repeat((4 - (b64.length % 4)) % 4);
    let bin = '';
    try{
      bin = atob(pad);
    }catch(_e){
      return null;
    }

    try{
      if(typeof TextDecoder==='function'){
        const bytes = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
        return JSON.parse(new TextDecoder().decode(bytes));
      }
    }catch(_e){}

    try{
      return JSON.parse(decodeURIComponent(escape(bin)));
    }catch(_e){
      return null;
    }
  }
  function sanitizeSharedPayload(raw){
    if(!raw || typeof raw!=='object') return null;

    const puzzleStr = normalizeBoard81(raw.p, {allowBlank:true});
    if(!puzzleStr) return null;

    const solved = solveBoard(puzzleStr);
    if(!solved) return null;

    const out = {
      puzzle: puzzleStr,
      solution: solved,
      gameId: sanitizeShareGameId(raw.gid) || fallbackShareGameIdForPuzzle(puzzleStr),
    };

    const sharedGrid = mergePuzzleIntoGrid(puzzleStr, raw.g);
    if(sharedGrid && sharedGrid!==puzzleStr) out.grid = sharedGrid;

    const sharedFixedMask = buildFixedMaskForPuzzle(puzzleStr, raw.fm);
    const defaultFixedMask = buildFixedMaskForPuzzle(puzzleStr, null);
    if(sharedFixedMask && defaultFixedMask && sharedFixedMask!==defaultFixedMask) out.fixedMask = sharedFixedMask;

    const sharedNotes = sanitizeNotesArray(raw.n);
    if(sharedNotes && sharedNotes.some(v=>v)) out.notes = sharedNotes;

    const gameScore = sanitizeShareStatInt(raw.gs, -999999, 999999);
    if(gameScore!==null) out.gameScore = gameScore;
    const gameMistakes = sanitizeShareStatInt(raw.gm, 0, 9999);
    if(gameMistakes!==null) out.gameMistakes = gameMistakes;
    const gameTimeSec = sanitizeShareStatInt(raw.gt, 0, 864000);
    if(gameTimeSec!==null) out.gameTimeSec = gameTimeSec;

    const mode = String(raw.m||'');
    if(Object.values(SYMBOL_MODE).includes(mode)) out.mode = mode;

    const emojiPreset = String(raw.ap||'');
    if(emojiPreset==='custom' || EMOJI_PRESETS[emojiPreset]) out.activeEmojiPreset = emojiPreset;

    const customEmoji = sanitizeEmojiPreset(raw.ce);
    if(customEmoji) out.customEmojiPreset = customEmoji;

    const customColor = sanitizeColorPreset(raw.cc);
    if(customColor) out.customColorSet = customColor;

    const customImage = sanitizeImagePreset(raw.ci);
    if(customImage) out.customImageSet = customImage;

    const lvl = String(raw.lvl||'');
    if(LEVEL_MAP[lvl]) out.levelId = lvl;

    const snd = sanitizeSoundPreset(raw.snd);
    if(snd) out.soundPreset = snd;

    const mel = sanitizeMelodyPattern(raw.mel);
    if(mel) out.melodyPattern = mel;

    const skin = sanitizeUiSkin(raw.skin);
    if(skin) out.uiSkin = skin;

    if(typeof raw.lw==='boolean') out.logicWaveEnabled = raw.lw;

    if(typeof raw.tp==='boolean') out.twoPlayerMode = raw.tp;
    else if(raw.tp==='1' || raw.tp===1) out.twoPlayerMode = true;
    else if(raw.tp==='0' || raw.tp===0) out.twoPlayerMode = false;

    const sharedHumanTurn = sanitizeDuelTurnSec(raw.dhs, 'human');
    if(sharedHumanTurn) out.duelHumanTurnBaseSec = sharedHumanTurn;
    const sharedBotTurn = sanitizeDuelTurnSec(raw.dbs, 'bot');
    if(sharedBotTurn) out.duelBotTurnBaseSec = sharedBotTurn;
    if(Object.prototype.hasOwnProperty.call(raw, 'lts')) out.liveTurnSec = normalizeLiveDuelTurnSec(raw.lts);

    const sharedName = sanitizeUserName(raw.un);
    if(sharedName){
      const rawSharedAt = Number(raw.ud);
      out.sharedMeta = {
        name: sharedName,
        score: sanitizeShareStatInt(raw.us, -999999, 999999),
        mistakes: sanitizeShareStatInt(raw.um, 0, 9999),
        timeSec: sanitizeShareStatInt(raw.ut, 0, 864000),
        at: Number.isFinite(rawSharedAt) ? Math.max(0, Math.round(rawSharedAt)) : Date.now(),
      };
    }

    return out;
  }

  function extractShareToken(input){
    const raw = String(input||'').trim();
    if(!raw) return '';

    const m = raw.match(/(?:^|[#?&])share=([A-Za-z0-9_-]+)/);
    if(m) return m[1];

    if(/^[A-Za-z0-9_-]+$/.test(raw)) return raw;

    try{
      const u = new URL(raw, window.location.href);
      const q = u.searchParams.get('share');
      if(q) return q;
      const h = String(u.hash||'').match(/(?:^#|[?&])share=([A-Za-z0-9_-]+)/);
      if(h) return h[1];
    }catch(_e){}

    return '';
  }

  function createShareLink(options={}){
    const state = (options && options.state && typeof options.state==='object') ? options.state : null;
    const statePuzzle = state ? normalizeBoard81(state.puzzle, {allowBlank:true}) : null;
    const basePuzzle = statePuzzle || puzzle;

    const payload = {
      v: 1,
      p: basePuzzle,
      m: sanitizeSymbolMode(state ? state.symbolMode : null) || symbolMode,
      ap: sanitizeEmojiPresetId(state ? state.activeEmojiPreset : null) || activeEmojiPreset,
      lvl: (state && LEVEL_MAP[state.levelId]) ? state.levelId : activeLevelId,
      snd: sanitizeSoundPreset(state ? state.activeSoundPreset : null) || activeSoundPreset,
      mel: sanitizeMelodyPattern(state ? state.activeMelodyPattern : null) || activeMelodyPattern,
      skin: sanitizeUiSkin(state ? state.activeUiSkin : null) || activeUiSkin,
      lw: (state && typeof state.logicWaveEnabled==='boolean') ? !!state.logicWaveEnabled : !!logicWaveEnabled,
      tp: (state && typeof state.twoPlayerMode==='boolean') ? !!state.twoPlayerMode : !!twoPlayerMode,
      dhs: sanitizeDuelTurnSec(state ? state.duelHumanTurnBaseSec : duelHumanTurnBaseSec, 'human') || duelHumanTurnBaseSec,
      dbs: sanitizeDuelTurnSec(state ? state.duelBotTurnBaseSec : duelBotTurnBaseSec, 'bot') || duelBotTurnBaseSec,
    };

    const stateGameId = sanitizeShareGameId(state ? state.shareGameId : null);
    const optionGameId = sanitizeShareGameId(options && options.gameId);
    const activeGameId = stateGameId || optionGameId || sanitizeShareGameId(currentShareGameId) || createShareGameId();
    payload.gid = activeGameId;
    currentShareGameId = activeGameId;

    if(state){
      const stateGrid = mergePuzzleIntoGrid(basePuzzle, state.grid);
      if(stateGrid && stateGrid!==basePuzzle) payload.g = stateGrid;

      const stateFixedMask = buildFixedMaskForPuzzle(basePuzzle, state.fixedMask);
      const defaultFixedMask = buildFixedMaskForPuzzle(basePuzzle, null);
      if(stateFixedMask && defaultFixedMask && stateFixedMask!==defaultFixedMask) payload.fm = stateFixedMask;

      const stateNotes = sanitizeNotesArray(state.notes);
      if(stateNotes && stateNotes.some(v=>v)) payload.n = stateNotes;

      const gameScore = sanitizeShareStatInt(state.score, -999999, 999999);
      const gameMist = sanitizeShareStatInt(state.mistakes, 0, 9999);
      const gameTime = sanitizeShareStatInt(state.timeSec, 0, 864000);
      if(gameScore!==null) payload.gs = gameScore;
      if(gameMist!==null) payload.gm = gameMist;
      if(gameTime!==null) payload.gt = gameTime;
    }

    const sharedUserSource = (options && typeof options.userName==='string')
      ? options.userName
      : (state && typeof state.userName==='string' ? state.userName : (inpUserName ? inpUserName.value : userName));
    const sharedUserName = sanitizeUserName(sharedUserSource);
    const syncUserName = !(options && options.syncUserName===false);
    if(syncUserName){
      if(inpUserName && inpUserName.value !== sharedUserName) inpUserName.value = sharedUserName;
      if(userName !== sharedUserName){
        userName = sharedUserName;
        persistUserNameState();
      }
    }

    if(sharedUserName){
      const override = (options && options.overrideStats && typeof options.overrideStats==='object')
        ? options.overrideStats
        : null;
      const currentScore = sanitizeShareStatInt(state ? state.score : score, -999999, 999999);
      const currentMist = sanitizeShareStatInt(state ? state.mistakes : mistakes, 0, 9999);
      const stateRawTime = state ? state.timeSec : null;
      const currentRawTime = stateRawTime==null ? currentElapsedSec() : stateRawTime;
      const currentTime = sanitizeShareStatInt(currentRawTime, 0, 864000);

      const sharedScore = sanitizeShareStatInt(override ? override.score : null, -999999, 999999);
      const sharedMist = sanitizeShareStatInt(override ? override.mistakes : null, 0, 9999);
      const sharedTime = sanitizeShareStatInt(override ? override.timeSec : null, 0, 864000);

      payload.un = sharedUserName;
      payload.us = sharedScore!==null ? sharedScore : (currentScore!==null ? currentScore : 0);
      payload.um = sharedMist!==null ? sharedMist : (currentMist!==null ? currentMist : 0);
      payload.ut = sharedTime!==null ? sharedTime : (currentTime!==null ? currentTime : 0);
      payload.ud = Date.now();
    }

    if(customEmojiPreset) payload.ce = customEmojiPreset.slice(0,9);
    if(customColorSet && customColorSet.length===9) payload.cc = customColorSet.slice(0,9);

    const hasImages = Array.isArray(customImageSet) && customImageSet.some(v=>String(v||'').trim().length>0);
    let droppedImages = false;
    if(hasImages) payload.ci = customImageSet.slice(0,9);

    let token = encodeShareToken(payload);
    if(!token) return null;

    if(token.length > 3600 && payload.ci){
      delete payload.ci;
      droppedImages = true;
      token = encodeShareToken(payload);
    }

    if(!token || token.length > 12000) return null;

    const base = `${window.location.origin}${window.location.pathname}${window.location.search}`;
    return { url: `${base}#share=${token}`, droppedImages };
  }

  async function shareByUrl(url, {droppedImages=false}={}){
    const shareData = { title:'Emoku Gameplay', text:'Play and reshare this gameplay', url };

    let didShare = false;
    if(navigator.share){
      try{
        await navigator.share(shareData);
        didShare = true;
      }catch(_e){}
    }

    if(didShare){
      toast(droppedImages ? 'Share geöffnet (ohne Bild-Preset)' : 'Share geöffnet');
      return true;
    }

    let copied = false;
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{
        await navigator.clipboard.writeText(url);
        copied = true;
      }catch(_e){}
    }

    if(!copied){
      window.prompt('Copy this share link', url);
    }

    if(copied){
      toast(droppedImages ? 'Link kopiert (ohne Bild-Preset)' : 'Link kopiert');
    } else {
      toast(droppedImages ? 'Link bereit (ohne Bild-Preset)' : 'Link bereit');
    }
    return copied;
  }


  function dataUrlImageToFile(dataUrl, fileName='emoku-live-qr.png'){
    const raw = String(dataUrl||'').trim();
    const m = raw.match(/^data:(image\/[a-z0-9.+-]+);base64,([A-Za-z0-9+/=]+)$/i);
    if(!m) return null;

    try{
      const bin = atob(m[2]);
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      return new File([bytes], fileName, { type:m[1] });
    }catch(_e){
      return null;
    }
  }

  async function shareLiveQrImageSource(qrUrl){
    const raw = String(qrUrl||'').trim();
    if(!raw) return false;
    if(!/^data:image\//i.test(raw)) return shareByUrl(raw);

    const fileName = `emoku-live-${liveOutKind||'link'}-qr.png`;
    const file = dataUrlImageToFile(raw, fileName);

    if(file && navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
      try{
        await navigator.share({ title:'Emoku Live QR', files:[file] });
        toast('QR Bild geteilt');
        return true;
      }catch(_e){}
    }

    try{
      const a = document.createElement('a');
      a.href = raw;
      a.download = fileName;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast('QR Bild gespeichert');
      return true;
    }catch(_e){
      toast('QR Bild konnte nicht geteilt werden');
      return false;
    }
  }

  function savedGameFilledCount(entry){

  function savedGameStamp(ts){
    const n = Number(ts);
    if(!Number.isFinite(n) || n<=0) return '';
    const d = new Date(n);
    if(Number.isNaN(d.getTime())) return '';
    return d.toLocaleString('de-DE', {
      day:'2-digit', month:'2-digit', year:'2-digit',
      hour:'2-digit', minute:'2-digit',
    });
  }

  function savedGameRenderSignature(list=savedGames){
    const parts = [];
    for(const item of list){
      if(!item) continue;
      parts.push([
        item.id,
        item.createdAt,
        item.title,
        item.shareGameId,
        item.score,
        item.mistakes,
        item.timeSec,
        item.shareUrl,
      ].join(':'));
    }
    return parts.join('|');
  }

  function payloadFromSavedGame(entry){
    const item = sanitizeSavedGameEntry(entry);
    if(!item) return null;

    const payload = {
      v: 1,
      p: item.puzzle,
      gid: sanitizeShareGameId(item.shareGameId) || fallbackShareGameIdForPuzzle(item.puzzle),
      m: item.symbolMode,
      ap: item.activeEmojiPreset,
      lvl: item.levelId,
      snd: item.activeSoundPreset,
      mel: item.activeMelodyPattern,
      skin: item.activeUiSkin,
      lw: !!item.logicWaveEnabled,
      tp: !!item.twoPlayerMode,
      dhs: sanitizeDuelTurnSec(item.duelHumanTurnBaseSec, 'human') || duelHumanTurnBaseSec,
      dbs: sanitizeDuelTurnSec(item.duelBotTurnBaseSec, 'bot') || duelBotTurnBaseSec,
      gs: item.score,
      gm: item.mistakes,
      gt: item.timeSec,
    };

    if(item.grid!==item.puzzle) payload.g = item.grid;

    const fixedMask = buildFixedMaskForPuzzle(item.puzzle, item.fixedMask);
    const defaultMask = buildFixedMaskForPuzzle(item.puzzle, null);
    if(fixedMask && defaultMask && fixedMask!==defaultMask) payload.fm = fixedMask;

    const noteRows = sanitizeNotesArray(item.notes);
    if(noteRows && noteRows.some(v=>v)) payload.n = noteRows;

    if(item.userName){
      payload.un = item.userName;
      payload.us = item.score;
      payload.um = item.mistakes;
      payload.ut = item.timeSec;
      payload.ud = Number(item.createdAt) || Date.now();
    }

    return payload;
  }

  function findSavedGameById(id){

  function refreshSavedGamesList({force=false}={}){
    if(!elSavedGamesList) return;

    const normalized = sanitizeSavedGamesList(savedGames);
    const changed = savedGameRenderSignature(normalized)!==savedGameRenderSignature(savedGames);
    if(changed){
      savedGames = normalized;
      persistSavedGamesState();
      savedGamesRenderKey = '';
    }

    let linkChanged = false;
    for(let i=0;i<savedGames.length;i++){
      const item = savedGames[i];
      if(!item || item.shareUrl) continue;
      const built = createShareLink({
        state: item,
        overrideStats: { score:item.score, mistakes:item.mistakes, timeSec:item.timeSec },
        userName: item.userName,
        syncUserName: false,
      });
      if(!built) continue;
      item.shareUrl = built.url;
      linkChanged = true;
    }
    if(linkChanged){
      persistSavedGamesState();
      savedGamesRenderKey = '';
    }

    const sig = savedGameRenderSignature();
    if(!force && sig===savedGamesRenderKey) return;

    elSavedGamesList.innerHTML = '';

    if(!savedGames.length){
      const empty = document.createElement('div');
      empty.className = 'savedGamesEmpty';
      empty.textContent = 'Keine Spielstände';
      elSavedGamesList.appendChild(empty);
      savedGamesRenderKey = sig;
      return;
    }

    const frag = document.createDocumentFragment();

    for(const item of savedGames){
      const row = document.createElement('div');
      row.className = 'savedGameRow';
      row.dataset.id = item.id;

      const main = document.createElement('div');
      main.className = 'savedGameMain';

      const title = document.createElement('div');
      title.className = 'savedGameTitle';
      title.textContent = String(item.title || 'Saved game');
      main.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'savedGameMeta';
      const filled = savedGameFilledCount(item);
      const metaBits = [
        savedGameLevelLabel(item),
        `${filled}/81`,
        `⏱ ${fmtTime(item.timeSec)}`,
        `⚠ ${item.mistakes}`,
        `💎 ${item.score}`,
      ];
      const stamp = savedGameStamp(item.createdAt);
      if(stamp) metaBits.push(stamp);
      meta.textContent = metaBits.join(' · ');
      main.appendChild(meta);

      if(item.shareUrl){
        const link = document.createElement('a');
        link.className = 'savedGameLink';
        link.href = item.shareUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = 'share link';
        main.appendChild(link);
      }

      const actions = document.createElement('div');
      actions.className = 'savedGameActions';

      const loadBtn = document.createElement('button');
      loadBtn.type = 'button';
      loadBtn.dataset.action = 'load';
      loadBtn.dataset.id = item.id;
      loadBtn.textContent = '▶';
      loadBtn.title = 'Load saved game';
      loadBtn.setAttribute('aria-label', 'Load saved game');
      actions.appendChild(loadBtn);

      const shareBtn = document.createElement('button');
      shareBtn.type = 'button';
      shareBtn.dataset.action = 'share';
      shareBtn.dataset.id = item.id;
      shareBtn.textContent = '📤';
      shareBtn.title = 'Share saved game';
      shareBtn.setAttribute('aria-label', 'Share saved game');
      actions.appendChild(shareBtn);

      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.dataset.action = 'delete';
      delBtn.dataset.id = item.id;
      delBtn.textContent = '🗑';
      delBtn.title = 'Delete saved game';
      delBtn.setAttribute('aria-label', 'Delete saved game');
      actions.appendChild(delBtn);

      row.appendChild(main);
      row.appendChild(actions);
      frag.appendChild(row);
    }

    elSavedGamesList.appendChild(frag);
    savedGamesRenderKey = sig;
  }

    if(cleanName!==userName){

    const entry = sanitizeSavedGameEntry({
      createdAt: Date.now(),

      fixedMask: buildFixedMaskForPuzzle(puzzle, fixed.map(v=>v ? '1' : '0').join('')),

    });

  function isCenterPresetCell(index){
    const r = Math.floor(index/9);
    const c = index%9;
    return r>=3 && r<=5 && c>=3 && c<=5;
  }

  function presetSlotFromIndex(index){
    if(!isCenterPresetCell(index)) return -1;
    const r = Math.floor(index/9) - 3;
    const c = (index%9) - 3;
    return (r*3) + c;
  }

  function editPresetSlot(slot){
    if(!(slot>=0 && slot<9)) return;
    const kind = editablePresetType();

    if(kind==='emoji'){
      ensureEditableEmojiPreset();
      if(!customEmojiPreset) return;
      const current = customEmojiPreset[slot] || fallbackEmojiAt(slot);
      const raw = window.prompt(`Zeichen für Feld ${slot+1}`, current);
      if(raw===null) return;
      const glyph = firstGrapheme(raw) || current;
      customEmojiPreset[slot] = glyph;
      persistCustomEmojiPreset();
      syncCharPresetGrid();
      render();
      toast(`Zeichen ${slot+1} gespeichert`);
      return;
    }

    if(kind==='color'){
      if(!elBoardPresetColorInput) return;
      const fallback = normalizeColorHex(DEFAULT_COLOR_SET[slot], '#808080');
      const hex = normalizeColorHex(customColorSet[slot], fallback);
      pendingBoardColorSlot = slot;
      elBoardPresetColorInput.value = hex;
      elBoardPresetColorInput.click();
      return;
    }

    if(kind==='image'){
      pendingImageSlot = slot;
      if(!elImagePresetInput) return;
      elImagePresetInput.value = '';
      elImagePresetInput.click();
      return;
    }

    toast('Dieses Preset ist nicht editierbar');

    const emojiSet = (activeEmojiPreset==='custom' && customEmojiPreset)

      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', `Zelle ${i+1}`);

      const cc = i%9;
      if(cc===2 || cc===5) cell.classList.add('thickR');
      if(rr===2 || rr===5) cell.classList.add('thickB');
      if(cc===8) cell.classList.add('edgeR');

      if(isCenterPresetCell(i)){
        const slot = presetSlotFromIndex(i);

        const idx = document.createElement('span');

  function renderAnalysis(selectedCandDigits){
    if(!elAnalysis) return;

    const filled = grid.filter(v=>v!==BLANK).length;
    const left = 81 - filled;

    const [r,c] = selected>=0 ? idxToRC(selected) : [-1,-1];
    const pos = (selected>=0) ? `R${r+1}C${c+1}` : '—';

    const kvs = [];
    kvs.push({k:'Grid', v:`${filled}/81 (leer: ${left})`});
    kvs.push({k:'Selected', v: pos});
    kvs.push({k:'Brush', v: eraseMode ? 'Eraser' : (brush ? `${symLabel(brush)} (Tone ${TONE_NAME[brush]||brush})${pencilMode ? ' [NOTE]' : ''}` : (pencilMode ? '[NOTE]' : '—'))});
    kvs.push({k:'Candidates (selected cell)', v: selectedCandDigits ? selectedCandDigits.split('').map(d=>`${d}:${TONE_NAME[d]||d}`).join('  ') : '—'});

    if(finalArcadeActive){
      const leftIcons = finalArcadeVisibleCount();
      kvs.push({k:'Hidden Layer', v:`${finalArcadeRunning ? 'running' : 'ready'} · icons: ${leftIcons}`});
    }

    if(twoPlayerMode){
      const h = duelStats.human;
      const b = duelStats.bot;
      const hLeft = duelOpponentMode==='live' ? liveDuelTurnLabel(duelRemainingFor('human')) : `${String(Math.max(0, Math.ceil(duelRemainingFor('human')))).padStart(2,'0')}s`;
      const bLeft = duelOpponentMode==='live' ? liveDuelTurnLabel(duelRemainingFor('bot')) : `${String(Math.max(0, Math.ceil(duelRemainingFor('bot')))).padStart(2,'0')}s`;
      kvs.push({k:'👤 Player', v:`💎 ${h.score} · ⚠ ${h.mistakes} · ⌛ ${hLeft} · ⏱ ${fmtTime(h.usedSec)}`});
      const duelOpponentLabel = duelOpponentMode==='live' ? '👥 Opponent' : '🤖 Computer';
      kvs.push({k:duelOpponentLabel, v:`💎 ${b.score} · ⚠ ${b.mistakes} · ⌛ ${bLeft} · ⏱ ${fmtTime(b.usedSec)}`});
      kvs.push({k:'⏱ Total used', v: fmtTime(duelStats.totalUsedSec)});
    }

    if(sharedComparison && sharedComparison.name){
      const srcScore = Number.isFinite(sharedComparison.score) ? String(sharedComparison.score) : '—';
      const srcMist = Number.isFinite(sharedComparison.mistakes) ? String(sharedComparison.mistakes) : '—';
      const srcTime = Number.isFinite(sharedComparison.timeSec) ? fmtTime(Math.max(0, sharedComparison.timeSec)) : '—';
      const ownTime = twoPlayerMode ? '—' : fmtTime(timerSec);
      kvs.push({k:'Shared by', v: sharedComparison.name});
      kvs.push({k:'Shared stats', v:`💎 ${srcScore} · ⚠ ${srcMist} · ⏱ ${srcTime}`});
      kvs.push({k:'Your stats', v:`💎 ${score} · ⚠ ${mistakes} · ⏱ ${ownTime}`});
      if(Number.isFinite(sharedComparison.score)){
        const deltaScore = score - sharedComparison.score;
        kvs.push({k:'Score Δ', v:`${deltaScore>=0?'+':''}${deltaScore}`});
      }
    }

    elAnalysis.innerHTML = '';
    for(const item of kvs){
      const div = document.createElement('div');
      div.className='kv';
      div.innerHTML = `<div class="k">${item.k}</div><div class="v">${item.v}</div>`;
      elAnalysis.appendChild(div);
    }

  function render(){
    if(presetBoardEditMode){
      renderPresetBoardEditor();
      return;
    }
    elBoard.classList.remove('presetEditing');

    const b = boardString();
    let cand = null;
    try{ cand = candidatesFromBoard(b); }catch(_e){ cand=null; }

    const conflicts = computeConflicts();

    elBoard.innerHTML='';
    const frag = document.createDocumentFragment();

    const peerSet = selected>=0 ? unitOfIndex(selected) : null;

    let selectedCandDigits = null;
    if(selected>=0 && grid[selected]===BLANK && cand){
      selectedCandDigits = cand[SQUARES[selected]] || '';
    }

    for(let i=0;i<81;i++){
      const cell = document.createElement('button');
      cell.type='button';
      cell.className='cell';
      cell.dataset.i=String(i);
      cell.setAttribute('role','gridcell');
      cell.setAttribute('aria-label', `Zelle ${i+1}`);

      const rr=Math.floor(i/9);
      const cc=i%9;
      if(cc===2 || cc===5) cell.classList.add('thickR');
      if(rr===2 || rr===5) cell.classList.add('thickB');

      if(i===selected) cell.classList.add('selected');
      if(peerSet && peerSet.has(i) && i!==selected) cell.classList.add('peer');

      if(fixed[i]) cell.classList.add('fixed');
      if(conflicts[i]) cell.classList.add('conflict');

      const arcadeGone = finalArcadeActive && finalArcadeRemoved.has(i);
      if(arcadeGone) cell.classList.add('arcadeGone');

      const v = grid[i];
      if(v!==BLANK && !arcadeGone){
        cell.classList.add('hasVal');
        const span = document.createElement('div');
        span.className='val';
        setSymbolNode(span, v, {mini:false, showFace:true});
        cell.appendChild(span);
      } else {
        if(arcadeGone){
          frag.appendChild(cell);
          continue;
        }
        const hasNotes = notes[i] && notes[i].size>0;
        const isSel = (i===selected);
        const cs = (cand && isSel) ? (cand[SQUARES[i]] || '') : '';

        const notesMode = !!pencilMode;
        const candidateMode = !!showCandidates && !notesMode;
        const hintCandidates = candidateMode && isSel && !!cand;
        const showEditor = isSel && hintCandidates;
        const showNotesOnly = notesMode && hasNotes;

        if(showEditor || showNotesOnly){
          const box = document.createElement('div');
          box.className='notes';

          for(let d=1; d<=9; d++){
            const ds = String(d);
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'note';
            btn.dataset.d = ds;
            setSymbolNode(btn, ds, {mini:true, showFace:false});

            const noted = notes[i].has(ds);
            const showNoted = notesMode && noted;
            const allowed = hintCandidates ? cs.includes(ds) : showNoted;

            if(!(allowed || showNoted)){
              btn.disabled = true;
              btn.style.opacity = '0';
              btn.style.pointerEvents = 'none';
            } else {
              btn.disabled = false;
              btn.style.opacity = '';
              btn.style.pointerEvents = '';

              if(hintCandidates && allowed) btn.classList.add('cand');
              if(showNoted) btn.classList.add('on');
            }
            box.appendChild(btn);
          }
          cell.appendChild(box);
        }
      }

      if(wavePlaced.has(i) && !fixed[i]){
        cell.style.boxShadow = 'inset 0 0 0 1px rgba(116,214,154,.18)';
        cell.style.background = 'rgba(116,214,154,.03)';
      }

      frag.appendChild(cell);
    }

    elBoard.appendChild(frag);
    buildPalette();
    updateButtons();
    refreshHudStats();
    renderAnalysis(selectedCandDigits);
  }

  function pushMove(index, prev, next, meta={}){
    undo.push({ index, prev, next, meta });
    redo.length = 0;
    updateButtons();

  function setCell(index, value, {countMistake=false, allowFixed=false, isReveal=false, duelActor='human', liveRemote=false}={}){
    if(index<0 || index>80) return;
    if(fixed[index] && !allowFixed) return;
    if(gameOverLocked) return;

    const prev = grid[index];
    const vStr = String(value);
    const moveActor = (duelActor === 'bot') ? 'bot' : 'human';
    const muteForThisMove = botSilentMoveSound && moveActor === 'bot';
    const shouldSendLiveMove = !liveRemote && twoPlayerMode && duelOpponentMode==='live' && moveActor==='human' && countMistake && value !== BLANK && !isReveal;
    const rowIdx = Math.floor(index/9);
    const colIdx = index%9;
    const boxIdxs = boxIndicesOf(index);
    const rowWasComplete = isRowComplete(rowIdx);
    const colWasComplete = isColComplete(colIdx);
    const boxWasComplete = isBoxComplete(boxIdxs);
    let playerPlacedCorrect = false;
    let placementBasePoints = 0;
    let digitCorrectBefore = 0;
    let duelPostMoveAnimMs = 0;
    const isHumanTimedMove = !!(countMistake && moveActor==='human' && value !== BLANK && !isReveal);
    const moveScoreProfile = isHumanTimedMove ? computeHumanMoveScoreProfile() : null;
    const moveScoreFactor = moveScoreProfile ? moveScoreProfile.factor : 1;
    if(prev === value) return;

    if(twoPlayerMode && countMistake && value !== BLANK && !isReveal){
      // score float + HUD bump should finish before the other actor starts
      const moveUiAnimMs = (duelOpponentMode==='live') ? 0 : DUEL_MOVE_UI_ANIM_MS;
      duelPostMoveAnimMs = Math.max(duelPostMoveAnimMs, moveUiAnimMs);
    }

    // Player move: score + special audio + wrong-attempt handling
    if(countMistake && solution && value !== BLANK && !isReveal){
      // capture candidates BEFORE changing anything (only works if current board is valid)
      let cs = '';
      try{
        const candBefore = candidatesFromBoard(boardString());
        cs = candBefore ? (candBefore[SQUARES[index]] || '') : '';
      }catch(_e){ cs = ''; }

      if(solution[index] !== vStr){
        // WRONG: do NOT play the wrong icon tone. Play 0 + quarter-tone down.
        mistakes++;
        addDuelMistake(moveActor);
        toast('Fehler');
        if(!muteForThisMove) playWrongCue();
        applyMistakeScoreHalving(index, moveActor, {withSound: !muteForThisMove});

        if(isMistGameOverReached(moveActor)){
          triggerGameOver(moveActor);
          selected = index;
          render();
          if(isHumanTimedMove) markHumanMoveReady();
          return;
        }

        if(duelOpponentMode!=='live') duelPostMoveAnimMs = Math.max(duelPostMoveAnimMs, 280);
        const cell = elBoard.querySelector(`.cell[data-i="${index}"]`);
        if(cell){
          cell.classList.add('shake');
          setTimeout(()=>cell.classList.remove('shake'), 260);
        }

        // Remove the wrong icon: keep previous value (usually blank)
        // If there is exactly ONE other possibility, auto-place it with an additional penalty.
        if(autoFixTwoCandidates && !twoPlayerMode && prev === BLANK && cs && cs.length===2 && cs.includes(vStr)){
          const other = cs.replace(vStr,'');
          if(other.length===1){
            grid[index] = other;
            if(notes[index]) notes[index].clear();
            if(!muteForThisMove) playToneDigit(other, 0, 0.14);
            pushMove(index, prev, other, { auto:true, fromWrong:vStr });
            selected = index;
            render();
            if(isSolved()) onPuzzleSolved(moveActor);
            if(isHumanTimedMove) markHumanMoveReady();
            return;
          }
        }

        // No state change on wrong attempt
        if(shouldSendLiveMove) sendLiveMove(index, vStr);
        selected = index;
        render();
        if(twoPlayerMode){
          const duelLockMs = (duelOpponentMode==='live') ? 0 : duelPostMoveAnimMs;
          lockDuelInteractionFor(duelLockMs);
          onDuelMoveResolved(moveActor, false);
        }
        if(isHumanTimedMove) markHumanMoveReady();
        return;
      }

      // CORRECT: points after apply-state (completion multipliers can be detected)
      playerPlacedCorrect = true;
      placementBasePoints = pointsForCandidates(cs);
      digitCorrectBefore = /^[1-9]$/.test(vStr) ? countCorrectPlacements(vStr) : 0;

    } else {
      // Non-player placements: keep the simple tone
      if(value !== BLANK && !isReveal && !muteForThisMove){
        playToneDigit(vStr, 0, 0.22);
      }
    }

    // Apply state
    grid[index] = vStr;
    if(vStr !== BLANK && notes[index]) notes[index].clear();

    if(playerPlacedCorrect){
      let doublers = 0;
      if(isBoxComplete(boxIdxs) && !boxWasComplete) doublers++;
      if(isRowComplete(rowIdx) && !rowWasComplete) doublers++;
      if(isColComplete(colIdx) && !colWasComplete) doublers++;
      const gainedRaw = placementBasePoints * Math.pow(2, doublers) * moveScoreFactor;
      const gained = snapScoreDelta(gainedRaw);
      addPoints(gained, index, moveActor);

      const digitCorrectAfter = /^[1-9]$/.test(vStr) ? countCorrectPlacements(vStr) : 0;
      const digitCompletedNow = digitCorrectBefore < 9 && digitCorrectAfter >= 9;
      if(digitCompletedNow){
        const digitBonusRaw = (30 * Number(vStr)) * moveScoreFactor;
        addPoints(snapScoreDelta(digitBonusRaw), index, moveActor);
      }

      if(!muteForThisMove){
        if(digitCorrectAfter >= 9) playDigitCompleteReward(vStr);
        else playCorrectReward(vStr);
      }

      if(countMistake && !isReveal && moveActor==='human'){
        recordSolveDrag(index, vStr);
      }
    }

    if(isHumanTimedMove) markHumanMoveReady();

    if(playerPlacedCorrect && shouldSendLiveMove) sendLiveMove(index, vStr);

    pushMove(index, prev, vStr, { isReveal });

    // keep selection
    selected = index;

    render();

    // Completion jingles (only once per row/col/box). If the whole board is full, play finale pattern.
    if(value !== BLANK && !isReveal){
      const r = Math.floor(index/9);
      const c = index%9;
      const completionMelodiesOn = completionMelodiesEnabled && !muteForThisMove;
      const busyMelodyMs = Math.max(0, melodyWindowRemainingMs());
      const scoreSeparationMs = Math.max(0, scoreCueRemainingMs() + SCORE_TO_COMPLETION_GAP_MS);
      // Avoid double-waiting: clearStart already waits for melodyBusyUntil.
      const scoreExtraDelayMs = Math.max(0, scoreSeparationMs - busyMelodyMs);

      // If everything is full: blocks (L->R, top->bottom), then rows, then columns.
      if(!completedFinale && isBoardFull()){
        completedFinale = true;
        if(completionMelodiesOn && !finalArcadeIntroPlayed){
          finalArcadeIntroPlayed = true;
          const preludeStartMs = Math.max(48, scoreExtraDelayMs);
          const finaleEstimateMs = startFinalArcadeMelodyLoop(preludeStartMs, { allowPreArcade:true });
          duelPostMoveAnimMs = Math.max(duelPostMoveAnimMs, finaleEstimateMs);
        }
      } else {
        const sequences = [];

        // Box complete -> play the 9 cells in 3 rows: left->right, top->bottom
        const bid = boxIdOfIndex(index);
        if(!completedBoxes.has(bid)){
          const bi = boxIndicesOf(index);
          if(isBoxComplete(bi)){
            completedBoxes.add(bid);
            sequences.push({ kind:'box', indices: bi, stepMs: 140, amp: 0.16 });
          }
        }

        // Row complete -> play from RIGHT to LEFT (as requested)
        if(!completedRows.has(r) && isRowComplete(r)){
          completedRows.add(r);
          const ri = rowIndicesOf(r, {reverse:true});
          sequences.push({ kind:'row', indices: ri, stepMs: 120, amp: 0.15 });
        }

        // Column complete -> play from TOP to BOTTOM (as requested)
        if(!completedCols.has(c) && isColComplete(c)){
          completedCols.add(c);
          const ci = colIndicesOf(c, {reverse:false});
          sequences.push({ kind:'col', indices: ci, stepMs: 120, amp: 0.15 });
        }

        if(completionMelodiesOn && sequences.length){
          const completionStartMs = Math.max(40, scoreExtraDelayMs);
          const token = ++pathSeqToken;
          const chain = sequences.map((s, i)=>({
            kind: s.kind,
            indices: s.indices,
            stepMs: s.stepMs,
            amp: s.amp,
            gapAfterMs: (i===sequences.length-1) ? 0 : MELODY_CHAIN_GAP_MS,
          }));
          const completionEstimateMs = playAndMarkSequenceChain(chain, completionStartMs, {
            token,
            compactSkipped: true,
          });
          duelPostMoveAnimMs = Math.max(duelPostMoveAnimMs, completionEstimateMs);
        }
      }
    }

    if(twoPlayerMode && countMistake && !isReveal && value !== BLANK && !!solution){
      const duelLockMs = (duelOpponentMode==='live') ? 0 : duelPostMoveAnimMs;
      lockDuelInteractionFor(duelLockMs);
      onDuelMoveResolved(moveActor, playerPlacedCorrect);
    }

    // if solved
    if(isSolved()) onPuzzleSolved(moveActor);
  }


  function clearCell(index){
    if(index<0 || index>80) return;
    if(fixed[index]) return;
    if(gameOverLocked) return;
    const prev = grid[index];
    if(prev===BLANK) return;
    grid[index]=BLANK;
    if(notes[index]) notes[index].clear();
    pushMove(index, prev, BLANK, { clear:true });
    selected = index;
    render();
  }

  function doUndo(){
    const m = undo.pop();
    if(!m) return;
    redo.push(m);
    grid[m.index] = m.prev;
    selected = m.index;
    addPoints(-20, m.index);
    render();
  }


  function doRedo(){
    const m = redo.pop();
    if(!m) return;
    undo.push(m);
    grid[m.index] = m.next;
    selected = m.index;
    render();
  }

  function computeHintSingle(){
    const b = boardString();
    let cand=null;
    try{ cand=candidatesFromBoard(b); }catch(_e){ cand=null; }
    if(!cand) return null;

    for(let i=0;i<81;i++){
      if(grid[i]!==BLANK) continue;
      const cs = cand[SQUARES[i]] || '';
      if(cs.length===1) return {index:i, digit:cs};
    }

    for(const unit of MAPS.units){
      const empties = unit.filter(t=>grid[SQUARE_INDEX[t]]===BLANK);
      if(!empties.length) continue;
      for(const d of DIGITS){
        const places = empties.filter(t=>cand[t].includes(d));
        if(places.length===1) return {index:SQUARE_INDEX[places[0]], digit:d};
      }
    }
    return null;
  }

  function checkBoard(){
    if(!solution){ toast('Kein Solve verfügbar'); return; }
    let wrong = 0;
    let filled = 0;
    for(let i=0;i<81;i++){
      if(grid[i]===BLANK) continue;
      filled++;
      if(grid[i] !== solution[i]) wrong++;
    }
    render();
    if(wrong===0){
      toast(filled===81 ? '🔍 Alles korrekt' : '🔍 Keine Fehler');
      return;
    }
    toast(`🔍 ${wrong} falsch`);
  }

  function revealSelected(){
    if(selected<0) return;
    if(!solution){ toast('Kein Solve verfügbar'); return; }
    if(fixed[selected]) return;
    const v = solution[selected];
    setCell(selected, v, {countMistake:false, allowFixed:false, isReveal:true});
    fixed[selected] = true;
    render();
    const node = elBoard.querySelector(`.cell[data-i="${selected}"]`);
    if(node) node.classList.add('revealedWave');
    toast('Reveal');
  }

    resetFinalArcade();

    score = 0;

    revealFixedWave();
    startTimer();
    toast('Reset');

  function countCorrectPlacements(digit){
    if(!solution) return 0;
    let count = 0;
    for(let i=0; i<81; i++){
      if(grid[i]===digit && solution[i]===digit) count++;
    }
    return count;
  }

  function paletteDigitsMissing(){
    const out = [];
    for(let d=1; d<=9; d++){
      const ds = String(d);
      if(!solution || countCorrectPlacements(ds) < 9) out.push(ds);
    }
    return out;
  }

  function genNew(attempt=0, opts={}){
    const animateIntro = !!opts.animateIntro;
    const showGeneratingToast = opts.showGeneratingToast !== false;
    const readyToast = (typeof opts.readyToast === 'string' && opts.readyToast.trim())
      ? opts.readyToast.trim()
      : '';

    stopAllMusicNow();
    stopTimer();
    cancelBoardIntroFill();
    finalArcadeAutoNewQueued = false;
    clearGameOverState();
    hideFinalScorePanel();
    finalScoreShown = false;
    solvedShareStats = null;
    mistakes = 0;
    score = 0;
    sharedComparison = null;
    resetDuelStats();
    completedRows.clear();
    completedCols.clear();
    completedBoxes.clear();
    completedFinale = false;
    refreshHudStats();

    const level = currentLevel();
    logicWaveEnabled = !!level.useLogicWave;

    const twoMinRequired = Math.max(0, Number(level.minCandidates)||0);
    const MAX_ATTEMPTS = twoMinRequired >= 2 ? 120 : 60;
    const minBlanksAfterWave = logicWaveEnabled
      ? Math.max(20, Math.floor((81 - Number(level.difficulty||53)) * 0.40))
      : 0;

    if(attempt === 0 && showGeneratingToast) toast(`Generiere: ${level.label}…`);

    puzzle = generatePuzzle({ difficulty: level.difficulty, symmetry: GENERATOR_DEFAULTS.symmetry });
    solution = solveBoard(puzzle);
    if(!solution){
      toast('Generator-Fehler, erneut');
      return genNew(attempt+1, opts);
    }

    grid = puzzle.split('');
    fixed = Array.from({length:81}, (_,i)=>puzzle[i]!==BLANK);

    selected = -1;
    undo.length=0; redo.length=0;
    resetSolveDragTrace();
    resetFinalArcade();
    wavePlaced.clear();
    logicWavePlaced.clear();
    for(let i=0;i<81;i++) notes[i].clear();

    if(logicWaveEnabled){
      applyLogicWaveOnce();
    }

    const boardNow = boardString();
    const blanksLeft = grid.reduce((n,v)=> n + (v===BLANK ? 1 : 0), 0);
    const solvedByWave = (solution && boardNow === solution);
    const meetsTwoMin = twoMinRequired >= 2
      ? boardHasMinCandidates(boardNow, twoMinRequired)
      : true;

    const retryBecauseWave = logicWaveEnabled && (solvedByWave || blanksLeft < minBlanksAfterWave);
    if((retryBecauseWave || !meetsTwoMin) && attempt < MAX_ATTEMPTS){
      return genNew(attempt+1, opts);
    }

    currentShareGameId = createShareGameId();
    render();
    const allowLiveSync = !(opts && opts.liveSync===false);
    if(allowLiveSync) sendLiveStartSignal({quiet:true});

    const levelToast = attempt > 0 ? `${level.label} (${blanksLeft} leer)` : level.label;
    const finalToast = readyToast || levelToast;
    const startPlay = ()=>{
      playPaletteIntro();
      startTimer();
      toast(finalToast);
    };

    if(animateIntro){
      runBoardIntroFill(startPlay);
    } else {
      revealFixedWave();
      startPlay();
    }
  }

  });

  btnPencil.addEventListener('click', (e)=>{
    e.preventDefault();
    pencilMode = !pencilMode;
    if(pencilMode){
      eraseMode = false;
      showCandidates = false;
    }
    updateButtons();
    toast(pencilMode ? 'Notizen an' : 'Notizen aus');
    render();
  });

  btnErase.addEventListener('click', (e)=>{
    e.preventDefault();
    eraseMode = !eraseMode;
    if(eraseMode){
      pencilMode = false;
      showCandidates = false;
      brush = null;
    }
    updateButtons();
    toast(eraseMode ? 'Radierer' : 'Radierer aus');
  });

  btnUndo.addEventListener('click', (e)=>{ e.preventDefault(); doUndo(); });
  btnRedo.addEventListener('click', (e)=>{ e.preventDefault(); doRedo(); });

  btnCheck.addEventListener('click', (e)=>{ e.preventDefault(); checkBoard(); });

  btnHint.addEventListener('click', (e)=>{
    e.preventDefault();
    const h = computeHintSingle();
    if(!h){ toast('Kein Single'); return; }
    selected = h.index;
    render();
    toast(`Hint: ${symLabel(h.digit)} @ R${Math.floor(h.index/9)+1}C${(h.index%9)+1}`);
  });

  btnReveal.addEventListener('click', (e)=>{ e.preventDefault(); revealSelected(); });

  btnReset.addEventListener('click', (e)=>{ e.preventDefault(); resetToPuzzle(); });

  elPalette.addEventListener('click', (e)=>{
    const b = e.target.closest('.symBtn');
    if(!b) return;
    if(gameOverLocked){
      toast(gameOverLabel || 'game over');
      return;
    }
    const d = b.dataset.d;

    if(pencilMode && selected>=0){
      if(!ensureHumanMoveTurn()) return;
      if(fixed[selected]){ toast('Fix'); return; }
      if(eraseMode) eraseMode = false;
      toggleNote(selected, d);
      return;
    }

    if(eraseMode) eraseMode = false;
    const prevBrush = brush;
    brush = (brush===d) ? null : d;
    updateButtons();
    if(brush){
      playBrushSelectCue(brush);
      toast(`Brush ${symLabel(brush)} (${TONE_NAME[brush]||brush})`);
    } else if(prevBrush===d){
      playBrushDeselectCue(d);
    }
  });

  elPalette.addEventListener('pointerover', (e)=>{
    const b = e.target.closest?.('.symBtn');
    if(!b) return;
    // Only on real enter (not when moving between children, not on exit effects)
    const rt = e.relatedTarget;
    if(rt && b.contains(rt)) return;

    const d = b.dataset.d;
    if(!/^[1-9]$/.test(d)) return;
    const now = performance.now();
    const k = `pal:${d}`;
    if(lastHover.k === k && (now - lastHover.t) < 320) return;
    lastHover = { t: now, k };
    playToneDigit(d, 0, 0.18);
  });

  elPalette.addEventListener('dragover', (e)=>{
    const b = e.target.closest?.('.symBtn');
    if(!b) return;
    const d = b.dataset.d;
    if(!/^[1-9]$/.test(d)) return;
    const now = performance.now();
    const k = `palDrag:${d}`;
    if(lastHover.k === k && (now - lastHover.t) < 320) return;
    lastHover = { t: now, k };
    playToneDigit(d, 0, 0.18);
  });

  elBoard.addEventListener('click', (e)=>{
    const cell = e.target.closest('.cell');
    if(!cell) return;

    if(presetBoardEditMode){
      const slot = Number(cell.dataset.presetSlot);
      if(Number.isFinite(slot)) editPresetSlot(slot);
      return;
    }

    const i = Number(cell.dataset.i);
    if(!Number.isFinite(i)) return;

    if(gameOverLocked){
      toast(gameOverLabel || 'game over');
      return;
    }

    if(finalArcadeActive){
      if(!isFinalArcadeVisibleCell(i)){
        playFinalArcadeEmptyCue();
        if(finalArcadeRunning) toast('Arcade läuft…');
        return;
      }
      startFinalArcadeFrom(i);
      return;
    }

    const noteBtn = e.target.closest('.note');
    if(noteBtn && !noteBtn.disabled){
      if(!ensureHumanMoveTurn()) return;
      const d = noteBtn.dataset.d;
      selected = i;
      if(fixed[i]){ toast('Fix'); return; }
      if(pencilMode) toggleNote(i, d);
      else setCell(i, d, {countMistake:true, duelActor:'human'});
      return;
    }

    selected = i;

    if(eraseMode){
      if(!ensureHumanMoveTurn()) return;
      clearCell(i);
      return;
    }

    if(brush){
      if(!ensureHumanMoveTurn()) return;
      if(pencilMode) toggleNote(i, brush);
      else setCell(i, brush, {countMistake:true, duelActor:'human'});
      return;
    }

    render();
  });

  // Field hover is intentionally silent; keep audio only on explicit clicks/placements.

  document.addEventListener('keydown', (e)=>{
    if(e.key==='Escape' && connectFlowVisible()){
      closeConnectFlow();
      return;
    }

    if(e.key==='Escape'){
      if(presetBoardEditMode){
        closePresetBoardEditor({silent:true});
        toast('Preset-Editor zu');
        return;
      }
      if(preferencesOpen){
        setPreferencesOpen(false);
        toast('Preferences zu');
        return;
      }
      if(presetPanelOpen){
        setPresetPanelOpen(false);
        toast('Preset-Panel zu');
        return;
      }
      brush = null;
      eraseMode = false;
      updateButtons();
      toast('Clear');
      return;
    }

    if(presetBoardEditMode) return;

    if(finalArcadeActive){
      if(e.key==='m' || e.key==='M') btnSound.click();
      return;
    }

    if(gameOverLocked){
      if(e.key==='m' || e.key==='M') btnSound.click();
      return;
    }

    if(e.key===' '){
      e.preventDefault();
      pencilMode = !pencilMode;
      if(pencilMode){
        eraseMode = false;
        showCandidates = false;
      }
      updateButtons();
      toast(pencilMode ? 'Notizen an' : 'Notizen aus');
      render();
      return;
    }
    if(e.key==='e' || e.key==='E'){
      eraseMode = !eraseMode;
      if(eraseMode){
        pencilMode = false;
        showCandidates = false;
        brush = null;
      }
      updateButtons();
      toast(eraseMode ? 'Radierer' : 'Radierer aus');
      return;
    }
    if(e.key==='m' || e.key==='M'){ btnSound.click(); return; }
    if(e.key==='c' || e.key==='C'){
      showCandidates = !showCandidates;
      if(showCandidates){
        pencilMode = false;
        eraseMode = false;
      }
      render();
      return;
    }

    if(e.key==='ArrowLeft' && selected>=0 && selected%9>0){ selected--; render(); return; }
    if(e.key==='ArrowRight' && selected>=0 && selected%9<8){ selected++; render(); return; }
    if(e.key==='ArrowUp' && selected>=9){ selected-=9; render(); return; }
    if(e.key==='ArrowDown' && selected>=0 && selected<72){ selected+=9; render(); return; }

    if(selected<0) return;

    if(e.key==='Backspace' || e.key==='Delete' || e.key==='0'){
      if(!ensureHumanMoveTurn()) return;
      clearCell(selected);
      return;
    }

    if(/^[1-9]$/.test(e.key)){
      if(!ensureHumanMoveTurn()) return;
      if(fixed[selected]){ toast('Fix'); return; }
      if(pencilMode) toggleNote(selected, e.key);
      else setCell(selected, e.key, {countMistake:true, duelActor:'human'});
    }
  });

  setPresetPanelOpen(false);
  setActivePreferencesTopic(activePreferencesTopic);
  setPreferencesOpen(false);
  logicWaveEnabled = !!currentLevel().useLogicWave;
  syncLiveWebrtcControls();
  refreshLiveUi();
  updateButtons();
  render();
  if(!tryLoadSharedFromLocation()){
    genNew();
  }
  void tryLoadLiveSignalFromLocation();

})();
  </script>
</body>
</html>
