
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoku Game</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div id="emokuApp" class="wrap"></div>

  <!-- Loads the full game -->
  <script>
(function(){
  'use strict';

  // ======================= Generator defaults =======================
  const GENERATOR_DEFAULTS = Object.freeze({
    symmetry: 'none',
    unique: true,
  });

  // ======================= Tone mapping (Tonstufen auf C) =======================
  // 0=C, 1=D, 2=Es, 3=E, 4=F, 5=G, 6=As, 7=A, 8=B, 9=H
  const TONE_NAME = Object.freeze({
    '0':'C',
    '1':'D',  '2':'Es', '3':'E',
    '4':'F',  '5':'G',  '6':'As',
    '7':'A',  '8':'B',  '9':'H'
  });

  // Reference: equal temperament A4=440Hz
  const TONE_HZ = Object.freeze({
    '0':261.626, // C4 (empty cell)
    '1':293.665, // D4
    '2':311.127, // Eb4 (Es)
    '3':329.628, // E4
    '4':349.228, // F4
    '5':391.995, // G4
    '6':415.305, // Ab4 (As)
    '7':440.000, // A4
    '8':466.164, // Bb4 (B)
    '9':493.883, // B4 (H)
  });
  const SOUND_PRESETS = Object.freeze({
    warm: Object.freeze({ label:'Warm' }),
    bell: Object.freeze({ label:'Sweet Bell' }),
    percussion: Object.freeze({ label:'Synth' }),
  });
  const SOUND_PRESET_ORDER = Object.freeze(['warm','bell','percussion']);

  const MELODY_PATTERNS = Object.freeze({
    patternA: Object.freeze({ label:'Melodie 1' }),
    patternB: Object.freeze({ label:'Melodie 2' }),
    patternC: Object.freeze({ label:'Melodie 3' }),
  });
  const MELODY_PATTERN_ORDER = Object.freeze(['patternA','patternB','patternC']);

  const UI_SKINS = Object.freeze({
    default: Object.freeze({ label:'Standard' }),
    gamer: Object.freeze({ label:'Gamer-like' }),
    friendly: Object.freeze({ label:'User friendly' }),
    professional: Object.freeze({ label:'Professional' }),
  });
  const UI_SKIN_ORDER = Object.freeze(['default','gamer','friendly','professional']);

  let activeSoundPreset = 'warm';
  let activeMelodyPattern = 'patternA';
  let activeUiSkin = 'default';
  let userName = '';
  let liveModePref = 'wan';
  let liveLinkFlowPref = 'short';
  let liveStunProfilePref = 'verified';
  let liveCustomStunPref = '';
  let liveDuelTurnSecPref = 30;
  let livePingIntervalSec = 7;
  let liveIceTimeoutMs = 6500;
  const DUEL_DEFAULT_HUMAN_SEC = 7;
  const DUEL_DEFAULT_BOT_SEC = 1;
  const DUEL_HUMAN_TURN_OPTIONS = Object.freeze([5,7,10,12,15,20,30]);
  const DUEL_BOT_TURN_OPTIONS = Object.freeze([1,2,3,4,5,7,10]);
  const MIST_GAME_OVER_OPTIONS = Object.freeze([0,1,2,3,4,5,7,9]);
  const MIST_GAME_OVER_DEFAULT = 0;
  const MAX_SAVED_GAMES = 24;
  const LIVE_SIGNAL_VERSION = 1;
  const LIVE_ICE_SERVERS = Object.freeze([
    Object.freeze({
      urls: Object.freeze([
        'stun:stun.cloudflare.com:3478',
        'stun:stun.nextcloud.com:443',
        'stun:stun.sipnet.net:3478',
        'stun:stun.l.google.com:19302',
      ]),
    }),
  ]);
  let duelHumanTurnBaseSec = DUEL_DEFAULT_HUMAN_SEC;
  let duelBotTurnBaseSec = DUEL_DEFAULT_BOT_SEC;
  let mistGameOverLimit = MIST_GAME_OVER_DEFAULT;
  let onlyCandidatesAsNotes = false;
  let autoFixTwoCandidates = true;
  let paletteOnlyMissing = true;
  let playEndgameEnabled = true;
  let localLiveUserId = '';

  let audioCtx = null;
  let soundOn = false;
  let botSilentMoveSound = false;
  let completionMelodiesEnabled = true;
  let audioUnlocked = false;
  let lastHover = { t: 0, k: null }; // k = key (digit / cell / value)
  let seqToken = 0; // cancels pending candidate sequences
let boxSeqToken = 0; // cancels pending 3x3 box scan sequences
let pathSeqToken = 0; // cancels generic path (row/col/spiral) sequences
  let melodyBusyUntilMs = 0;
  const MELODY_QUEUE_GAP_MS = 84; // gap between melodies from different trigger events
  const MELODY_CHAIN_GAP_MS = 10; // much tighter gap for segments of the same trigger event
  const MELODY_CHAIN_BREAK_MS = 44; // short phrase break inside one event chain
  const SCORE_TO_COMPLETION_GAP_MS = 180; // keep score and row/box/col melodies clearly separated
  let melodyQueueUntilMs = 0;
  let melodyQueueToken = 0;
  let scoreCueUntilMs = 0;
  let hoverIntentTimer = null;
  let hoverIntentKey = null;

  // A small, robust WebAudio chain (Safari-friendly)
  let masterGain = null;
  let comp = null;
  let lpMaster = null;
  let toneSoftener = null;
  let percNoiseBuffer = null;

  function setPlaybackAudioSession(){
    try{
      const nav = window.navigator;
      if(nav && nav.audioSession && nav.audioSession.type !== 'playback'){
        nav.audioSession.type = 'playback';
      }
    }catch(_e){}
  }

  function ensureAudio(){
    setPlaybackAudioSession();
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // build master chain once
    if(!masterGain){
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.38;

      comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -27;
      comp.knee.value = 24;
      comp.ratio.value = 3.1;
      comp.attack.value = 0.006;
      comp.release.value = 0.24;

      lpMaster = audioCtx.createBiquadFilter();
      lpMaster.type = 'lowpass';
      lpMaster.frequency.value = 4200;
      lpMaster.Q.value = 0.42;

      toneSoftener = audioCtx.createBiquadFilter();
      toneSoftener.type = 'highshelf';
      toneSoftener.frequency.value = 2400;
      toneSoftener.gain.value = -4.2;

      masterGain.connect(comp);
      comp.connect(lpMaster);
      lpMaster.connect(toneSoftener);
      toneSoftener.connect(audioCtx.destination);
    }

    // try to resume (must be called from a gesture at least once)
    if(audioCtx.state !== 'running'){
      try{ audioCtx.resume(); }catch(_e){}
    }
    return audioCtx;
  }

  function primeAudioForIOS(ctx){
    if(!ctx) return;
    try{
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.00001, t);
      osc.frequency.setValueAtTime(440, t);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.012);
    }catch(_e){}
  }

  function unlockAudioFromGesture(){
    if(!soundOn) return;
    setPlaybackAudioSession();
    const ctx = ensureAudio();

    const onReady = ()=>{
      if(ctx.state === 'running'){
        audioUnlocked = true;
        primeAudioForIOS(ctx);
      }
    };

    try{
      const maybe = ctx.resume();
      if(maybe && typeof maybe.then==='function') maybe.then(onReady).catch(()=>{});
    }catch(_e){}

    onReady();
  }

  function scheduleAudioUnlockRetries(){
    if(!soundOn) return;
    setTimeout(unlockAudioFromGesture, 80);
    setTimeout(unlockAudioFromGesture, 220);
    setTimeout(unlockAudioFromGesture, 420);
  }

  function hzFromSemis(baseHz, semis){
    return baseHz * Math.pow(2, semis/12);
  }

  function ensurePercNoiseBuffer(ctx){
    if(percNoiseBuffer && percNoiseBuffer.sampleRate === ctx.sampleRate) return percNoiseBuffer;
    const len = Math.max(1, Math.floor(ctx.sampleRate * 0.10));
    const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<len;i++){
      const t = 1 - (i/len);
      data[i] = (Math.random()*2 - 1) * t * t;
    }
    percNoiseBuffer = buffer;
    return percNoiseBuffer;
  }

  function getSoundPresetId(){
    return SOUND_PRESETS[activeSoundPreset] ? activeSoundPreset : SOUND_PRESET_ORDER[0];
  }

  function getMelodyPatternId(){
    return MELODY_PATTERNS[activeMelodyPattern] ? activeMelodyPattern : MELODY_PATTERN_ORDER[0];
  }

  function melodyNowMs(){ return Date.now(); }

  function noteScoreCueWindow(durationMs=0){
    const dur = Math.max(0, Number(durationMs)||0);
    const until = melodyNowMs() + dur;
    if(until > scoreCueUntilMs) scoreCueUntilMs = until;
  }

  function scoreCueRemainingMs(){
    return Math.max(0, scoreCueUntilMs - melodyNowMs());
  }

  function claimMelodyWindow(durationMs=0){
    const now = melodyNowMs();
    if(now < melodyBusyUntilMs) return false;
    const dur = Math.max(0, Number(durationMs)||0);
    melodyBusyUntilMs = now + dur;
    return true;
  }

  function extendMelodyWindow(durationMs=0){
    const dur = Math.max(0, Number(durationMs)||0);
    const until = melodyNowMs() + dur;
    if(until > melodyBusyUntilMs) melodyBusyUntilMs = until;
  }

  function releaseMelodyWindow(){
    melodyBusyUntilMs = 0;
    melodyQueueUntilMs = 0;
  }

  function reserveMelodyQueue(durationMs=0, {startDelayMs=0, gapMs=MELODY_QUEUE_GAP_MS}={}){
    const now = melodyNowMs();
    const startDelay = Math.max(0, Number(startDelayMs)||0);
    const dur = Math.max(0, Number(durationMs)||0);
    const gap = Math.max(0, Number(gapMs)||0);
    const startAt = Math.max(now, melodyQueueUntilMs) + startDelay;
    melodyQueueUntilMs = startAt + dur + gap;
    extendMelodyWindow((melodyQueueUntilMs - now) + 24);
    return Math.max(0, startAt - now);
  }

  function queueMelodySegment(durationMs, fn, opts={}){
    if(!soundOn || typeof fn!=='function') return 0;
    const delayMs = reserveMelodyQueue(durationMs, opts);
    const token = melodyQueueToken;
    setTimeout(()=>{
      if(token !== melodyQueueToken) return;
      if(!soundOn) return;
      fn();
    }, delayMs);
    return delayMs;
  }

  function stopAllMusicNow({resetUnlock=false}={}){
    // Cancel delayed melody callbacks and sequence markers from previous game states.
    seqToken++;
    boxSeqToken++;
    pathSeqToken++;
    melodyQueueToken++;
    melodyQueueUntilMs = 0;
    scoreCueUntilMs = 0;
    releaseMelodyWindow();

    if(hoverIntentTimer){
      clearTimeout(hoverIntentTimer);
      hoverIntentTimer = null;
    }
    hoverIntentKey = null;

    const ctx = audioCtx;
    if(ctx){
      try{
        if(masterGain){
          const t = ctx.currentTime;
          const g = masterGain.gain;
          g.cancelScheduledValues(t);
          g.setValueAtTime(Math.max(0.00001, Number(g.value)||0.00001), t);
          g.exponentialRampToValueAtTime(0.00001, t + 0.015);
        }
      }catch(_e){}

      try{
        const closeCtx = ()=>{ try{ ctx.close(); }catch(_e){} };
        if(ctx.state === "running"){
          const maybe = ctx.suspend();
          if(maybe && typeof maybe.then==="function") maybe.then(closeCtx).catch(closeCtx);
          else closeCtx();
        } else {
          closeCtx();
        }
      }catch(_e){
        try{ ctx.close(); }catch(_e2){}
      }
    }

    audioCtx = null;
    masterGain = null;
    comp = null;
    lpMaster = null;
    toneSoftener = null;
    percNoiseBuffer = null;
    if(resetUnlock) audioUnlocked = false;
  }

  function playToneHzWarm(ctx, hz, now, peak, dur){
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const osc3 = ctx.createOscillator();

    const g1 = ctx.createGain();
    const g2 = ctx.createGain();
    const g3 = ctx.createGain();
    const mix = ctx.createGain();

    const hp = ctx.createBiquadFilter();
    const lp = ctx.createBiquadFilter();

    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc3.type = 'sine';

    // Leaner warm tone: remove heavy sub and keep a light top layer.
    osc1.frequency.setValueAtTime(hz, now);
    osc2.frequency.setValueAtTime(hz * 1.005, now);
    osc3.frequency.setValueAtTime(hz * 2.0, now);

    g1.gain.setValueAtTime(0.66, now);
    g2.gain.setValueAtTime(0.18, now);
    g3.gain.setValueAtTime(0.10, now);

    hp.type = 'highpass';
    hp.frequency.setValueAtTime(115, now);
    hp.Q.setValueAtTime(0.50, now);

    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3600, now);
    lp.frequency.exponentialRampToValueAtTime(2500, now + Math.max(0.08, dur*0.68));
    lp.Q.setValueAtTime(0.58, now);

    mix.gain.setValueAtTime(0.0001, now);
    mix.gain.exponentialRampToValueAtTime(Math.max(0.016, peak*0.70), now + 0.012);
    mix.gain.exponentialRampToValueAtTime(Math.max(0.010, peak*0.24), now + Math.min(0.12, dur*0.60));
    mix.gain.exponentialRampToValueAtTime(0.0001, now + dur + 0.016);

    osc1.connect(g1);
    osc2.connect(g2);
    osc3.connect(g3);
    g1.connect(mix);
    g2.connect(mix);
    g3.connect(mix);

    mix.connect(hp);
    hp.connect(lp);
    lp.connect(masterGain);

    osc1.start(now);
    osc2.start(now);
    osc3.start(now);
    osc1.stop(now + dur + 0.05);
    osc2.stop(now + dur + 0.05);
    osc3.stop(now + dur + 0.05);
  }

  function playToneHzBell(ctx, hz, now, peak, dur){
    const main = ctx.createOscillator();
    const over = ctx.createOscillator();
    const air = ctx.createOscillator();
    const vibr = ctx.createOscillator();

    const mainGain = ctx.createGain();
    const overGain = ctx.createGain();
    const airGain = ctx.createGain();
    const out = ctx.createGain();
    const vibrGain = ctx.createGain();

    const hp = ctx.createBiquadFilter();
    const lp = ctx.createBiquadFilter();

    main.type = 'sine';
    over.type = 'triangle';
    air.type = 'sine';
    vibr.type = 'sine';

    main.frequency.setValueAtTime(hz, now);
    over.frequency.setValueAtTime(hz * 2.01, now);
    air.frequency.setValueAtTime(hz * 3.99, now);
    vibr.frequency.setValueAtTime(5.1, now);

    vibrGain.gain.setValueAtTime(4.8, now);
    vibr.connect(vibrGain);
    vibrGain.connect(main.detune);
    vibrGain.connect(over.detune);

    mainGain.gain.setValueAtTime(1, now);
    overGain.gain.setValueAtTime(0.30, now);
    airGain.gain.setValueAtTime(0.12, now);

    out.gain.setValueAtTime(0.0001, now);
    out.gain.exponentialRampToValueAtTime(Math.max(0.02, peak*0.80), now + 0.010);
    out.gain.exponentialRampToValueAtTime(Math.max(0.015, peak*0.28), now + Math.min(0.18, dur*0.72));
    out.gain.exponentialRampToValueAtTime(0.0001, now + dur + 0.08);

    hp.type = 'highpass';
    hp.frequency.setValueAtTime(160, now);
    hp.Q.setValueAtTime(0.55, now);

    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(4600, now);
    lp.frequency.exponentialRampToValueAtTime(2800, now + Math.max(0.10, dur*0.78));
    lp.Q.setValueAtTime(0.58, now);

    main.connect(mainGain);
    over.connect(overGain);
    air.connect(airGain);
    mainGain.connect(out);
    overGain.connect(out);
    airGain.connect(out);

    out.connect(hp);
    hp.connect(lp);
    lp.connect(masterGain);

    main.start(now);
    over.start(now);
    air.start(now);
    vibr.start(now);
    main.stop(now + dur + 0.12);
    over.stop(now + dur + 0.12);
    air.stop(now + dur + 0.12);
    vibr.stop(now + dur + 0.12);
  }

  function playToneHzPercussion(ctx, hz, now, peak, dur){
    // Silky synth voice: smooth digital body with gentle shimmer.
    const voiceDur = Math.max(0.20, Math.min(0.56, dur + 0.12));

    const carrierA = ctx.createOscillator();
    const carrierB = ctx.createOscillator();
    const shimmer = ctx.createOscillator();
    const modA = ctx.createOscillator();
    const modB = ctx.createOscillator();
    const vibr = ctx.createOscillator();

    const carAGain = ctx.createGain();
    const carBGain = ctx.createGain();
    const shimmerGain = ctx.createGain();
    const modAGain = ctx.createGain();
    const modBGain = ctx.createGain();
    const vibrGain = ctx.createGain();

    const mix = ctx.createGain();
    const hp = ctx.createBiquadFilter();
    const lp = ctx.createBiquadFilter();
    const color = ctx.createBiquadFilter();

    carrierA.type = 'triangle';
    carrierB.type = 'sine';
    shimmer.type = 'sine';
    modA.type = 'sine';
    modB.type = 'sine';
    vibr.type = 'sine';

    carrierA.frequency.setValueAtTime(hz, now);
    carrierB.frequency.setValueAtTime(hz * 1.998, now);
    shimmer.frequency.setValueAtTime(hz * 3.01, now);

    modA.frequency.setValueAtTime(hz * 2.01, now);
    modB.frequency.setValueAtTime(hz * 4.02, now);
    vibr.frequency.setValueAtTime(5.1, now);

    // Gentle FM movement: enough color, no harsh clang.
    modAGain.gain.setValueAtTime(Math.max(4.2, hz * 0.085), now);
    modAGain.gain.exponentialRampToValueAtTime(Math.max(1.6, hz * 0.030), now + Math.min(0.11, voiceDur * 0.46));
    modAGain.gain.exponentialRampToValueAtTime(0.0001, now + voiceDur + 0.06);

    modBGain.gain.setValueAtTime(Math.max(2.4, hz * 0.045), now);
    modBGain.gain.exponentialRampToValueAtTime(0.0001, now + Math.min(0.18, voiceDur * 0.70));

    vibrGain.gain.setValueAtTime(2.3, now);
    vibrGain.gain.exponentialRampToValueAtTime(4.0, now + Math.max(0.12, voiceDur * 0.55));

    carAGain.gain.setValueAtTime(0.70, now);
    carBGain.gain.setValueAtTime(0.25, now);
    shimmerGain.gain.setValueAtTime(0.11, now);

    mix.gain.setValueAtTime(0.0001, now);
    mix.gain.exponentialRampToValueAtTime(Math.max(0.018, peak * 0.72), now + 0.010);
    mix.gain.exponentialRampToValueAtTime(Math.max(0.012, peak * 0.30), now + Math.min(0.18, voiceDur * 0.72));
    mix.gain.exponentialRampToValueAtTime(0.0001, now + voiceDur + 0.09);

    hp.type = 'highpass';
    hp.frequency.setValueAtTime(120, now);
    hp.Q.setValueAtTime(0.52, now);

    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(4200, now);
    lp.frequency.exponentialRampToValueAtTime(2500, now + Math.max(0.14, voiceDur * 0.82));
    lp.Q.setValueAtTime(0.62, now);

    color.type = 'peaking';
    color.frequency.setValueAtTime(1900, now);
    color.Q.setValueAtTime(0.74, now);
    color.gain.setValueAtTime(1.3, now);

    modA.connect(modAGain);
    modAGain.connect(carrierA.frequency);
    modAGain.connect(carrierB.frequency);

    modB.connect(modBGain);
    modBGain.connect(carrierB.frequency);

    vibr.connect(vibrGain);
    vibrGain.connect(carrierA.detune);
    vibrGain.connect(carrierB.detune);
    vibrGain.connect(shimmer.detune);

    carrierA.connect(carAGain);
    carrierB.connect(carBGain);
    shimmer.connect(shimmerGain);

    carAGain.connect(mix);
    carBGain.connect(mix);
    shimmerGain.connect(mix);

    mix.connect(hp);
    hp.connect(lp);
    lp.connect(color);
    color.connect(masterGain);

    carrierA.start(now);
    carrierB.start(now);
    shimmer.start(now);
    modA.start(now);
    modB.start(now);
    vibr.start(now);

    carrierA.stop(now + voiceDur + 0.12);
    carrierB.stop(now + voiceDur + 0.12);
    shimmer.stop(now + voiceDur + 0.12);
    modA.stop(now + voiceDur + 0.10);
    modB.stop(now + Math.min(voiceDur + 0.08, 0.44));
    vibr.stop(now + voiceDur + 0.12);
  }

  function playToneHz(hz, delayMs=0, amp=0.35, dur=0.18, retried=false){
    if(!soundOn) return;
    if(!Number.isFinite(hz) || hz<=0) return;

    const ctx = ensureAudio();
    if(ctx.state !== 'running'){
      if(!retried){
        try{
          const maybe = ctx.resume();
          if(maybe && typeof maybe.then==='function'){
            maybe.then(()=>{
              if(!soundOn) return;
              if(ctx.state !== 'running') return;
              playToneHz(hz, delayMs, amp, dur, true);
            }).catch(()=>{});
          }
        }catch(_e){}
      }
      return;
    }

    const now = ctx.currentTime + Math.max(0, delayMs)/1000;
    const peak = Math.max(0.028, Math.min(0.34, amp));
    const safeDur = Math.max(0.06, Number(dur)||0.18);
    const soundId = getSoundPresetId();

    if(soundId==='bell'){
      playToneHzBell(ctx, hz, now, peak, safeDur);
      return;
    }
    if(soundId==='percussion'){
      playToneHzPercussion(ctx, hz, now, peak, safeDur);
      return;
    }
    playToneHzWarm(ctx, hz, now, peak, safeDur);
  }

  function playToneDigit(d, offsetSec=0, amp=0.35){
    if(!soundOn) return;
    if(!/^[0-9]$/.test(String(d))) return;
    const hz = TONE_HZ[String(d)];
    if(!hz) return;

    const soundId = getSoundPresetId();
    let dur = 0.22;
    if(soundId==='bell') dur = 0.23;
    if(soundId==='percussion') dur = 0.23;

    playToneHz(hz, Math.max(0, offsetSec)*1000, amp, dur);
  }

  function playBrushSelectCue(d){
    if(!soundOn) return;
    const ds = String(d||'');
    if(!/^[1-9]$/.test(ds)) return;
    const hz = TONE_HZ[ds];
    if(!hz) return;

    // Brush select: very short + short tone.
    playToneHz(hz, 0, 0.17, 0.062);
    playToneHz(hz, 86, 0.22, 0.13);
  }

  function playBrushDeselectCue(d){
    if(!soundOn) return;
    const ds = String(d||'');
    if(!/^[1-9]$/.test(ds)) return;
    const hz = TONE_HZ[ds];
    if(!hz) return;

    // Direct deselect: short tone, then one octave lower and longer.
    playToneHz(hz, 0, 0.18, 0.11);
    playToneHz(hzFromSemis(hz, -12), 92, 0.24, 0.28);
  }

  function playErrorHit(delayMs=0){
    if(!soundOn) return;
    const startDelay = Math.max(0, Number(delayMs)||0);
    if(!claimMelodyWindow(startDelay + 560)) return;
    const base = TONE_HZ['0'] || 261.626;

      playToneHz(base * 0.60, startDelay + 220, 0.19, 0.11);

    playToneHz(base, startDelay, 0.20, 0.13);
    playToneHz(hzFromSemis(base, -5), startDelay + 150, 0.18, 0.16);

  function playCandidateSequence(digits){
    if(!soundOn) return;
    const ds = (digits||'').split('').filter(ch=>/^[1-9]$/.test(ch));
    ds.sort((a,b)=>Number(a)-Number(b));
    if(!ds.length) return;

    const melody = getMelodyPatternId();

    let phrase = ds.slice();
    let stepMs = 150;
    let edgeAmp = 0.24;
    let midAmp = 0.20;

    if(melody==='patternB'){
      phrase = ds.concat(ds.slice(0,-1).reverse());
      stepMs = 138;
      edgeAmp = 0.22;
      midAmp = 0.19;
    } else if(melody==='patternC'){
      phrase = [];
      for(const d of ds){ phrase.push(d, d); }
      if(ds.length>1) phrase.push(ds[0]);
      stepMs = 118;
      edgeAmp = 0.22;
      midAmp = 0.19;
    } else {
      phrase.push(ds[0]);
    }

    const melodyDurationMs = Math.max(280, ((phrase.length-1) * stepMs) + 360);
    if(!claimMelodyWindow(melodyDurationMs)) return;

    const my = ++seqToken;
    for(let i=0;i<phrase.length;i++){
      setTimeout(()=>{
        if(my !== seqToken) return;
        const amp = (i===0 || i===phrase.length-1) ? edgeAmp : midAmp;
        playToneDigit(phrase[i], 0, amp);
      }, i*stepMs);
    }
  }

  function splitGraphemes(text){
    const t = String(text||'');
    if(!t) return [];
    if(GRAPHEME_SEGMENTER){

  function safeStorageGet(key){

  function sanitizeUserName(value){

  function sanitizeShareStatInt(value, min=-999999, max=999999){
    const n = Number(value);

    const i = Math.trunc(n);
    if(i < min) return min;
    if(i > max) return max;

  function fallbackShareGameIdForPuzzle(puzzleStr){
    const p = normalizeBoard81(puzzleStr, {allowBlank:true}) || '.'.repeat(81);
    let h = 2166136261 >>> 0;
    for(let i=0;i<p.length;i++){
      h ^= p.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return `p${h.toString(36)}`;

  function sanitizeSharedGameResultRow(raw){
    if(!raw || typeof raw!=='object') return null;
    const name = sanitizeUserName(raw.name) || 'Player';
    const score = sanitizeShareStatInt(raw.score, -999999, 999999);
    const mistakes = sanitizeShareStatInt(raw.mistakes, 0, 9999);
    const timeSec = sanitizeShareStatInt(raw.timeSec, 0, 864000);
    const atNum = Number(raw.at);
    const at = Number.isFinite(atNum) ? Math.max(0, Math.round(atNum)) : Date.now();
    return {
      name,
      score: score===null ? 0 : score,
      mistakes: mistakes===null ? 0 : mistakes,
      timeSec: timeSec===null ? 0 : timeSec,
      at,
    };
  }

  function compareSharedGameRows(a, b){
    const as = Number(a && a.score) || 0;
    const bs = Number(b && b.score) || 0;
    if(bs!==as) return bs - as;

    const at = Number(a && a.timeSec) || 0;
    const bt = Number(b && b.timeSec) || 0;
    if(at!==bt) return at - bt;

    const aa = Number(a && a.at) || 0;
    const ba = Number(b && b.at) || 0;
    if(ba!==aa) return ba - aa;

    const an = String(a && a.name || '');
    const bn = String(b && b.name || '');
    return an.localeCompare(bn, 'de-DE', {sensitivity:'base'});
  }

  function sanitizeSharedGameResultsBook(value){
    const out = Object.create(null);
    if(!value || typeof value!=='object') return out;

    const gameRows = [];
    for(const [gidRaw, rowsRaw] of Object.entries(value)){
      const gid = sanitizeShareGameId(gidRaw);
      if(!gid || !Array.isArray(rowsRaw)) continue;

      const byName = new Map();
      for(const rowRaw of rowsRaw){
        const row = sanitizeSharedGameResultRow(rowRaw);
        if(!row) continue;
        const key = row.name.toLowerCase();
        const prev = byName.get(key);
        if(!prev || compareSharedGameRows(row, prev) < 0) byName.set(key, row);
      }

      const rows = Array.from(byName.values()).sort(compareSharedGameRows).slice(0, MAX_SHARED_GAME_RESULTS_ROWS);
      if(!rows.length) continue;
      const latestAt = rows.reduce((m, r)=> Math.max(m, Number(r && r.at)||0), 0);
      gameRows.push({ gid, rows, latestAt });
    }

    gameRows.sort((a,b)=> b.latestAt - a.latestAt);
    for(const item of gameRows.slice(0, MAX_SHARED_GAME_RESULTS_GAMES)){
      out[item.gid] = item.rows;
    }
    return out;
  }

  function loadSharedGameResultsState(){

  function persistSharedGameResultsState(){

  function gameResultsForId(gameId){
    const gid = sanitizeShareGameId(gameId);
    if(!gid) return [];
    const rows = sharedGameResults && Array.isArray(sharedGameResults[gid]) ? sharedGameResults[gid] : [];
    return rows.slice().sort(compareSharedGameRows);
  }

  function upsertSharedGameResult(gameId, rawMeta){
    const gid = sanitizeShareGameId(gameId);
    const row = sanitizeSharedGameResultRow(rawMeta);
    if(!gid || !row) return false;

    const cur = gameResultsForId(gid);
    const key = row.name.toLowerCase();
    const idx = cur.findIndex(item=>String(item && item.name || '').toLowerCase()===key);
    if(idx>=0){
      const prev = cur[idx];
      const better = compareSharedGameRows(row, prev) < 0;
      if(better) cur[idx] = row;
      else if((Number(row.at)||0) > (Number(prev && prev.at)||0)) cur[idx] = { ...prev, at: row.at };
    } else {
      cur.push(row);
    }

    cur.sort(compareSharedGameRows);
    sharedGameResults[gid] = cur.slice(0, MAX_SHARED_GAME_RESULTS_ROWS);

    const limited = sanitizeSharedGameResultsBook(sharedGameResults);
    sharedGameResults = limited;
    persistSharedGameResultsState();
    return true;
  }

  function normalizeColorHex(raw, fallback='#808080'){
    const tmp = document.createElement('span');
    tmp.style.color = '';
    tmp.style.color = String(raw||'');
    const c = String(tmp.style.color || '').trim().toLowerCase();
    if(!c) return fallback;
    const short = c.match(/^#([0-9a-f]{3})$/i);
    if(short){
      return `#${short[1].split('').map(ch=>ch+ch).join('').toLowerCase()}`;
    }
    const full = c.match(/^#([0-9a-f]{6})$/i);
    if(full) return `#${full[1].toLowerCase()}`;
    const rgb = c.match(/^rgba?\(\s*([0-9]+)[,\s]+([0-9]+)[,\s]+([0-9]+)/i);
    if(rgb){
      const toHex = (n)=> Math.max(0, Math.min(255, Number(n)||0)).toString(16).padStart(2,'0');
      return `#${toHex(rgb[1])}${toHex(rgb[2])}${toHex(rgb[3])}`;
    }
    return fallback;
  }

  function mergePuzzleIntoGrid(puzzleStr, rawGrid){
    const base = normalizeBoard81(puzzleStr, {allowBlank:true});
    if(!base) return null;
    const gridCandidate = normalizeBoard81(rawGrid, {allowBlank:true}) || base;
    const chars = gridCandidate.split('');
    for(let i=0;i<81;i++){
      if(base[i]!==BLANK) chars[i] = base[i];
    }
    return chars.join('');
  }

  function buildFixedMaskForPuzzle(puzzleStr, rawFixedMask){
    const base = normalizeBoard81(puzzleStr, {allowBlank:true});
    if(!base) return null;
    const fixedMaskRaw = sanitizeFixedMask(rawFixedMask);
    let fixedMask = '';
    for(let i=0;i<81;i++){
      if(base[i]!==BLANK) fixedMask += '1';
      else fixedMask += (fixedMaskRaw && fixedMaskRaw[i]==='1') ? '1' : '0';
    }
    return fixedMask;
  }

  function notesSetsToArray(){
    const out = Array(81).fill('');
    for(let i=0;i<81;i++){
      if(!notes[i] || notes[i].size<=0){
        out[i] = '';
        continue;
      }
      const digits = Array.from(notes[i]).filter(d=>/^[1-9]$/.test(String(d))).sort();
      const uniq = new Set();
      let acc = '';
      for(const d of digits){
        if(uniq.has(d)) continue;
        uniq.add(d);
        acc += d;
      }
      out[i] = acc;
    }
    return out;
  }

  function shuffle(arr, rnd=Math.random){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(rnd()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function clone(o){
    const r={};
    for(const k in o) r[k]=o[k];
    return r;
  }

  function validateBoard(b){
    if(typeof b!=='string'||b.length!==81) return false;
    for(let i=0;i<81;i++){
      const ch=b[i];
      if(ch!==BLANK && !DIGITS.includes(ch)) return false;
    }
    return true;
  }

  function idxToRC(i){ return [Math.floor(i/9), i%9]; }
  function rcToIdx(r,c){ return r*9+c; }

  const MAPS=(()=>{
    const units=[];
    for(let r=0;r<9;r++) units.push(cross(ROWS[r],COLS));
    for(let c=0;c<9;c++) units.push(cross(ROWS,COLS[c]));
    const rs=["ABC","DEF","GHI"], cs=["123","456","789"];
    for(const R of rs) for(const C of cs) units.push(cross(R,C));

    const squareUnits={}, squarePeers={};
    for(const s of SQUARES){
      squareUnits[s]=units.filter(u=>u.includes(s));
      const peers=[];
      for(const u of squareUnits[s]){
        for(const t of u){
          if(t!==s && !peers.includes(t)) peers.push(t);
        }
      }
      squarePeers[s]=peers;
    }
    return {units,squareUnits,squarePeers};
  })();

  function blankCandidates(){
    const m={};
    for(const s of SQUARES) m[s]=DIGITS;
    return m;
  }

  function boardToMap(b){
    const m={};
    for(let i=0;i<81;i++) m[SQUARES[i]]=b[i];
    return m;
  }

  function assign(c,s,v){
    const others=c[s].replace(v,"");
    for(let k=0;k<others.length;k++){
      if(!eliminate(c,s,others[k])) return null;
    }
    return c;
  }

  function eliminate(c,s,v){
    if(!c[s].includes(v)) return c;
    c[s]=c[s].replace(v,"");

    const n=c[s].length;
    if(n===0) return null;

    if(n===1){
      const v2=c[s];
      for(const p of MAPS.squarePeers[s]){
        if(!eliminate(c,p,v2)) return null;
      }
    }

    for(const unit of MAPS.squareUnits[s]){
      const places=[];
      for(const t of unit) if(c[t].includes(v)) places.push(t);
      if(places.length===0) return null;
      if(places.length===1){
        if(!assign(c,places[0],v)) return null;
      }
    }

    return c;
  }

  function candidatesFromBoard(b){
    if(!validateBoard(b)) throw Error("Invalid board");
    const c=blankCandidates();
    const m=boardToMap(b);
    for(const s of SQUARES){
      const v=m[s];
      if(v!==BLANK){
        if(!assign(c,s,v)) return null;
      }
    }
    return c;
  }

  function search(c,rnd=Math.random){
    if(!c) return null;
    let solved=true, target=null, min=10;
    for(const s of SQUARES){
      const len=c[s].length;
      if(len!==1) solved=false;
      if(len===0) return null;
      if(len>1 && len<min){ min=len; target=s; }
    }
    if(solved) return c;

    const opts=shuffle(c[target].split(""), rnd);
    for(const v of opts){
      const cp=clone(c);
      const next=assign(cp,target,v);
      const res=search(next,rnd);
      if(res) return res;
    }
    return null;
  }

  function solveBoard(b){
    const c=candidatesFromBoard(b);
    const r=search(c);
    if(!r) return null;
    let out="";
    for(const s of SQUARES) out+=r[s];
    return out;
  }

  function countSolutions(b,cap=2){
    const start=candidatesFromBoard(b);
    if(!start) return 0;
    let cnt=0;
    (function dfs(c){
      if(!c || cnt>=cap) return;
      let solved=true, target=null, min=10;
      for(const s of SQUARES){
        const len=c[s].length;
        if(len!==1) solved=false;
        if(len===0) return;
        if(len>1 && len<min){ min=len; target=s; }
      }
      if(solved){ cnt++; return; }
      const opts=c[target];
      for(let i=0;i<opts.length;i++){
        const v=opts[i];
        const cp=clone(c);
        const next=assign(cp,target,v);
        dfs(next);
        if(cnt>=cap) return;
      }
    })(start);
    return cnt;
  }

  function randomFullSolution(){
    const empty=".".repeat(81);
    let c=candidatesFromBoard(empty);
    for(const s of shuffle(SQUARES).slice(0,9)){
      const opts=c[s];
      const v=opts[Math.floor(Math.random()*opts.length)];
      if(!assign(c,s,v)) break;
    }
    const r=search(c);
    if(!r) return randomFullSolution();
    let out="";
    for(const s of SQUARES) out+=r[s];
    return out;
  }

  function partnerIndex(i, sym){
    const r=Math.floor(i/9), c=i%9;
    switch(sym){
      case 'rotate': return rcToIdx(8-r,8-c);
      case 'mirror': return rcToIdx(r,8-c);
      case 'flip-h': return rcToIdx(8-r,c);
      case 'flip-v': return rcToIdx(r,8-c);
      case 'none': return i;
      default: return i;
    }
  }

  function generatePuzzle({difficulty='medium', symmetry='rotate'}={}){
    let clues=typeof difficulty==='string' ? (DIFFICULTY[difficulty]||DIFFICULTY.medium) : difficulty;
    clues=Math.max(12,Math.min(81,clues));

    const full=randomFullSolution();
    let puz=full.split("");
    const order=shuffle([...Array(81).keys()]);
    let toRemove=81-clues;

    for(const i of order){
      if(toRemove<=0) break;
      if(puz[i]===BLANK) continue;

      const j=partnerIndex(i,symmetry);
      const idxs=(j!==i) ? [i,j] : [i];
      const bi=puz[i], bj=puz[j];
      idxs.forEach(k=>puz[k]=BLANK);

      const cand=puz.join("");
      if(countSolutions(cand,2)===1){
        toRemove-=idxs.length;
        if(toRemove<0) toRemove=0;
      } else {
        puz[i]=bi; puz[j]=bj;
      }
    }

    if(puz.filter(ch=>ch!==BLANK).length>clues){
      for(let i=0;i<81;i++){
        if(puz.filter(ch=>ch!==BLANK).length<=clues) break;
        if(puz[i]===BLANK) continue;
        const keep=puz[i];
        puz[i]=BLANK;
        if(countSolutions(puz.join(""),2)!==1) puz[i]=keep;
      }
    }

    return puz.join("");
  }

  function ensurePreferencesGroup(id, {title='', hint='', icon='', topic=''}={}){
    let g = document.getElementById(id);
    if(!g){
      g = document.createElement('section');
      g.id = id;
      elPreferencesGrid.appendChild(g);
    }
    g.className = 'prefGroup prefSection';
    g.setAttribute('role', 'group');
    if(topic) g.dataset.prefTopic = String(topic);
    else delete g.dataset.prefTopic;
    g.setAttribute('aria-label', String(title || 'Preference Group'));

    let head = g.querySelector('.prefSectionHead');
    if(!head){
      head = document.createElement('div');
      head.className = 'prefSectionHead';
      g.appendChild(head);
    }

    let titleRow = head.querySelector('.prefSectionTitleRow');
    if(!titleRow){
      titleRow = document.createElement('div');
      titleRow.className = 'prefSectionTitleRow';
      head.appendChild(titleRow);
    }

    let iconNode = titleRow.querySelector('.prefSectionIcon');
    if(!iconNode){
      iconNode = document.createElement('span');
      iconNode.className = 'prefSectionIcon';
      titleRow.appendChild(iconNode);
    }
    iconNode.textContent = icon ? String(icon) : '•';
    iconNode.style.display = icon ? '' : 'none';

    let titleNode = g.querySelector('.prefSectionTitle');
    if(!titleNode){
      titleNode = document.createElement('div');
      titleNode.className = 'prefSectionTitle';
      titleRow.appendChild(titleNode);
    }
    titleNode.id = `${id}Title`;
    titleNode.textContent = String(title || '');
    g.setAttribute('aria-labelledby', titleNode.id);
    if(titleNode.parentNode !== titleRow) titleRow.appendChild(titleNode);

    let hintNode = g.querySelector('.prefSectionHint');
    if(!hintNode){
      hintNode = document.createElement('div');
      hintNode.className = 'prefSectionHint';
      head.appendChild(hintNode);
    }
    hintNode.id = `${id}Hint`;
    hintNode.textContent = String(hint || '');
    hintNode.style.display = hint ? '' : 'none';
    g.setAttribute('aria-describedby', hintNode.id);
    if(hintNode.parentNode !== head) head.appendChild(hintNode);

    let body = g.querySelector('.prefSectionBody');
    if(!body){
      body = document.createElement('div');
      body.className = 'prefSectionBody';
      g.appendChild(body);
    }

    return { group:g, body };
  }

  function ensurePrefRow(parent, id, labelText, controlNode, {stack=false, hint=''}={}){
    let row = document.getElementById(id);
    if(!row){
      row = document.createElement('div');
      row.id = id;
      parent.appendChild(row);
    }
    row.className = stack ? 'prefRow prefRowStack' : 'prefRow';
    row.setAttribute('role', 'group');
    row.setAttribute('aria-label', String(labelText || 'Preference'));

    let meta = row.querySelector('.prefRowMeta');
    if(!meta){
      meta = document.createElement('div');
      meta.className = 'prefRowMeta';
      row.appendChild(meta);
    }

    let label = row.querySelector('.prefRowLabel');
    if(!label){
      label = document.createElement('div');
      label.className = 'prefRowLabel';
      meta.appendChild(label);
    }
    label.textContent = String(labelText || '');
    if(label.parentNode !== meta) meta.appendChild(label);

    let hintNode = row.querySelector('.prefRowHint');
    if(!hintNode){
      hintNode = document.createElement('div');
      hintNode.className = 'prefRowHint';
      meta.appendChild(hintNode);
    }
    hintNode.textContent = String(hint || '');
    hintNode.style.display = hint ? '' : 'none';
    if(hintNode.parentNode !== meta) meta.appendChild(hintNode);

    let control = row.querySelector('.prefRowControl');
    if(!control){
      control = document.createElement('div');
      control.className = 'prefRowControl';
      row.appendChild(control);
    }
    if(control.parentNode !== row) row.appendChild(control);
    if(controlNode && controlNode.parentNode !== control) control.appendChild(controlNode);
    if(row.parentNode !== parent) parent.appendChild(row);
    return row;
  }

      /* Sudoku board layout (hard override) */
      #board.board{
        display:grid !important;
        grid-template-columns: repeat(9, var(--emokuCell)) !important;
        gap: 0 !important;                 /* continuous lines */
        width: fit-content;
        background: transparent;
        padding: 0;
        border-radius:14px;
        overflow:hidden;
        border: var(--emokuThick) solid #000; /* outer border (black) */
        box-shadow: 0 16px 40px rgba(27,43,89,.12);
        touch-action: manipulation;
      }
      #board.board.duelTurnFade{
        animation: emokuDuelTurnFade 300ms ease;
      }
      #board.board.duelTurnFade > .cell{
        background: #e5e7eb !important;
        transition: background 180ms ease;
      }
      #board.board.duelOpponentTurn{
        background: linear-gradient(135deg, #eef2f8, #e5ebf4);
        pointer-events:none;
      }
      #board.board.duelOpponentTurn > .cell{
        opacity:1 !important;
        filter: brightness(.93) saturate(.94);
        transform:none;
        transition: filter 180ms ease;
        pointer-events:none !important;
      }
      @keyframes emokuDuelTurnFade{
        0%{ filter: grayscale(0) brightness(1); }
        45%{ filter: grayscale(.22) brightness(1.04); }
        100%{ filter: grayscale(0) brightness(1); }
      }

      /* Cell (button) reset + Sudoku look */
      #board.board > .cell{
        all: unset;
        box-sizing:border-box;
        width:var(--emokuCell);
        height:var(--emokuCell);
        background:#fff;
        border-radius:0; /* continuous grid */
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
        user-select:none;
        cursor:pointer;
        border-right: var(--emokuThin) solid #000;   /* thin grid lines (black) */
        border-bottom: var(--emokuThin) solid #000;  /* thin grid lines (black) */
        box-shadow: none;
      }
      #board.board > .cell:focus{ outline:none; }

      /* Thick 3x3 separators (black) */
      #board.board > .cell.thickR{ border-right-width: var(--emokuThick) !important; }
      #board.board > .cell.thickB{ border-bottom-width: var(--emokuThick) !important; }
      /* Remove double-border on the outer edges (board already has the outer border) */
      #board.board > .cell.edgeR{ border-right: 0 !important; }
      #board.board > .cell.edgeB{ border-bottom: 0 !important; }

      /* Selected + peer highlight */
      #board.board > .cell.selected{ outline: 3px solid #3b82f6; outline-offset:-3px; }
      #board.board > .cell.peer{ background:#fffbe6; }
      #board.board.presetEditing > .cell.presetMuted{
        opacity:.14;
        background:#f5f7fb;
        cursor:default;
      }
      #board.board.presetEditing > .cell.presetSlot{
        background:#fff;
        cursor:pointer;
        transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      }
      #board.board.presetEditing > .cell.presetSlot:hover{
        transform: translateY(-1px);
        box-shadow: inset 0 0 0 2px rgba(59,130,246,.22);
        background:#f9fbff;
      }
      #board.board.presetEditing > .cell.presetSlotDisabled{
        cursor:not-allowed;
      }
      #board.board.presetEditing > .cell.presetSlotDisabled:hover{
        transform:none;
        box-shadow:none;
        background:#fff;
      }
      #board.board.presetEditing > .cell .presetSlotIndex{
        position:absolute;
        right:5px;
        bottom:3px;
        font-size:10px;
        opacity:.58;
        pointer-events:none;
      }
      #board.board.presetEditing > .cell .presetSlotHint{
        position:absolute;
        left:4px;
        right:4px;
        top:4px;
        font-size:9px;
        line-height:1.2;
        text-align:center;
        color:#1f2937;
        background:rgba(255,255,255,.78);
        border-radius:6px;
        padding:2px 3px;
        pointer-events:none;
      }

      /* Fixed (givens) reveal wave (must NEVER hide givens on re-render) */
      #board.board > .cell.fixed .val{ opacity:.92; }
      #board.board > .cell.fixed.revealedWave .val{ animation: emokuPop 180ms ease-out; }
      #board.board.introFill > .cell{ pointer-events:none; }
      #board.board > .cell.fixed.introDrop .val{
        opacity:0;
        animation: emokuIntroDrop 170ms cubic-bezier(.2,.78,.2,1) var(--introDelayMs,0ms) both;
      }

      @keyframes emokuPop{
        0%{ transform: scale(.90); }
        100%{ transform: scale(1); }
      }
      @keyframes emokuIntroDrop{
        0%{ opacity:0; transform: translateY(calc(var(--emokuCell) * -0.38)) scale(.94); filter:saturate(.72) brightness(.96); }
        72%{ opacity:1; transform: translateY(1px) scale(1.01); filter:saturate(1.08) brightness(1.03); }
        100%{ opacity:.92; transform: translateY(0) scale(1); filter:none; }
      }

      /* Conflicts */
      #board.board > .cell.conflict{ background:#fde8e8; }

      /* Big value (emoji) */
      #board.board .val{
        font-size:28px;
        line-height:1;
        font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","EmojiOne Color","Twemoji Mozilla","Segoe UI Symbol",sans-serif;
      }
      #board.board .val.diceMode{ font-size:0; line-height:0; font-family:inherit; }
      #board.board .note.diceMode{ font-size:0; line-height:0; font-family:inherit; }
      #palette .symBtn .val.diceMode{ font-size:0; line-height:0; font-family:inherit; }
      #board.board .val.keycapMode{ font-size:25px; line-height:1; }
      #board.board .note.keycapMode{ font-size:12px; line-height:1; }
      #palette .symBtn .val.keycapMode{ font-size:23px; line-height:1; }
      #board.board .val.cjkMode{
        font-size:26px;
        line-height:1;
        font-family:"PingFang SC","Hiragino Sans GB","Noto Sans CJK JP","Noto Sans CJK SC","MS Gothic","Segoe UI Symbol",sans-serif;
      }
      #board.board .note.cjkMode{
        font-size:12px;
        line-height:1;
        font-family:"PingFang SC","Hiragino Sans GB","Noto Sans CJK JP","Noto Sans CJK SC","MS Gothic","Segoe UI Symbol",sans-serif;
      }
      #palette .symBtn .val.cjkMode{
        font-size:24px;
        line-height:1;
        font-family:"PingFang SC","Hiragino Sans GB","Noto Sans CJK JP","Noto Sans CJK SC","MS Gothic","Segoe UI Symbol",sans-serif;
      }
      #board.board .val.colorMode{ font-size:0; line-height:0; font-family:inherit; }
      #board.board .note.colorMode{ font-size:0; line-height:0; font-family:inherit; }
      #palette .symBtn .val.colorMode{ font-size:0; line-height:0; font-family:inherit; }
      #board.board .val.imageMode{ font-size:0; line-height:0; font-family:inherit; }
      #board.board .note.imageMode{ font-size:0; line-height:0; font-family:inherit; }
      #palette .symBtn .val.imageMode{ font-size:0; line-height:0; font-family:inherit; }
      .colorTile{
        display:block;
        margin:0 auto;
        box-sizing:border-box;
        border:2px solid rgba(15,23,42,.28);
        border-radius:8px;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      }
      #board.board .val .colorTile{ width:28px; height:28px; }
      #palette .symBtn .val .colorTile{ width:28px; height:28px; }
      #board.board .note .colorTile{
        width:11px;
        height:11px;
        border-width:1px;
        border-radius:3px;
      }
      .imageTile{
        display:block;
        margin:0 auto;
        box-sizing:border-box;
        border:2px solid rgba(15,23,42,.28);
        border-radius:8px;
        background-size:cover;
        background-position:center;
        background-color:#f3f4f6;
      }
      .imageTile.empty{
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        color:#374151;
      }
      .imageTile.mini.empty{ font-size:8px; }
      #board.board .val .imageTile{ width:28px; height:28px; }
      #palette .symBtn .val .imageTile{ width:28px; height:28px; }
      #board.board .note .imageTile{
        width:11px;
        height:11px;
        border-width:1px;
        border-radius:3px;
      }

      .diceSvg{ display:block; margin:0 auto; }
      #board.board .val .diceSvg{ width:34px; height:34px; }
      #board.board .note .diceSvg{ width:15px; height:15px; }
      #palette .symBtn .val .diceSvg{ width:34px; height:34px; }
      .diceFace{ fill: rgba(255,255,255,.72); stroke: rgba(15,23,42,.30); stroke-width: 5; }
      .dicePip{ fill:#111827; }

      /* Notes grid inside empty cell */
      #board.board .notes{
        position:absolute;
        inset:4px;
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 2px;
        align-items:center;
        justify-items:center;
      }
      #board.board .note{
        all: unset;
        width: 100%;
        height: 100%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        line-height:1;
        border-radius:6px;
        font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","EmojiOne Color","Twemoji Mozilla","Segoe UI Symbol",sans-serif;
        cursor:pointer;
        opacity:.85;
      }
      #board.board .note:hover{ background: rgba(59,130,246,.10); }

      /* candidate (solver-allowed) but not user-noted */
      #board.board .note.cand{ opacity:.32; }
      #board.board > .cell.selected .note.cand{ opacity:.58; }

      /* user note (sticky) */
      #board.board .note.on{
        opacity:.96;
        background: rgba(59,130,246,.14);
        outline: 1px solid rgba(59,130,246,.26);
      }

      /* user note that is no longer solver-allowed (still clickable to remove) */
      #board.board .note.stale{
        background: rgba(239,68,68,.12);
        outline: 1px solid rgba(239,68,68,.24);
      }

      /* Palette */
      #palette.palette{
        display:grid;
        grid-template-columns: repeat(9, minmax(0, 1fr));
        gap: var(--emokuGap);
        margin: 14px 0;
        width: calc((var(--emokuCell) * 9) + (var(--emokuThick) * 2));
      }
      #palette .symBtn{
        width:100%;
        min-width:0;
        box-sizing:border-box;
        padding:8px 6px;
        border:1px solid #cdd3de;
        border-radius:16px;
        background:#fff;
        cursor:pointer;
        box-shadow: 0 1px 0 rgba(0,0,0,.03), 0 8px 24px rgba(39,66,123,.06);
      }
      #palette .symBtn.on{ outline:3px solid #3b82f6; outline-offset:2px; }
      #palette .symBtn .val{ font-size:24px; line-height:1; display:block; text-align:center; }
      #palette .symBtn .mini{ font-size:12px; opacity:.8; display:block; margin-top:6px; text-align:center; }

      /* Analysis */
      #analysis.analysis{ display:none; grid-template-columns: 1fr; gap:8px; margin: 12px 0; font-size:14px; }
      #analysis .kv{ display:flex; justify-content:space-between; gap:12px; padding:10px 12px; border:1px solid #e5e9f2; border-radius:14px; background: rgba(255,255,255,.75); }
      #analysis .k{ opacity:.7; }

      /* Toast */
      #toast.toast{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%); padding:10px 14px; border-radius:14px; background: rgba(17,24,39,.92); color:#fff; box-shadow: 0 18px 38px rgba(0,0,0,.22); opacity:0; pointer-events:none; transition: opacity .18s ease; z-index:9999; }
      #toast.toast.on{ opacity:1; }

      #finalScorePanel.finalScorePanel{
        width: calc((var(--emokuCell) * 9) + (var(--emokuThick) * 2));

        margin: 10px 0 8px;
        padding:9px 12px;
        border:1px solid #d6dcea;
        border-radius:14px;
        background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(245,248,255,.93));
        box-shadow: 0 10px 24px rgba(23,44,90,.11);
        cursor:pointer;
      }
      #finalScorePanel.finalScorePanel.on{
        display:flex;
        animation: emokuFinalScoreFadeIn 170ms ease;
      }
      #finalScorePanel.finalScorePanel.on::after{
        content:'tap to close';
        margin-left:10px;
        font-size:10px;
        color:#64748b;
        letter-spacing:.04em;
        text-transform:uppercase;
        white-space:nowrap;
      }
      #finalScorePanel .finalScoreValue{
        font-size: clamp(13px, 2.3vw, 20px);
        font-weight:820;
        line-height:1.24;
        color:#0f172a;
        letter-spacing:.01em;
        text-align:center;
        text-shadow: 0 4px 10px rgba(59,130,246,.12);
      }
      #gameOverPanel.gameOverPanel{
        position:fixed;
        left:0;
        top:0;
        width:0;
        height:0;
        display:none;
        align-items:center;
        justify-content:center;
        padding:0;
        pointer-events:none;
        z-index:10080;
      }
      #gameOverPanel.gameOverPanel.on{
        display:flex;
        pointer-events:auto;
        cursor:pointer;
        animation: emokuFinalScoreFadeIn 200ms ease;
      }
      #gameOverPanel .gameOverCard{
        border-radius:14px;
        border:1px solid rgba(239,68,68,.45);
        background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,239,239,.94));
        color:#991b1b;
        padding:12px 16px;
        font-size:22px;
        font-weight:900;
        letter-spacing:.02em;
        box-shadow: 0 14px 34px rgba(127,29,29,.22);
        text-transform:none;
      }
      @keyframes emokuFinalScoreFadeIn{
        0%{ opacity:0; }
        100%{ opacity:1; }
      }
      @keyframes emokuFinalScorePop{
        0%{ transform: translateY(10px) scale(.92); opacity:.18; }
        100%{ transform: translateY(0) scale(1); opacity:1; }
      }
      @keyframes emokuFinalScoreGlow{
        0%{ transform: translateX(-120%) rotate(9deg); opacity:0; }
        18%{ opacity:1; }
        100%{ transform: translateX(130%) rotate(9deg); opacity:0; }
      }

      /* Small shake for mistakes */
      .cell.shake{ animation: emokuShake 240ms ease-in-out; }
      .cell.boxMark{ background: rgba(59,130,246,.16) !important; box-shadow: inset 0 0 0 2px rgba(59,130,246,.32) !important; }
      .cell.arcadeGone{ background: rgba(148,163,184,.08); }
      .cell.arcadeGone .val{ opacity:0; transform: scale(.46) rotate(-10deg); }
      .cell.arcadeSource{ box-shadow: inset 0 0 0 2px rgba(16,185,129,.45), 0 0 16px rgba(16,185,129,.46) !important; }
      .cell.arcadeMuzzleCell{ animation: emokuArcadeMuzzleCell 180ms ease-out both; }
      .cell.arcadeBlast{ animation: emokuArcadeBlast 220ms cubic-bezier(.2,.8,.2,1) both; }
      .cell.arcadeHit{ animation: emokuArcadeHit 190ms ease-out both; }
      .cell.arcadeBlast.arcadeUp{ transform-origin: 50% 100%; }
      .cell.arcadeBlast.arcadeRight{ transform-origin: 0% 50%; }
      .cell.arcadeBlast.arcadeDown{ transform-origin: 50% 0%; }
      .cell.arcadeBlast.arcadeLeft{ transform-origin: 100% 50%; }
      .cell .arcadeExplosionVal{
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        pointer-events:none;
        z-index:4;
        opacity:.94;
        animation: emokuArcadeExplosionVal 220ms ease-out both;
      }
      .arcadeTracer{
        position:fixed;
        left:0;
        top:0;
        width:14px;
        height:14px;
        pointer-events:none;
        z-index:10040;
        transform: translate(var(--sx,0px), var(--sy,0px));
        animation: emokuArcadeTracer 230ms linear forwards;
      }
      .arcadeTracer::before{
        content:'✦';
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fde047;
        font-size:16px;
        text-shadow: 0 0 10px rgba(253,224,71,.95), 0 0 22px rgba(249,115,22,.78);
      }
      .arcadeTracer::after{
        content:'';
        position:absolute;
        left:50%;
        top:50%;
        width:2px;
        height:22px;
        margin-left:-1px;
        margin-top:-11px;
        background: linear-gradient(180deg, rgba(251,191,36,.92), rgba(249,115,22,.10));
        filter: blur(.2px);
        opacity:.92;
        transform-origin:50% 100%;
      }
      .arcadeTracer.arcadeUp::after{ transform: rotate(0deg); }
      .arcadeTracer.arcadeRight::after{ transform: rotate(90deg); }
      .arcadeTracer.arcadeDown::after{ transform: rotate(180deg); }
      .arcadeTracer.arcadeLeft::after{ transform: rotate(270deg); }
      .arcadeBurst{
        position:fixed;
        left:0;
        top:0;
        width:58px;
        height:58px;
        margin-left:-29px;
        margin-top:-29px;
        pointer-events:none;
        z-index:10050;
        display:flex;
        align-items:center;
        justify-content:center;
        animation: emokuArcadeBurst 360ms cubic-bezier(.14,.72,.2,1) both;
      }
      .arcadeBurst::before{
        content:'✹';
        color:#fef08a;
        font-size:32px;
        text-shadow: 0 0 14px rgba(245,158,11,.95), 0 0 28px rgba(239,68,68,.72);
      }
      .arcadeBurst::after{
        content:'🔥';
        position:absolute;
        transform: translateY(1px) scale(.92);
        font-size:20px;
        opacity:.95;
      }
      .arcadeMuzzle{
        position:fixed;
        left:0;
        top:0;
        width:42px;
        height:42px;
        margin-left:-21px;
        margin-top:-21px;
        border-radius:999px;
        pointer-events:none;
        z-index:10045;
        background:
          radial-gradient(circle at center, rgba(254,243,199,.98) 0%, rgba(251,191,36,.78) 36%, rgba(249,115,22,.20) 68%, rgba(249,115,22,0) 100%);
        animation: emokuArcadeMuzzle 220ms ease-out both;
      }
      .arcadeImpact{
        position:fixed;
        left:0;
        top:0;
        width:52px;
        height:52px;
        margin-left:-26px;
        margin-top:-26px;
        pointer-events:none;
        z-index:10052;
        display:flex;
        align-items:center;
        justify-content:center;
        animation: emokuArcadeImpact 280ms cubic-bezier(.12,.76,.22,1) both;
      }
      .arcadeImpact::before{
        content:'✸';
        font-size:30px;
        color:#fde047;
        text-shadow: 0 0 12px rgba(253,224,71,.94), 0 0 24px rgba(249,115,22,.74);
      }
      .arcadeImpact::after{
        content:'🔥';
        position:absolute;
        transform: translateY(5px) scale(.92);
        font-size:20px;
        opacity:.92;
      }
      @keyframes emokuArcadeBlast{
        0%{ transform: scale(1); filter: saturate(1.2); }
        45%{ transform: scale(1.18); filter: saturate(1.6) brightness(1.1); }
        100%{ transform: scale(.28); opacity:.08; filter: saturate(.4); }
      }
      @keyframes emokuArcadeMuzzleCell{
        0%{ box-shadow: inset 0 0 0 2px rgba(16,185,129,.40), 0 0 0 rgba(16,185,129,0); transform: scale(1); }
        60%{ box-shadow: inset 0 0 0 2px rgba(16,185,129,.72), 0 0 14px rgba(16,185,129,.48); transform: scale(1.06); }
        100%{ box-shadow: inset 0 0 0 2px rgba(16,185,129,.12), 0 0 6px rgba(16,185,129,.20); transform: scale(1); }
      }
      @keyframes emokuArcadeExplosionVal{
        0%{ transform: scale(.66); opacity:.22; }
        35%{ transform: scale(1.06); opacity:.98; }
        100%{ transform: scale(.74); opacity:0; }
      }
      @keyframes emokuArcadeHit{
        0%{ filter: brightness(1.1) saturate(1.3); }
        50%{ filter: brightness(1.55) saturate(1.7); }
        100%{ filter: brightness(1) saturate(1); }
      }
      @keyframes emokuArcadeTracer{
        0%{ transform: translate(var(--sx), var(--sy)) scale(.58); opacity:1; }
        80%{ transform: translate(var(--tx), var(--ty)) scale(1.22); opacity:1; }
        100%{ transform: translate(var(--tx), var(--ty)) scale(.24); opacity:0; }
      }
      @keyframes emokuArcadeBurst{
        0%{ transform: scale(.28) rotate(-16deg); opacity:.10; }
        35%{ transform: scale(1.14) rotate(8deg); opacity:1; }
        100%{ transform: scale(.34) rotate(0deg); opacity:0; }
      }
      @keyframes emokuArcadeMuzzle{
        0%{ transform: scale(.28); opacity:.08; }
        40%{ transform: scale(1.22); opacity:1; }
        100%{ transform: scale(.52); opacity:0; }
      }
      @keyframes emokuArcadeImpact{
        0%{ transform: scale(.28) rotate(-18deg); opacity:.10; }
        45%{ transform: scale(1.24) rotate(6deg); opacity:1; }
        100%{ transform: scale(.46) rotate(0deg); opacity:0; }

  function fileToDataUrl(file){

      const fr = new FileReader();

      fr.readAsDataURL(file);

  function compactImageDataUrl(srcDataUrl, maxSide=180){
    return new Promise((resolve)=>{
      const img = new Image();
      img.onload = ()=>{
        try{
          const w = img.naturalWidth || img.width || maxSide;
          const h = img.naturalHeight || img.height || maxSide;
          const scale = Math.min(1, maxSide / Math.max(w, h));
          const nw = Math.max(1, Math.round(w * scale));
          const nh = Math.max(1, Math.round(h * scale));
          const cv = document.createElement('canvas');
          cv.width = nw;
          cv.height = nh;
          const ctx = cv.getContext('2d');
          if(!ctx){ resolve(srcDataUrl); return; }
          ctx.drawImage(img, 0, 0, nw, nh);

          let out = '';
          try{ out = cv.toDataURL('image/webp', 0.84); }catch(_e){}
          if(!out || out.length>=srcDataUrl.length){
            try{ out = cv.toDataURL('image/jpeg', 0.88); }catch(_e){}
          }
          if(!out || out.length>=srcDataUrl.length){
            try{ out = cv.toDataURL('image/png'); }catch(_e){}
          }
          resolve(out || srcDataUrl);
        }catch(_e){
          resolve(srcDataUrl);
        }
      };
      img.onerror = ()=> resolve(srcDataUrl);
      img.src = srcDataUrl;
    });
  }

  function clampNumber(value, min, max){
    const n = Number(value);
    if(!Number.isFinite(n)) return Number(min)||0;
    return Math.max(Number(min)||0, Math.min(Number(max)||0, n));
  }

  function roundScoreToStep(value, step=5){
    const n = Number(value);
    const s = Math.max(1, Math.round(Number(step)||5));
    if(!Number.isFinite(n)) return 0;
    return Math.round(n / s) * s;
  }

  function snapScoreDelta(delta){
    const n = Number(delta);
    if(!Number.isFinite(n) || n===0) return 0;
    const snapped = roundScoreToStep(n, 5);
    if(snapped !== 0) return snapped;
    return n>0 ? 5 : -5;
  }

  function elapsedGameSecNow(nowMs=Date.now()){

    if(twoPlayerMode) return Math.max(0, Number(duelStats.totalUsedSec)||0);
    if(gameClockStartAtMs>0) return Math.max(0, (now - gameClockStartAtMs) / 1000);
    return Math.max(0, Number(timerSec)||0);
  }

  function markHumanMoveReady(nowMs=Date.now()){
    const now = Number.isFinite(nowMs) ? nowMs : Date.now();
    humanMoveReadyAtMs = Math.max(0, now);
  }

  function computeHumanMoveScoreProfile(nowMs=Date.now()){
    const now = Number.isFinite(nowMs) ? nowMs : Date.now();
    const moveAnchor = humanMoveReadyAtMs>0 ? humanMoveReadyAtMs : now;
    const thinkSec = Math.max(0, (now - moveAnchor) / 1000);
    const elapsedSec = elapsedGameSecNow(now);

    // Earlier in the run = more points.
    const earlyFactor = clampNumber(1.28 - (elapsedSec * 0.00045), 0.72, 1.28);
    // Faster decision before placing = more points.
    const thinkFactor = clampNumber(1.18 - (thinkSec * 0.08), 0.62, 1.18);

    const factor = clampNumber(earlyFactor * thinkFactor, 0.55, 1.50);
    return { elapsedSec, thinkSec, earlyFactor, thinkFactor, factor };
  }

  function computeFinalScoreResult(){
    const baseScore = Math.max(0, roundScoreToStep(Number(score)||0, 5));
    const rawTime = twoPlayerMode
      ? Math.round(Number(duelStats.totalUsedSec)||0)
      : Math.round(Number(timerSec)||0);
    const timeForFormula = Math.max(0, rawTime);
    const errorsForFormula = 0;
    // End-time and mistakes are no longer part of final-score math; move-time dynamics are applied during gameplay.
    const finalScore = baseScore;
    return { baseScore, timeForFormula, errorsForFormula, finalScore };
  }

  const GAME_OVER_CHORD_STEPS = Object.freeze([
    // Phrase 1
    ['1','7'], ['1','7'], ['1','7'], ['1','7'],
    // Phrase 2
    ['8','4'], ['8','4'], ['8','4'], ['8','4'],
    // Phrase 3
    ['5','1'], ['5','1'], ['5','1'], ['5','1'],
    // Phrase 4 (upward ending)
    ['1','7'], ['2','8'], ['3','9'], ['7','3'],
  ]);
  const GAME_OVER_STEP_MS = 400;
  const GAME_OVER_HOLD_SEC = 0.24;
  const GAME_OVER_TAIL_MS = 220;
  const GAME_OVER_REPEAT_COUNT = 4;

  function scheduleSadBeautifulGameOverCycle(startOffsetMs=0){
    for(let i=0; i<GAME_OVER_CHORD_STEPS.length; i++){
      const step = GAME_OVER_CHORD_STEPS[i] || [];
      const t = startOffsetMs + (i * GAME_OVER_STEP_MS);
      // No simultaneous tones: alternate the open-dyad voices beat by beat.
      const noteKey = ((i % 2)===0 ? step[0] : step[1]) || step[0] || step[1];
      const hz = TONE_HZ[noteKey];
      if(hz) playToneHz(hz, t, 0.106, GAME_OVER_HOLD_SEC);
    }
    return ((GAME_OVER_CHORD_STEPS.length - 1) * GAME_OVER_STEP_MS) + GAME_OVER_TAIL_MS;
  }

  function playGameOverSadCue(startDelayMs=0){

    if(!soundOn) return 0;
    const startDelay = Math.max(0, Number(startDelayMs)||0);
    const cycleDurationMs = ((GAME_OVER_CHORD_STEPS.length - 1) * GAME_OVER_STEP_MS) + GAME_OVER_TAIL_MS;
    const myLoopToken = ++gameOverSadLoopToken;

    for(let loopIdx=0; loopIdx<GAME_OVER_REPEAT_COUNT; loopIdx++){
      const isFirst = loopIdx===0;
      const isLast = loopIdx===GAME_OVER_REPEAT_COUNT-1;
      queueMelodySegment(cycleDurationMs, ()=>{
        if(myLoopToken !== gameOverSadLoopToken) return;
        if(!gameOverLocked || gameOverLabel!=='game over' || !soundOn) return;
        scheduleSadBeautifulGameOverCycle(0);
      }, {
        startDelayMs: isFirst ? startDelay : 0,
        gapMs: isLast ? 0 : MELODY_CHAIN_GAP_MS,
      });
    }

    return startDelay + (GAME_OVER_REPEAT_COUNT * cycleDurationMs) + ((GAME_OVER_REPEAT_COUNT - 1) * MELODY_CHAIN_GAP_MS);
  }

    const liveRound = twoPlayerMode && duelOpponentMode==='live';
    const label = (twoPlayerMode && a==='bot') ? 'you won!' : 'game over';

    if(liveRound && a==='human'){
      sendLiveMessage('round', { kind:'game_over' });

    gameOverLabel = label;
    hideFinalScorePanel();

    showGameOverPanel(label);
    showFinalScorePanel({title: resultTitle});
    toast(label);

    const melodyLeadMs = soundOn ? Math.max(0, melodyWindowRemainingMs()) : 0;
    if(!liveRound){
      if(label==='game over'){
        if(soundOn){
          const cueMs = playGameOverSadCue(melodyLeadMs + 36);
          scheduleGameOverAutoNew(cueMs + 120);
        } else {
          scheduleGameOverAutoNew(920);

    updateButtons();

  function playScoreHalveCue(startDelayMs=0){
    if(!soundOn) return;
    const startDelay = Math.max(0, Number(startDelayMs)||0);
    const cueDurMs = 420;
    const delayMs = queueMelodySegment(cueDurMs, ()=>{
      const base = TONE_HZ['1'] || 293.665;
      const melody = getMelodyPatternId();

      if(melody==='patternB'){
        playToneHz(base * 0.98, 0, 0.19, 0.11);
        playToneHz(hzFromSemis(base, -4), 115, 0.20, 0.12);
        playToneHz(hzFromSemis(base, -10), 230, 0.21, 0.13);
        return;
      }

      if(melody==='patternC'){
        playToneHz(base * 0.92, 0, 0.19, 0.10);
        playToneHz(base * 0.78, 95, 0.20, 0.11);
        playToneHz(base * 0.64, 190, 0.21, 0.12);
        return;
      }

      playToneHz(base, 0, 0.19, 0.11);
      playToneHz(hzFromSemis(base, -5), 120, 0.20, 0.12);
      playToneHz(hzFromSemis(base, -12), 245, 0.21, 0.13);
    }, { startDelayMs:startDelay, gapMs:MELODY_CHAIN_GAP_MS });
    noteScoreCueWindow(delayMs + cueDurMs + SCORE_TO_COMPLETION_GAP_MS);
  }

  function applyMistakeScoreHalving(index, actor='human', {withSound=true}={}){

    animateScoreHalved();

    return { current, halved, delta };

    if(grid[index]!==BLANK){ toast('Belegt'); return; }
    const d = String(digit);
