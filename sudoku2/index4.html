
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoku Game</title>
</head>
<body>
  <div id="emokuApp" class="wrap"></div>

  <!-- Loads the full game -->
  <script>
(function(){
  'use strict';

  // ======================= Locked Emoku settings =======================
  const LOCKED = Object.freeze({
    difficulty: 22,          // fixed (between insane=26 and inhuman=17 clues)
    symmetry: 'none',        // fixed
    mode: 'symbols',         // fixed
    unique: true,
  });

  // ======================= Tone mapping (Tonstufen auf C) =======================
  // 0=C, 1=D, 2=Es, 3=E, 4=F, 5=G, 6=As, 7=A, 8=B, 9=H
  const TONE_NAME = Object.freeze({
    '0':'C',
    '1':'D',  '2':'Es', '3':'E',
    '4':'F',  '5':'G',  '6':'As',
    '7':'A',  '8':'B',  '9':'H'
  });

  // Reference: equal temperament A4=440Hz
  const TONE_HZ = Object.freeze({
    '0':261.626, // C4 (empty cell)
    '1':293.665, // D4
    '2':311.127, // Eb4 (Es)
    '3':329.628, // E4
    '4':349.228, // F4
    '5':391.995, // G4
    '6':415.305, // Ab4 (As)
    '7':440.000, // A4
    '8':466.164, // Bb4 (B)
    '9':493.883, // B4 (H)
  });

  let audioCtx = null;
  let soundOn = false;
  let audioUnlocked = false;
  let lastHover = { t: 0, k: null }; // k = key (digit / cell / value)
  let seqToken = 0; // cancels pending candidate sequences
let boxSeqToken = 0; // cancels pending 3x3 box scan sequences
let pathSeqToken = 0; // cancels generic path (row/col/spiral) sequences
  let hoverIntentTimer = null;
  let hoverIntentKey = null;

  // A small, robust WebAudio chain (Safari-friendly)
  let masterGain = null;
  let comp = null;
  let lpMaster = null;

  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // build master chain once
    if(!masterGain){
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.48;

      comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -22;
      comp.knee.value = 18;
      comp.ratio.value = 6;
      comp.attack.value = 0.003;
      comp.release.value = 0.18;

      lpMaster = audioCtx.createBiquadFilter();
      lpMaster.type = 'lowpass';
      lpMaster.frequency.value = 2600;
      lpMaster.Q.value = 0.5;

      masterGain.connect(comp);
      comp.connect(lpMaster);
      lpMaster.connect(audioCtx.destination);
    }

    // try to resume (must be called from a gesture at least once)
    if(audioCtx.state !== 'running'){
      try{ audioCtx.resume(); }catch(_e){}
    }
    return audioCtx;
  }

  function unlockAudioFromGesture(){
    if(!soundOn) return;
    const ctx = ensureAudio();
    if(ctx.state === 'running') audioUnlocked = true;
  }

  function hzFromSemis(baseHz, semis){
    return baseHz * Math.pow(2, semis/12);
  }

  function playToneHz(hz, delayMs=0, amp=0.35, dur=0.18){
    if(!soundOn) return;
    if(!Number.isFinite(hz) || hz<=0) return;

    const ctx = ensureAudio();
    if(ctx.state !== 'running') return; // still locked

    const now = ctx.currentTime + Math.max(0, delayMs)/1000;

    // richer, less "blob": two oscillators + envelope
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const lp = ctx.createBiquadFilter();

    osc1.type = 'triangle';
    osc2.type = 'sine';

    osc1.frequency.setValueAtTime(hz, now);
    osc2.frequency.setValueAtTime(hz * 2, now); // octave sparkle

    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(2200, now);
    lp.Q.setValueAtTime(0.9, now);

    // envelope (softer, slower)
    const peak = Math.max(0.03, Math.min(0.40, amp));
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peak, now + 0.018);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.03, peak*0.45), now + 0.110);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(lp);
    lp.connect(masterGain);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + dur + 0.02);
    osc2.stop(now + dur + 0.02);
  }

  function playToneDigit(d, offsetSec=0, amp=0.35){
    if(!soundOn) return;
    if(!/^[0-9]$/.test(String(d))) return;
    const hz = TONE_HZ[String(d)];
    if(!hz) return;
    playToneHz(hz, Math.max(0, offsetSec)*1000, amp, 0.22);
  }

  function playErrorHit(delayMs=0){
    if(!soundOn) return;
    const ctx = ensureAudio();
    if(ctx.state !== 'running') return;

    const now = ctx.currentTime + Math.max(0, delayMs)/1000;
    const dur = 0.22;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const bp = ctx.createBiquadFilter();

    osc.type = 'square';
    osc.frequency.setValueAtTime(92, now);
    osc.frequency.exponentialRampToValueAtTime(58, now + dur);

    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(220, now);
    bp.Q.setValueAtTime(7, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.40, now + 0.010);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    osc.connect(bp);
    bp.connect(gain);
    gain.connect(masterGain);

    osc.start(now);
    osc.stop(now + dur + 0.03);
  }

  function playWrongCue(){
    // 0 (C) then a quarter-tone down
    if(!soundOn) return;
    const base = TONE_HZ['0'];
    if(!base) return;
    playToneHz(base, 0, 0.22, 0.16);
    playToneHz(hzFromSemis(base, -0.5), 140, 0.20, 0.18);
  }

  function playCorrectReward(d){
    // simple tusch: root -> octave
    if(!soundOn) return;
    const base = TONE_HZ[String(d)];
    if(!base) return;
    playToneHz(base,     0, 0.22, 0.18);
    playToneHz(base*2, 190, 0.28, 0.24);
  }

  function playDigitCompleteReward(d){
    // when all 9 of a digit are correct: root -> octave, then octave triplet
    if(!soundOn) return;
    const base = TONE_HZ[String(d)];
    if(!base) return;
    const oct = base * 2;

    playToneHz(base, 0, 0.22, 0.18);
    playToneHz(oct, 190, 0.28, 0.22);

    // triplet tail on octave (last three tones)
    const t0 = 430;
    const step = 82;
    playToneHz(oct, t0, 0.22, 0.12);
    playToneHz(oct, t0 + step, 0.25, 0.12);
    playToneHz(oct, t0 + step*2, 0.30, 0.14);
  }

  function playValueMotif(d){
    // calmer hover for placed icons
    if(!/^[1-9]$/.test(String(d))) return;
    const base = TONE_HZ[String(d)];
    if(!base) return;

    const fifth = hzFromSemis(base, 7);

    // slow, soft: root -> fifth -> octave
    playToneHz(base, 0,   0.22, 0.22);
    playToneHz(fifth, 160, 0.20, 0.20);
    playToneHz(base*2, 320, 0.18, 0.18);
  }

  function playCandidateSequence(digits){
    if(!soundOn) return;
    const ds = (digits||'').split('').filter(ch=>/^[1-9]$/.test(ch));
    ds.sort((a,b)=>Number(a)-Number(b));
    if(!ds.length) return;

    // cancel previous sequences
    const my = ++seqToken;

    // calm phrase: ascend once, then resolve to first
    const phrase = ds.slice();
    phrase.push(ds[0]);

    const stepMs = 180;
    for(let i=0;i<phrase.length;i++){
      setTimeout(()=>{
        if(my !== seqToken) return;
        const amp = (i===0 || i===phrase.length-1) ? 0.30 : 0.24;
        playToneDigit(phrase[i], 0, amp);
      }, i*stepMs);
    }
  }

  // ======================= Sudoku core =======================
  const DIGITS = "123456789";
  const ROWS = "ABCDEFGHI";
  const COLS = DIGITS;

  function cross(a,b){
    const out=[];
    for(let i=0;i<a.length;i++) for(let j=0;j<b.length;j++) out.push(a[i]+b[j]);
    return out;
  }

  const SQUARES = cross(ROWS, COLS);
  const SQUARE_INDEX = Object.fromEntries(SQUARES.map((s,i)=>[s,i]));
  const BLANK = ".";

  // Symbols
  const SYMBOL_SET = ["🍓","🍌","🍋","🍪","🧁","🍉","🍇","🍎","🍔"];
  const EMOJI_NUMBER_SET = ["1️⃣","2️⃣","3️⃣","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣"];
  const CJK_CIRCLE_SET = ["㊀","㊁","㊂","㊃","㊄","㊅","㊆","㊇","㊈"];
  const SYMBOL_MODE = Object.freeze({ EMOJI:'emoji', DICE:'dice', EMOJI_NUM:'emoji_num', CJK_CIRCLE:'cjk_circle' });
  let symbolMode = SYMBOL_MODE.EMOJI;
  const EMOJI_PRESETS = Object.freeze({
    classic: Object.freeze({ label:'Classic 🍓🍌🍋', symbols: Object.freeze(SYMBOL_SET.slice()) }),
    setA: Object.freeze({ label:'Set A 🍆🍑💦', symbols: Object.freeze(["🍆","🍑","💦","👅","🐬","👺","👄","🍒","🍌"]) }),
    setB: Object.freeze({ label:'Set B 🐰💄🐼', symbols: Object.freeze(["🐰","💄","🐼","🌸","🎀","🐶","💘","🔥","💀"]) }),
  });
  const EMOJI_PRESET_ORDER = Object.freeze(['classic','setA','setB']);
  const PRESET_DICE_ID = '__dice__';
  const PRESET_DICE_LABEL = 'Würfelaugen 1-9';
  let customEmojiPreset = null;
  let activeEmojiPreset = 'classic';

  const DICE_FACES = Object.freeze({
    '1': [[1,1]],
    '2': [[0,0],[2,2]],
    '3': [[0,0],[1,1],[2,2]],
    '4': [[0,0],[2,0],[0,2],[2,2]],
    '5': [[0,0],[2,0],[1,1],[0,2],[2,2]],
    '6': [[0,0],[2,0],[0,1],[2,1],[0,2],[2,2]],
    '7': [[0,0],[1,0],[2,0],[1,1],[0,2],[1,2],[2,2]],
    '8': [[0,0],[1,0],[2,0],[0,1],[2,1],[0,2],[1,2],[2,2]],
    '9': [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2]],
  });
  // Slightly inward vs. strict corners to make pips feel more centered.
  const DICE_AXIS = [35, 50, 65];
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const GRAPHEME_SEGMENTER = (typeof Intl!=='undefined' && Intl.Segmenter)
    ? new Intl.Segmenter(undefined, {granularity:'grapheme'})
    : null;

  function splitGraphemes(text){
    const t = String(text||'');
    if(!t) return [];
    if(GRAPHEME_SEGMENTER){
      return Array.from(GRAPHEME_SEGMENTER.segment(t), s=>s.segment);
    }
    return Array.from(t);
  }

  function parseEmojiPresetInput(raw){
    const cleaned = String(raw||'').replace(/[\s,;|]+/g,'');
    if(!cleaned) return null;
    const chars = splitGraphemes(cleaned).filter(ch=>ch && !/^\s$/u.test(ch));
    if(chars.length !== 9) return null;
    return chars;
  }

  function presetSymbols(id=activeEmojiPreset){
    if(id==='custom') return customEmojiPreset || EMOJI_PRESETS.classic.symbols;
    return (EMOJI_PRESETS[id] && EMOJI_PRESETS[id].symbols) ? EMOJI_PRESETS[id].symbols : EMOJI_PRESETS.classic.symbols;
  }

  function presetLabel(id=activeEmojiPreset){
    if(id==='custom'){
      return customEmojiPreset ? `Custom ${customEmojiPreset.slice(0,3).join('')}` : 'Custom';
    }
    return (EMOJI_PRESETS[id] && EMOJI_PRESETS[id].label) ? EMOJI_PRESETS[id].label : EMOJI_PRESETS.classic.label;
  }

  function sym(d){
    const i = String(d).charCodeAt(0)-49;
    const set = presetSymbols();
    return set[i] || String(d);
  }

  function symEmojiNumber(d){
    const i = String(d).charCodeAt(0)-49;
    return EMOJI_NUMBER_SET[i] || String(d);
  }

  function symCjkCircle(d){
    const i = String(d).charCodeAt(0)-49;
    return CJK_CIRCLE_SET[i] || String(d);
  }

  function symbolModeLabel(mode=symbolMode){
    if(mode===SYMBOL_MODE.DICE) return 'Würfelaugen';
    if(mode===SYMBOL_MODE.EMOJI_NUM) return 'Emoji Zahlen';
    if(mode===SYMBOL_MODE.CJK_CIRCLE) return 'CJK-Kreise';
    return 'Emoji';
  }

  function nextSymbolMode(mode){
    if(mode===SYMBOL_MODE.EMOJI) return SYMBOL_MODE.DICE;
    if(mode===SYMBOL_MODE.DICE) return SYMBOL_MODE.EMOJI_NUM;
    if(mode===SYMBOL_MODE.EMOJI_NUM) return SYMBOL_MODE.CJK_CIRCLE;
    return SYMBOL_MODE.EMOJI;
  }

  function symLabel(d){
    const ds = String(d);
    if(symbolMode===SYMBOL_MODE.DICE && /^[1-9]$/.test(ds)) return `W${ds}`;
    if(symbolMode===SYMBOL_MODE.EMOJI_NUM && /^[1-9]$/.test(ds)) return symEmojiNumber(ds);
    if(symbolMode===SYMBOL_MODE.CJK_CIRCLE && /^[1-9]$/.test(ds)) return symCjkCircle(ds);
    return sym(ds);
  }

  function makeDiceIcon(d, {mini=false, showFace=true}={}){
    const ds = String(d);
    const coords = DICE_FACES[ds];

    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('aria-hidden', 'true');
    svg.classList.add('diceSvg');
    if(mini) svg.classList.add('mini');

    if(showFace){
      const rect = document.createElementNS(SVG_NS, 'rect');
      rect.setAttribute('x', '9');
      rect.setAttribute('y', '9');
      rect.setAttribute('width', '82');
      rect.setAttribute('height', '82');
      rect.setAttribute('rx', '16');
      rect.setAttribute('ry', '16');
      rect.setAttribute('class', 'diceFace');
      svg.appendChild(rect);
    }

    if(Array.isArray(coords)){
      const pipR = mini ? 9.5 : 8.8;
      for(const [gx, gy] of coords){
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('cx', String(DICE_AXIS[gx]));
        c.setAttribute('cy', String(DICE_AXIS[gy]));
        c.setAttribute('r', String(pipR));
        c.setAttribute('class', 'dicePip');
        svg.appendChild(c);
      }
    }

    return svg;
  }

  function setSymbolNode(node, d, {mini=false, showFace=true}={}){
    if(!node) return;
    const ds = String(d);
    node.textContent = '';
    node.classList.remove('diceMode');
    node.classList.remove('emojiMode');
    node.classList.remove('keycapMode');
    node.classList.remove('cjkMode');

    if(symbolMode===SYMBOL_MODE.DICE && /^[1-9]$/.test(ds)){
      node.classList.add('diceMode');
      node.appendChild(makeDiceIcon(ds, {mini, showFace}));
    } else if(symbolMode===SYMBOL_MODE.EMOJI_NUM && /^[1-9]$/.test(ds)){
      node.classList.add('keycapMode');
      node.textContent = symEmojiNumber(ds);
    } else if(symbolMode===SYMBOL_MODE.CJK_CIRCLE && /^[1-9]$/.test(ds)){
      node.classList.add('cjkMode');
      node.textContent = symCjkCircle(ds);
    } else {
      node.classList.add('emojiMode');
      node.textContent = sym(ds);
    }
  }

  function shuffle(arr, rnd=Math.random){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(rnd()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function clone(o){
    const r={};
    for(const k in o) r[k]=o[k];
    return r;
  }

  function validateBoard(b){
    if(typeof b!=='string'||b.length!==81) return false;
    for(let i=0;i<81;i++){
      const ch=b[i];
      if(ch!==BLANK && !DIGITS.includes(ch)) return false;
    }
    return true;
  }

  function idxToRC(i){ return [Math.floor(i/9), i%9]; }
  function rcToIdx(r,c){ return r*9+c; }

  const MAPS=(()=>{
    const units=[];
    for(let r=0;r<9;r++) units.push(cross(ROWS[r],COLS));
    for(let c=0;c<9;c++) units.push(cross(ROWS,COLS[c]));
    const rs=["ABC","DEF","GHI"], cs=["123","456","789"];
    for(const R of rs) for(const C of cs) units.push(cross(R,C));

    const squareUnits={}, squarePeers={};
    for(const s of SQUARES){
      squareUnits[s]=units.filter(u=>u.includes(s));
      const peers=[];
      for(const u of squareUnits[s]){
        for(const t of u){
          if(t!==s && !peers.includes(t)) peers.push(t);
        }
      }
      squarePeers[s]=peers;
    }
    return {units,squareUnits,squarePeers};
  })();

  function blankCandidates(){
    const m={};
    for(const s of SQUARES) m[s]=DIGITS;
    return m;
  }

  function boardToMap(b){
    const m={};
    for(let i=0;i<81;i++) m[SQUARES[i]]=b[i];
    return m;
  }

  function assign(c,s,v){
    const others=c[s].replace(v,"");
    for(let k=0;k<others.length;k++){
      if(!eliminate(c,s,others[k])) return null;
    }
    return c;
  }

  function eliminate(c,s,v){
    if(!c[s].includes(v)) return c;
    c[s]=c[s].replace(v,"");

    const n=c[s].length;
    if(n===0) return null;

    if(n===1){
      const v2=c[s];
      for(const p of MAPS.squarePeers[s]){
        if(!eliminate(c,p,v2)) return null;
      }
    }

    for(const unit of MAPS.squareUnits[s]){
      const places=[];
      for(const t of unit) if(c[t].includes(v)) places.push(t);
      if(places.length===0) return null;
      if(places.length===1){
        if(!assign(c,places[0],v)) return null;
      }
    }

    return c;
  }

  function candidatesFromBoard(b){
    if(!validateBoard(b)) throw Error("Invalid board");
    const c=blankCandidates();
    const m=boardToMap(b);
    for(const s of SQUARES){
      const v=m[s];
      if(v!==BLANK){
        if(!assign(c,s,v)) return null;
      }
    }
    return c;
  }

  function search(c,rnd=Math.random){
    if(!c) return null;
    let solved=true, target=null, min=10;
    for(const s of SQUARES){
      const len=c[s].length;
      if(len!==1) solved=false;
      if(len===0) return null;
      if(len>1 && len<min){ min=len; target=s; }
    }
    if(solved) return c;

    const opts=shuffle(c[target].split(""), rnd);
    for(const v of opts){
      const cp=clone(c);
      const next=assign(cp,target,v);
      const res=search(next,rnd);
      if(res) return res;
    }
    return null;
  }

  function solveBoard(b){
    const c=candidatesFromBoard(b);
    const r=search(c);
    if(!r) return null;
    let out="";
    for(const s of SQUARES) out+=r[s];
    return out;
  }

  function countSolutions(b,cap=2){
    const start=candidatesFromBoard(b);
    if(!start) return 0;
    let cnt=0;
    (function dfs(c){
      if(!c || cnt>=cap) return;
      let solved=true, target=null, min=10;
      for(const s of SQUARES){
        const len=c[s].length;
        if(len!==1) solved=false;
        if(len===0) return;
        if(len>1 && len<min){ min=len; target=s; }
      }
      if(solved){ cnt++; return; }
      const opts=c[target];
      for(let i=0;i<opts.length;i++){
        const v=opts[i];
        const cp=clone(c);
        const next=assign(cp,target,v);
        dfs(next);
        if(cnt>=cap) return;
      }
    })(start);
    return cnt;
  }

  const DIFFICULTY = { easy:62, medium:53, hard:44, "very-hard":35, insane:26, inhuman:17 };

  function randomFullSolution(){
    const empty=".".repeat(81);
    let c=candidatesFromBoard(empty);
    for(const s of shuffle(SQUARES).slice(0,9)){
      const opts=c[s];
      const v=opts[Math.floor(Math.random()*opts.length)];
      if(!assign(c,s,v)) break;
    }
    const r=search(c);
    if(!r) return randomFullSolution();
    let out="";
    for(const s of SQUARES) out+=r[s];
    return out;
  }

  function partnerIndex(i, sym){
    const r=Math.floor(i/9), c=i%9;
    switch(sym){
      case 'rotate': return rcToIdx(8-r,8-c);
      case 'mirror': return rcToIdx(r,8-c);
      case 'flip-h': return rcToIdx(8-r,c);
      case 'flip-v': return rcToIdx(r,8-c);
      case 'none': return i;
      default: return i;
    }
  }

  function generatePuzzle({difficulty='medium', symmetry='rotate'}={}){
    let clues=typeof difficulty==='string' ? (DIFFICULTY[difficulty]||DIFFICULTY.medium) : difficulty;
    clues=Math.max(17,Math.min(81,clues));

    const full=randomFullSolution();
    let puz=full.split("");
    const order=shuffle([...Array(81).keys()]);
    let toRemove=81-clues;

    for(const i of order){
      if(toRemove<=0) break;
      if(puz[i]===BLANK) continue;

      const j=partnerIndex(i,symmetry);
      const idxs=(j!==i) ? [i,j] : [i];
      const bi=puz[i], bj=puz[j];
      idxs.forEach(k=>puz[k]=BLANK);

      const cand=puz.join("");
      if(countSolutions(cand,2)===1){
        toRemove-=idxs.length;
        if(toRemove<0) toRemove=0;
      } else {
        puz[i]=bi; puz[j]=bj;
      }
    }

    if(puz.filter(ch=>ch!==BLANK).length>clues){
      for(let i=0;i<81;i++){
        if(puz.filter(ch=>ch!==BLANK).length<=clues) break;

    if(!Array.isArray(indices) || indices.length===0) return;

    // cancel previous path sequences unless a shared token is provided (for chained sequences)
    const my = Number.isFinite(token) ? token : ++pathSeqToken;

    // clear any existing marks
    if(clearStart){
      const prevMarks = elBoard.querySelectorAll('.cell.boxMark');
      prevMarks.forEach(n=>n.classList.remove('boxMark'));
    }

    for(let k=0; k<indices.length; k++){
      const idx = indices[k];
      const v = grid[idx];
      const delay = startDelayMs + k*stepMs;

      setTimeout(()=>{
        if(my !== pathSeqToken) return;

        // clear previous mark in this sequence
        const marks = elBoard.querySelectorAll('.cell.boxMark');
        marks.forEach(n=>n.classList.remove('boxMark'));

        const node = elBoard.querySelector(`.cell[data-i="${idx}"]`);
        if(node) node.classList.add('boxMark');

        if(v !== BLANK){
          playToneDigit(String(v), 0, amp);

        // remove mark at end
        if(k === indices.length-1){
          setTimeout(()=>{
            if(my !== pathSeqToken) return;
            const n2 = elBoard.querySelector(`.cell[data-i="${idx}"]`);
            if(n2) n2.classList.remove('boxMark');

      }, delay);
    }

        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    for(let c=0;c<9;c++){
      const seen = new Map();
      for(let r=0;r<9;r++){
        const i=r*9+c;
        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    for(let br=0;br<3;br++) for(let bc=0;bc<3;bc++){
      const seen = new Map();
      for(let rr=0;rr<3;rr++) for(let cc=0;cc<3;cc++){
        const r=br*3+rr;
        const c=bc*3+cc;
        const i=r*9+c;
        const v=grid[i];
        if(v===BLANK) continue;
        if(seen.has(v)){ conf[i]=true; conf[seen.get(v)]=true; }
        else seen.set(v,i);
      }
    }
    return conf;
  }

  function applyLogicWaveOnce(){
    const before = boardString();
    let cand = null;
    try{ cand = candidatesFromBoard(before); }catch(_e){ cand=null; }
    if(!cand) return 0;

    const acts=[];
    for(const s of SQUARES){
      const i=SQUARE_INDEX[s];
      if(grid[i]!==BLANK) continue;
      const cs=cand[s];
      if(cs.length===1) acts.push({i, v:cs});
    }
    for(const unit of MAPS.units){
      const empties = unit.filter(t=>grid[SQUARE_INDEX[t]]===BLANK);
      if(!empties.length) continue;
      for(const d of DIGITS){
        const places = empties.filter(t=>cand[t].includes(d));
        if(places.length===1) acts.push({i:SQUARE_INDEX[places[0]], v:d});
      }
    }

    const seen = new Set();
    let n=0;
    for(const a of acts){
      if(seen.has(a.i) || grid[a.i]!==BLANK) continue;
      grid[a.i]=a.v;
      wavePlaced.add(a.i);
      seen.add(a.i);
      n++;
    }
    return n;
  }

  function render(){
    const b = boardString();
    let cand = null;
    try{ cand = candidatesFromBoard(b); }catch(_e){ cand=null; }

    const conflicts = computeConflicts();

    elBoard.innerHTML='';
    const frag = document.createDocumentFragment();

    const peerSet = selected>=0 ? unitOfIndex(selected) : null;

    let selectedCandDigits = null;
    if(selected>=0 && grid[selected]===BLANK && cand){
      selectedCandDigits = cand[SQUARES[selected]] || '';
    }

    for(let i=0;i<81;i++){
      const cell = document.createElement('button');

      const rr=Math.floor(i/9);
      const cc=i%9;
      if(cc===2 || cc===5) cell.classList.add('thickR');
      if(rr===2 || rr===5) cell.classList.add('thickB');

      if(i===selected) cell.classList.add('selected');
      if(peerSet && peerSet.has(i) && i!==selected) cell.classList.add('peer');

      if(fixed[i]) cell.classList.add('fixed');

        span.className='val';
        setSymbolNode(span, v, {mini:false, showFace:true});
        cell.appendChild(span);
      } else {
        const hasNotes = notes[i] && notes[i].size>0;
        const isSel = (i===selected);
        const cs = (cand && isSel) ? (cand[SQUARES[i]] || '') : '';

        const showEditor = showCandidates && isSel && !!cand;
        const showNotesOnly = showCandidates && !isSel && hasNotes;

        if(showEditor || showNotesOnly){
          const box = document.createElement('div');
          box.className='notes';

          for(let d=1; d<=9; d++){
            const ds = String(d);
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'note';
            btn.dataset.d = ds;
            setSymbolNode(btn, ds, {mini:true, showFace:false});

            const noted = notes[i].has(ds);
            const allowed = showEditor ? cs.includes(ds) : noted;

            if(!(allowed || noted)){
              btn.disabled = true;
              btn.style.opacity = '0';
              btn.style.pointerEvents = 'none';
            } else {
              btn.disabled = false;
              btn.style.opacity = '';
              btn.style.pointerEvents = '';

              if(showEditor && allowed && !noted) btn.classList.add('cand');
              if(noted) btn.classList.add('on');
              if(showEditor && noted && !cs.includes(ds)) btn.classList.add('stale');
            }
            box.appendChild(btn);
          }
          cell.appendChild(box);
        }
      }

      if(wavePlaced.has(i) && !fixed[i]){
        cell.style.boxShadow = 'inset 0 0 0 1px rgba(116,214,154,.18)';
        cell.style.background = 'rgba(116,214,154,.03)';
      }

      frag.appendChild(cell);
    }

    elBoard.appendChild(frag);
    buildPalette();
    updateButtons();
    if(elMist) elMist.textContent = String(mistakes);

  function pushMove(index, prev, next, meta={}){
    undo.push({ index, prev, next, meta });
    redo.length = 0;
    updateButtons();
  }

  function setCell(index, value, {countMistake=false, allowFixed=false, isReveal=false}={}){
    if(index<0 || index>80) return;
    if(fixed[index] && !allowFixed) return;

    const prev = grid[index];
    const vStr = String(value);
    let playerPlacedCorrect = false;
    if(prev === value) return;

    // Player move: score + special audio + wrong-attempt handling
    if(countMistake && solution && value !== BLANK && !isReveal){
      // capture candidates BEFORE changing anything (only works if current board is valid)
      let cs = '';
      try{
        const candBefore = candidatesFromBoard(boardString());
        cs = candBefore ? (candBefore[SQUARES[index]] || '') : '';
      }catch(_e){ cs = ''; }

      if(solution[index] !== vStr){
        // WRONG: do NOT play the wrong icon tone. Play 0 + quarter-tone down.
        mistakes++;
        toast('Fehler');
        playWrongCue();
        addPoints(-100, index);

        const cell = elBoard.querySelector(`.cell[data-i="${index}"]`);
        if(cell){
          cell.classList.add('shake');
          setTimeout(()=>cell.classList.remove('shake'), 260);
        }

        // Remove the wrong icon: keep previous value (usually blank)
        // If there is exactly ONE other possibility, auto-place it with an additional penalty.
        if(prev === BLANK && cs && cs.length===2 && cs.includes(vStr)){
          const other = cs.replace(vStr,'');
          if(other.length===1){
            grid[index] = other;
            if(notes[index]) notes[index].clear();
            addPoints(-50, index);
            playToneDigit(other, 0, 0.14);
            pushMove(index, prev, other, { auto:true, fromWrong:vStr });
            selected = index;
            render();
            if(isSolved()){
              stopTimer();
              toast('Gelöst!');
            }
            return;
          }
        }

        // No state change on wrong attempt
        selected = index;
        render();
        return;
      }

      // CORRECT: points now, sound after apply-state (so completion can be detected)
      playerPlacedCorrect = true;
      addPoints(+100, index);

    } else {
      // Non-player placements: keep the simple tone
      if(value !== BLANK && !isReveal){
        playToneDigit(vStr, 0, 0.22);
      }
    }

    // Apply state
    grid[index] = vStr;
    if(vStr !== BLANK && notes[index]) notes[index].clear();

    if(playerPlacedCorrect){
      if(countCorrectPlacements(vStr) >= 9) playDigitCompleteReward(vStr);
      else playCorrectReward(vStr);
    }

    pushMove(index, prev, vStr, { isReveal });

    // keep selection
    selected = index;

    render();

    // Completion jingles (only once per row/col/box). If the whole board is full, play finale pattern.
    if(value !== BLANK && !isReveal){
      const r = Math.floor(index/9);
      const c = index%9;

      // If everything is full: blocks (L->R, top->bottom), then rows, then columns.
      if(!completedFinale && isBoardFull()){
        completedFinale = true;
        const token = ++pathSeqToken;
        let delay = 520;
        let seqIdx = 0;

        // 9 blocks: block order left->right, top->bottom.
        for(let br=0; br<3; br++){
          for(let bc=0; bc<3; bc++){
            const startIdx = br*27 + bc*3;
            const bi = boxIndicesOf(startIdx);
            playAndMarkBoxOnce(bi, delay, { token, clearStart: (seqIdx===0) });
            delay += pathSequenceDurationMs(bi, 140);
            seqIdx++;
          }
        }

        // short break between block pass and row pass
        delay += 180;

        // 9 rows: top->bottom (left->right within row).
        for(let rr=0; rr<9; rr++){
          const ri = rowIndicesOf(rr, {reverse:false});
          playAndMarkPathOnce(ri, delay, {
            stepMs: 120,
            amp: 0.15,
            token,
            clearStart: (seqIdx===0),
          });
          delay += pathSequenceDurationMs(ri, 120);
          seqIdx++;
        }

        // short break between row pass and column pass
        delay += 180;

        // 9 columns: left->right (top->bottom within column).
        for(let cc=0; cc<9; cc++){
          const ci = colIndicesOf(cc, {reverse:false});
          playAndMarkPathOnce(ci, delay, {
            stepMs: 120,
            amp: 0.15,
            token,
            clearStart: (seqIdx===0),
          });
          delay += pathSequenceDurationMs(ci, 120);
          seqIdx++;
        }
      } else {
        const sequences = [];

        // Box complete -> play the 9 cells in 3 rows: left->right, top->bottom
        const bid = boxIdOfIndex(index);
        if(!completedBoxes.has(bid)){
          const bi = boxIndicesOf(index);
          if(isBoxComplete(bi)){
            completedBoxes.add(bid);
            sequences.push({ kind:'box', indices: bi, stepMs: 140, amp: 0.16 });
          }
        }

        // Row complete -> play from RIGHT to LEFT (as requested)
        if(!completedRows.has(r) && isRowComplete(r)){
          completedRows.add(r);
          const ri = rowIndicesOf(r, {reverse:true});
          sequences.push({ kind:'row', indices: ri, stepMs: 120, amp: 0.15 });
        }

        // Column complete -> play from TOP to BOTTOM (as requested)
        if(!completedCols.has(c) && isColComplete(c)){
          completedCols.add(c);
          const ci = colIndicesOf(c, {reverse:false});
          sequences.push({ kind:'col', indices: ci, stepMs: 120, amp: 0.15 });
        }

        if(sequences.length===1){
          const s = sequences[0];
          if(s.kind === 'box') playAndMarkBoxOnce(s.indices, 420);
          else playAndMarkPathOnce(s.indices, 420, {stepMs: s.stepMs, amp: s.amp});
        } else if(sequences.length>1){
          // shared token: chain instead of cancel, so box can play before row/col
          const token = ++pathSeqToken;
          let delay = 420;
          for(let i=0;i<sequences.length;i++){
            const s = sequences[i];
            if(s.kind === 'box'){
              playAndMarkBoxOnce(s.indices, delay, {token, clearStart:(i===0)});
            } else {
              playAndMarkPathOnce(s.indices, delay, {
                stepMs: s.stepMs,
                amp: s.amp,
                token,
                clearStart:(i===0),
              });
            }
            delay += pathSequenceDurationMs(s.indices, s.stepMs);
          }
        }
      }
    }

    // if solved
    if(isSolved()){
      stopTimer();
      toast('Gelöst!');
    }
  }


  function clearCell(index){
    if(index<0 || index>80) return;
    if(fixed[index]) return;
    const prev = grid[index];
    if(prev===BLANK) return;
    grid[index]=BLANK;
    if(notes[index]) notes[index].clear();
    pushMove(index, prev, BLANK, { clear:true });
    selected = index;
    render();
  }

  function doUndo(){
    const m = undo.pop();
    if(!m) return;
    redo.push(m);
    grid[m.index] = m.prev;
    selected = m.index;
    addPoints(-20, m.index);
    render();
  }


  function doRedo(){
    const m = redo.pop();
    if(!m) return;
    undo.push(m);
    grid[m.index] = m.next;
    selected = m.index;
    render();
  }

  function computeHintSingle(){
    const b = boardString();
    let cand=null;
    try{ cand=candidatesFromBoard(b); }catch(_e){ cand=null; }
    if(!cand) return null;

    for(let i=0;i<81;i++){
      if(grid[i]!==BLANK) continue;
      const cs = cand[SQUARES[i]] || '';
      if(cs.length===1) return {index:i, digit:cs};
    }

    for(const unit of MAPS.units){
      const empties = unit.filter(t=>grid[SQUARE_INDEX[t]]===BLANK);
      if(!empties.length) continue;
      for(const d of DIGITS){
        const places = empties.filter(t=>cand[t].includes(d));
        if(places.length===1) return {index:SQUARE_INDEX[places[0]], digit:d};
      }
    }
    return null;
  }

  function checkBoard(){
    if(!solution){ toast('Kein Solve verfügbar'); return; }
    let wrong = 0;
    for(let i=0;i<81;i++){
      if(grid[i]===BLANK) continue;
      if(grid[i] !== solution[i]) wrong++;
    }
    toast(wrong===0 ? 'Alles korrekt bisher' : `${wrong} falsch`);
    render();
  }

  function revealSelected(){
    if(selected<0) return;
    if(!solution){ toast('Kein Solve verfügbar'); return; }
    if(fixed[selected]) return;
    const v = solution[selected];
    setCell(selected, v, {countMistake:false, allowFixed:false, isReveal:true});
    fixed[selected] = true;
    render();
    const node = elBoard.querySelector(`.cell[data-i="${selected}"]`);
    if(node) node.classList.add('revealedWave');
    toast('Reveal');
  }

  function resetToPuzzle(){
    grid = puzzle.split('');
    fixed = Array.from({length:81}, (_,i)=>puzzle[i]!==BLANK);
    selected = -1;
    undo.length=0; redo.length=0;
    mistakes = 0;
    score = 0;
    completedRows.clear();
    completedCols.clear();
    completedBoxes.clear();
    completedFinale = false;
    if(elScore) elScore.textContent = '0';
    wavePlaced.clear();
    for(let i=0;i<81;i++) notes[i].clear();
    render();
    revealFixedWave();
    startTimer();
    toast('Reset');
  }

  function countCorrectPlacements(digit){
    if(!solution) return 0;
    let count = 0;
    for(let i=0; i<81; i++){
      if(grid[i]===digit && solution[i]===digit) count++;
    }
    return count;
  }

  function paletteDigitsMissing(){
    const out = [];
    for(let d=1; d<=9; d++){
      const ds = String(d);
      if(!solution || countCorrectPlacements(ds) < 9) out.push(ds);
    }
    return out;
  }

  function buildPalette(){
    const digits = paletteDigitsMissing();
    if(brush && !digits.includes(brush)) brush = null;

    elPalette.innerHTML='';
    elPalette.style.display = digits.length ? 'grid' : 'none';
    for(const ds of digits){
      const b = document.createElement('button');
      b.type='button';
      b.className='symBtn';
      b.dataset.d=ds;
      const v = document.createElement('span');
      v.className = 'val';
      setSymbolNode(v, ds, {mini:false, showFace:true});
      const mini = document.createElement('span');
      mini.className = 'mini';
      mini.textContent = TONE_NAME[ds]||ds;
      b.appendChild(v);
      b.appendChild(mini);
      elPalette.appendChild(b);
    }

  function genNew(attempt=0){
    stopTimer();
    mistakes = 0;
    score = 0;
    completedRows.clear();
    completedCols.clear();
    completedBoxes.clear();
    completedFinale = false;
    if(elScore) elScore.textContent = '0';
    if(elMist) elMist.textContent = '0';

    const MAX_ATTEMPTS = 40;
    const MIN_BLANKS_AFTER_WAVE = 28;

    if(attempt === 0) toast('Generiere (unique)…');

    puzzle = generatePuzzle({ difficulty: LOCKED.difficulty, symmetry: LOCKED.symmetry });
    solution = solveBoard(puzzle);
    if(!solution){
      toast('Generator-Fehler, erneut');
      return genNew(attempt+1);
    }

    grid = puzzle.split('');
    fixed = Array.from({length:81}, (_,i)=>puzzle[i]!==BLANK);

    selected = -1;
    undo.length=0; redo.length=0;
    wavePlaced.clear();
    for(let i=0;i<81;i++) notes[i].clear();

    applyLogicWaveOnce();

    const blanksLeft = grid.reduce((n,v)=> n + (v===BLANK ? 1 : 0), 0);
    const solvedByWave = (solution && boardString() === solution);

    if((solvedByWave || blanksLeft < MIN_BLANKS_AFTER_WAVE) && attempt < MAX_ATTEMPTS){
      return genNew(attempt+1);
    }

    render();
    revealFixedWave();
    startTimer();
    toast(attempt > 0 ? `Start (${blanksLeft} leer)` : 'Start');
  }

      audioUnlocked = (ctx.state === 'running');
      toast(audioUnlocked ? 'Sound an' : 'Sound an (tippe irgendwo zum Entsperren)');
      if(audioUnlocked) playToneDigit('1', 0, 0.20);
    } else {
      toast('Sound aus');
    }
    updateButtons();
  });

  btnCand.addEventListener('click', (e)=>{
    e.preventDefault();
    showCandidates = !showCandidates;
    render();
  });

  btnPencil.addEventListener('click', (e)=>{
    e.preventDefault();
    pencilMode = !pencilMode;
    if(pencilMode){ eraseMode = false; }
    updateButtons();
    toast(pencilMode ? 'Notizen an' : 'Notizen aus');
    render();
  });

  btnErase.addEventListener('click', (e)=>{
    e.preventDefault();
    eraseMode = !eraseMode;
    if(eraseMode) brush = null;
    updateButtons();
    toast(eraseMode ? 'Radierer' : 'Radierer aus');
  });

  btnUndo.addEventListener('click', (e)=>{ e.preventDefault(); doUndo(); });
  btnRedo.addEventListener('click', (e)=>{ e.preventDefault(); doRedo(); });

  btnCheck.addEventListener('click', (e)=>{ e.preventDefault(); checkBoard(); });

  btnHint.addEventListener('click', (e)=>{
    e.preventDefault();
    const h = computeHintSingle();
    if(!h){ toast('Kein Single'); return; }
    selected = h.index;
    render();
    toast(`Hint: ${symLabel(h.digit)} @ R${Math.floor(h.index/9)+1}C${(h.index%9)+1}`);
  });

  btnReveal.addEventListener('click', (e)=>{ e.preventDefault(); revealSelected(); });

  btnReset.addEventListener('click', (e)=>{ e.preventDefault(); resetToPuzzle(); });

  elPalette.addEventListener('click', (e)=>{
    const b = e.target.closest('.symBtn');
    if(!b) return;
    const d = b.dataset.d;
    if(eraseMode) eraseMode = false;
    brush = (brush===d) ? null : d;
    updateButtons();
    if(brush) toast(`Brush ${symLabel(brush)} (${TONE_NAME[brush]||brush})`);
  });

  elPalette.addEventListener('pointerover', (e)=>{
    const b = e.target.closest?.('.symBtn');
    if(!b) return;
    // Only on real enter (not when moving between children, not on exit effects)
    const rt = e.relatedTarget;
    if(rt && b.contains(rt)) return;

    const d = b.dataset.d;
    if(!/^[1-9]$/.test(d)) return;
    const now = performance.now();
    const k = `pal:${d}`;
    if(lastHover.k === k && (now - lastHover.t) < 320) return;
    lastHover = { t: now, k };
    playToneDigit(d, 0, 0.18);
  });

  elPalette.addEventListener('dragover', (e)=>{
    const b = e.target.closest?.('.symBtn');
    if(!b) return;
    const d = b.dataset.d;
    if(!/^[1-9]$/.test(d)) return;
    const now = performance.now();
    const k = `palDrag:${d}`;
    if(lastHover.k === k && (now - lastHover.t) < 320) return;
    lastHover = { t: now, k };
    playToneDigit(d, 0, 0.18);
  });

  elBoard.addEventListener('click', (e)=>{
    const cell = e.target.closest('.cell');
    if(!cell) return;
    const i = Number(cell.dataset.i);
    if(!Number.isFinite(i)) return;

    const noteBtn = e.target.closest('.note');
    if(noteBtn && !noteBtn.disabled){
      const d = noteBtn.dataset.d;
      selected = i;
      if(fixed[i]){ toast('Fix'); return; }
      if(pencilMode) toggleNote(i, d);
      else setCell(i, d, {countMistake:true});
      return;
    }

    selected = i;

    if(eraseMode){ clearCell(i); return; }

    if(brush){
      if(pencilMode) toggleNote(i, brush);
      else setCell(i, brush, {countMistake:true});
      return;
    }

    render();
  });

  elBoard.addEventListener('pointerover', (e)=>{
    const c = e.target.closest?.('.note');
    if(!c || c.disabled) return;
    // Only on real enter (not when moving between children)
    const rt = e.relatedTarget;
    if(rt && c.contains(rt)) return;

    const d = c.dataset.d;
    if(!/^[1-9]$/.test(d)) return;
    const now = performance.now();
    const k = `note:${d}`;
    if(lastHover.k === k && (now - lastHover.t) < 220) return;
    lastHover = { t: now, k };
    playToneDigit(d, 0, 0.18);
  });

  elBoard.addEventListener('pointerover', (e)=>{
    if(e.target.closest?.('.note')) return;
    const cell = e.target.closest?.('.cell');
    if(!cell) return;
    const rt = e.relatedTarget;
    if(rt && cell.contains(rt)) return;
    const i = Number(cell.dataset.i);
    if(!Number.isFinite(i)) return;

    const v = grid[i];
    if(v === BLANK){
      const now = performance.now();
      const k0 = `cellEmpty:${i}`;
      if(lastHover.k === k0 && (now - lastHover.t) < 420) return;
      lastHover = { t: now, k: k0 };
      playToneDigit('0', 0, 0.14);
      return;
    }

    const now = performance.now();
    const k = `cellVal:${i}:${v}`;
    if(lastHover.k === k && (now - lastHover.t) < 360) return;
    lastHover = { t: now, k };
    playToneDigit(String(v), 0, 0.18);
  });

  document.addEventListener('keydown', (e)=>{
    if(e.key==='Escape'){
      if(presetPanelOpen){
        setPresetPanelOpen(false);
        toast('Preset-Panel zu');
        return;
      }
      brush = null;
      eraseMode = false;
      updateButtons();
      toast('Clear');
      return;
    }

    if(e.key===' '){
      e.preventDefault();
      pencilMode = !pencilMode;
      if(pencilMode) eraseMode = false;
      updateButtons();
      toast(pencilMode ? 'Notizen an' : 'Notizen aus');
      render();
      return;
    }
    if(e.key==='e' || e.key==='E'){
      eraseMode = !eraseMode;
      if(eraseMode) brush = null;
      updateButtons();
      toast(eraseMode ? 'Radierer' : 'Radierer aus');
      return;
    }
    if(e.key==='m' || e.key==='M'){ btnSound.click(); return; }
    if(e.key==='c' || e.key==='C'){ showCandidates = !showCandidates; render(); return; }

    if(e.key==='ArrowLeft' && selected>=0 && selected%9>0){ selected--; render(); return; }
    if(e.key==='ArrowRight' && selected>=0 && selected%9<8){ selected++; render(); return; }
    if(e.key==='ArrowUp' && selected>=9){ selected-=9; render(); return; }
    if(e.key==='ArrowDown' && selected>=0 && selected<72){ selected+=9; render(); return; }

    if(selected<0) return;

    if(e.key==='Backspace' || e.key==='Delete' || e.key==='0'){ clearCell(selected); return; }

    if(/^[1-9]$/.test(e.key)){
      if(fixed[selected]){ toast('Fix'); return; }
      if(pencilMode) toggleNote(selected, e.key);
      else setCell(selected, e.key, {countMistake:true});
    }
  });

  setPresetPanelOpen(false);
  updateButtons();
  render();
  genNew();

})();
  </script>
</body>
</html>
