<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>girl.tv: "We Are Renovating"</title>
   <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .image-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        .image-container img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,255,0,0.1), rgba(0,255,255,0.1), rgba(0,0,255,0.1));
            background-size: 400% 400%;
            opacity: 0.2;
            animation: gradientShift 10s infinite alternate ease-in-out;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .text-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 5vw;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="https://girl.tv/2025/girltv_2025.jpg" alt="Renovation Scene">
        <div class="overlay"></div>
        <div class="text-layer">We Are Renovating</div>
    </div>
<script type='text/javascript' src="/js/awstats_misc_tracker.js"></script>
<noscript><img src="/js/awstats_misc_tracker.js?nojs=y" height="0" width="0" border="0" style="display: none" alt="none>
<!-- stats tracker -->
</body>
</html>
