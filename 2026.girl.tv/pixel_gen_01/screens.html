<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pixel_gen_01 screens animation</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #fff;
      --fg: #f2f2f2;
      --grid: #2a2a2a;
      --grid-alt: #1b1b1b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      display: grid;
      gap: 12px;
      justify-items: start;
    }

    .stage {
      width: min(476px, calc(100vw - 48px));
      aspect-ratio: 476 / 864;
      background-color: var(--grid-alt);
      background-image:
        linear-gradient(45deg, var(--grid) 25%, transparent 25%),
        linear-gradient(-45deg, var(--grid) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--grid) 75%),
        linear-gradient(-45deg, transparent 75%, var(--grid) 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
      border: 1px solid #333;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .status {
      color: #9a9a9a;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main>
    <div class="stage" aria-label="8 frame animation">
      <canvas id="screen" width="476" height="864"></canvas>
    </div>
    <div class="status" id="status">lade frames...</div>
  </main>

  <script>
    const FRAME_RATE = 24;
    const FRAME_MS = 1000 / FRAME_RATE;
    const WIDTH = 476;
    const HEIGHT = 864;
    const SOURCES = [
      "screens/transparent/screen_01.png",
      "screens/transparent/screen_02.png",
      "screens/transparent/screen_03.png",
      "screens/transparent/screen_04.png",
      "screens/transparent/screen_05.png",
      "screens/transparent/screen_06.png",
      "screens/transparent/screen_07.png",
      "screens/transparent/screen_08.png"
    ];

    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    let frames = [];
    let startTime = 0;
    let lastIndex = -1;

    ctx.imageSmoothingEnabled = false;

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function render(now) {
      const frameIndex = Math.floor((now - startTime) / FRAME_MS) % frames.length;

      if (frameIndex !== lastIndex) {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.drawImage(frames[frameIndex], 0, 0, WIDTH, HEIGHT);
        statusEl.textContent = `frame ${frameIndex + 1}/8 | 24fps | 1/24 sekunde`;
        lastIndex = frameIndex;
      }

      requestAnimationFrame(render);
    }

    Promise.all(SOURCES.map(loadImage))
      .then((loadedFrames) => {
        frames = loadedFrames;
        startTime = performance.now();
        requestAnimationFrame(render);
      })
      .catch(() => {
        statusEl.textContent = "frames konnten nicht geladen werden";
      });
  </script>
</body>
</html>
