<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IP Face — Pixel (Canvas) v2</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#06080c; color:#eaf0f8; }
    header { padding: 18px 16px 10px; border-bottom: 1px solid rgba(255,255,255,.08); }
    h1 { margin: 0 0 8px; font-size: 16px; font-weight: 650; letter-spacing:.2px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input { background:#0f1620; border:1px solid rgba(255,255,255,.12); color:#e6eef7; padding:10px 12px; border-radius:10px; min-width: 210px; outline:none; }
    button { background:#132235; border:1px solid rgba(255,255,255,.14); color:#e6eef7; padding:10px 12px; border-radius:10px; cursor:pointer; }
    button:hover { background:#17304d; }
    main { padding:16px; display:grid; gap:14px; grid-template-columns: 1fr; }
    .wrap { display:grid; gap:14px; grid-template-columns: minmax(260px, 520px) 1fr; align-items:start; }
    @media (max-width: 860px){ .wrap{ grid-template-columns: 1fr; } }
    .card { background:#0c111a; border:1px solid rgba(255,255,255,.10); border-radius:14px; padding:14px; }
    canvas { width:min(520px, 92vw); height:auto; image-rendering: pixelated; border-radius: 12px; background:#06080c; border:1px solid rgba(255,255,255,.08); }
    .meta { font-size:12px; opacity:.85; line-height:1.5; }
    .tiny { font-size:11px; opacity:.7; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <header>
    <h1>IP Face — Pixel (Canvas) v2</h1>
    <div class="row">
      <input id="ip" placeholder="z.B. 198.51.100.7" inputmode="numeric" />
      <button id="rnd">Random IP</button>
      <button id="render">Render</button>
      <span class="tiny">mehr Varianz: asymmetry · eye types · nose types · mouth types · optional glasses</span>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="card" style="display:flex;justify-content:center;">
        <canvas id="c" width="256" height="256"></canvas>
      </div>
      <div class="card">
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </main>

<script>
function u32(n){ return n>>>0; }
function ipToU32(ip){
  const p = ip.trim().split(".");
  if(p.length !== 4) return null;
  const a = Number(p[0]), b = Number(p[1]), c = Number(p[2]), d = Number(p[3]);
  if([a,b,c,d].some(x => !Number.isInteger(x) || x<0 || x>255)) return null;
  return u32((a<<24) | (b<<16) | (c<<8) | d);
}
function mix32(x){
  x = u32(x + 0x9e3779b9);
  x ^= x >>> 16; x = u32(Math.imul(x, 0x85ebca6b));
  x ^= x >>> 13; x = u32(Math.imul(x, 0xc2b2ae35));
  x ^= x >>> 16;
  return u32(x);
}
function bits(x, start, len){
  return (x >>> start) & ((1<<len)-1);
}
function mulberry32(seed){
  let t = seed>>>0;
  return function(){
    t = (t + 0x6D2B79F5) >>> 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function decode(ip){
  const raw = ipToU32(ip);
  if(raw === null) return null;
  const x = mix32(raw);
  const prng = mulberry32(x ^ raw);
  return {
    ip, raw, x, prng,
    nose: bits(x,0,6),
    eyesBrows: bits(x,6,5),
    mouth: bits(x,11,5),
    jaw: bits(x,16,4),
    face: bits(x,20,3),
    hairline: bits(x,23,3),
    ears: bits(x,26,3),
    cheeks: bits(x,29,2),
    forehead: bits(x,31,1),
  };
}
function randIP(){
  return [0,0,0,0].map(_ => Math.floor(Math.random()*256)).join(".");
}
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
function lerp(a,b,t){ return a+(b-a)*t; }

function paletteFrom(raw){
  const r = (raw>>>24)&255, g = (raw>>>16)&255, b = (raw>>>8)&255, d = raw&255;
  const skin = [clamp(176 + (r-128)*0.28, 110, 235), clamp(142 + (g-128)*0.22, 80, 215), clamp(126 + (b-128)*0.20, 60, 205)];
  const hair = [clamp(46 + (d-128)*0.16, 6, 120), clamp(36 + (r-128)*0.12, 5, 110), clamp(28 + (g-128)*0.11, 4, 100)];
  const accent = [clamp(70 + (b-128)*0.28, 10, 220), clamp(120 + (d-128)*0.26, 20, 240), clamp(140 + (r-128)*0.22, 20, 240)];
  const ink = [225, 232, 245];
  return { skin, hair, accent, ink };
}
function rgb(a){ return `rgb(${a.map(x=>Math.round(x)).join(",")})`; }

function ditherFillRect(ctx, x,y,w,h, baseRgb, noiseSeed){
  for(let yy=y; yy<y+h; yy++){
    for(let xx=x; xx<x+w; xx++){
      const n = ((xx*73856093) ^ (yy*19349663) ^ noiseSeed) >>> 0;
      const t = (n & 255)/255;
      const shade = lerp(-22, 22, t);
      ctx.fillStyle = `rgb(${clamp(baseRgb[0]+shade,0,255)},${clamp(baseRgb[1]+shade,0,255)},${clamp(baseRgb[2]+shade,0,255)})`;
      ctx.fillRect(xx,yy,1,1);
    }
  }
}

function draw(ip){
  const d = decode(ip);
  if(!d){ alert("Ungültige IP. Format: a.b.c.d (0..255)"); return; }

  const c = document.getElementById("c");
  const ctx = c.getContext("2d", { alpha: false });
  ctx.fillStyle = "#06080c";
  ctx.fillRect(0,0,c.width,c.height);

  const pal = paletteFrom(d.raw);
  const R = d.prng;

  // extra variety
  const cx = 128 + Math.round(lerp(-6, 6, R()));
  const cy = 132 + Math.round(lerp(-6, 6, R()));

  const faceR = lerp(70, 96, d.face/7) * lerp(0.92, 1.08, R());
  const jaw = d.jaw/15;
  const cheeks = d.cheeks/3;
  const forehead = d.forehead ? 1 : 0;

  // head scanline mask
  const seed = d.x ^ 0xA53C9E3;
  const skin = pal.skin;

  for(let y=0; y<c.height; y++){
    const dy = y - cy;
    const rx = faceR * (1 - 0.0022*Math.abs(dy)) * lerp(0.96,1.04,R());
    const ry = faceR * 1.14;

    let k = 1 - (dy*dy)/(ry*ry);
    if(k <= 0) continue;
    let half = Math.sqrt(k) * rx;

    // jaw shaping
    if(dy > 18){
      const t = clamp((dy-18)/92, 0, 1);
      half *= lerp(1.0, 0.72 + 0.14*cheeks, t);
      if(dy > 70) half *= lerp(1.0, 0.78, clamp((dy-70)/30,0,1));
    }
    // forehead shaping
    if(dy < -65) half *= lerp(1.0, 0.84, forehead);

    const x0 = Math.round(cx - half);
    const x1 = Math.round(cx + half);
    if(x1<=x0) continue;
    ditherFillRect(ctx, x0, y, x1-x0, 1, skin, seed ^ (y*2654435761));
  }

  // hairline block (varied height/width)
  const hairH = Math.round(lerp(18, 60, d.hairline/7) * lerp(0.90, 1.15, R()));
  const hairW = Math.round(lerp(132, 198, d.face/7) * lerp(0.90, 1.12, R()));
  const hx0 = cx - hairW/2 + Math.round(lerp(-4,4,R()));
  const hy0 = cy - faceR - 12 + Math.round(lerp(-4,4,R()));
  ditherFillRect(ctx, hx0, hy0, hairW, hairH, pal.hair, seed ^ 0xA11CE);

  // ears (more sizes)
  const ear = d.ears/7;
  const ew = Math.round(lerp(9, 18, ear) * lerp(0.90,1.15,R()));
  const eh = Math.round(lerp(16, 30, ear) * lerp(0.90,1.15,R()));
  const ex = Math.round(cx - faceR - 12);
  const ey = Math.round(cy - 10 + lerp(-4,4,R()));
  ctx.fillStyle = rgb([skin[0]-12, skin[1]-12, skin[2]-12]);
  ctx.fillRect(ex, ey, ew, eh);
  ctx.fillRect(256-ex-ew, ey, ew, eh);

  // Eyes+Brow expanded archetypes (12)
  const eyesType = d.eyesBrows >>> 2; // 0..7
  const eyesVar = d.eyesBrows & 3;    // 0..3
  const eyesSub = (d.raw>>>19) & 3;   // 0..3
  const eyeArch = (eyesType + eyesSub) % 12;

  const spacing = Math.round(lerp(46, 68, eyesType/7) + lerp(-4,4,R()));
  const eyeY = Math.round(cy - 28 + lerp(-10, 10, eyesVar/3) + lerp(-4,4,R()));
  const eyeW = Math.round(lerp(16, 30, (7-eyesType)/7) * lerp(0.90,1.15,R()));
  const eyeH = Math.round(lerp(6, 12, eyesType/7) * lerp(0.90,1.15,R()));

  function drawEye(ex){
    const a = eyeArch % 4; // 0 almond,1 round,2 hooded,3 monolid
    const top = [1,1,1,1][a];
    const bot = [1,1,0.7,0.7][a];
    ctx.fillStyle = "rgb(235,238,244)";
    ctx.fillRect(ex-eyeW/2, eyeY-eyeH/2, eyeW, eyeH);

    // lids
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillRect(ex-eyeW/2, eyeY-eyeH/2, eyeW, 1);
    if(a >= 2){
      ctx.fillRect(ex-eyeW/2, eyeY-eyeH/2 + 2, eyeW, 1);
    }

    // iris/pupil
    ctx.fillStyle = rgb(pal.accent);
    const irisX = ex + Math.round(lerp(-2,2,R()));
    const irisY = eyeY + Math.round(lerp(-1,1,R()));
    ctx.fillRect(irisX-2, irisY-1, 4, 3);
    ctx.fillStyle = "rgb(12,12,14)";
    ctx.fillRect(irisX-1, irisY, 2, 2);

    // corners (shape cue)
    ctx.fillStyle = "rgba(0,0,0,.35)";
    if(a === 0){
      ctx.fillRect(ex-eyeW/2, eyeY, 1, 1);
      ctx.fillRect(ex+eyeW/2-1, eyeY-1, 1, 1);
    } else if(a === 1){
      ctx.fillRect(ex-eyeW/2, eyeY-1, 1, 1);
      ctx.fillRect(ex+eyeW/2-1, eyeY-1, 1, 1);
    } else {
      ctx.fillRect(ex-eyeW/2, eyeY-eyeH/2, 1, 1);
      ctx.fillRect(ex+eyeW/2-1, eyeY-eyeH/2, 1, 1);
    }
  }
  drawEye(cx - spacing/2);
  drawEye(cx + spacing/2);

  // brows (variable length/thickness/arch)
  const browY = eyeY - 12 + Math.round(lerp(-2,2,R()));
  const browLen = Math.round(lerp(18, 38, (7-eyesType)/7) * lerp(0.90,1.15,R()));
  const browTh = 2 + (eyesVar===3 ? 1 : 0) + (eyeArch>=6 ? 1 : 0);
  const bxL = cx - spacing/2 - browLen/2;
  const bxR = cx + spacing/2 - browLen/2;
  ctx.fillStyle = "rgb(18,18,20)";
  ctx.fillRect(bxL, browY, browLen, browTh);
  ctx.fillRect(bxR, browY, browLen, browTh);

  // nose (more types)
  const noseType = d.nose >>> 3; // 0..7
  const noseVar = d.nose & 7;    // 0..7
  const noseStyle = (noseType + ((d.raw>>>21)&7)) % 12;

  const noseY0 = cy - 10 + Math.round(lerp(-2,2,R()));
  const noseLen = Math.round(lerp(16, 40, noseType/7) * lerp(0.90,1.15,R()));
  const noseW = Math.round(lerp(5, 14, noseVar/7) * lerp(0.90,1.15,R()));
  const nx = cx + Math.round(lerp(-4,4,R()));

  ctx.fillStyle = "rgba(0,0,0,.42)";
  // bridge
  ctx.fillRect(nx, noseY0, 1, noseLen);
  // base
  ctx.fillRect(nx - noseW/2, noseY0 + noseLen, noseW, 2);
  // nostrils for some styles
  if(noseStyle >= 7){
    ctx.fillRect(nx - noseW/2, noseY0 + noseLen + 2, 2, 1);
    ctx.fillRect(nx + noseW/2 - 2, noseY0 + noseLen + 2, 2, 1);
  }

  // mouth (more shapes)
  const mouthType = d.mouth >>> 2; // 0..7
  const mouthVar = d.mouth & 3;    // 0..3
  const mouthStyle = (mouthType + ((d.raw>>>3)&7)) % 12;

  const my = Math.round(cy + 46 + lerp(-8, 10, mouthVar/3) + lerp(-4,4,R()));
  const mw = Math.round(lerp(24, 62, mouthType/7) * lerp(0.90,1.18,R()));
  const smile = Math.round(lerp(-3, 4, mouthVar/3) + lerp(-2,2,(mouthStyle%6)/5));
  ctx.fillStyle = "rgb(110,46,46)";

  const x0 = cx - mw/2;
  ctx.fillRect(x0, my, mw, 1);
  if(mouthStyle % 3 === 0){
    ctx.fillRect(x0+3, my+smile, mw-6, 1);
    ctx.fillRect(x0+7, my+smile*2, mw-14, 1);
  } else if(mouthStyle % 3 === 1){
    ctx.fillRect(x0+4, my+smile, mw-8, 1);
  } else {
    ctx.fillRect(x0+2, my+smile, mw-4, 1);
    ctx.fillRect(x0+6, my+smile, mw-12, 1);
  }

  // optional glasses (distinctive feature)
  const glasses = ((d.raw>>>7)&1) && ((d.raw>>>13)&1);
  if(glasses){
    ctx.fillStyle = "rgba(220,230,245,.65)";
    const gy = eyeY - 1;
    const gw = eyeW + 8;
    const gh = eyeH + 6;
    const gxL = (cx - spacing/2) - gw/2;
    const gxR = (cx + spacing/2) - gw/2;
    ctx.strokeStyle = "rgba(220,230,245,.55)";
    // pixel "stroke"
    function rectStroke(x,y,w,h){
      ctx.fillRect(x,y,w,1); ctx.fillRect(x,y+h-1,w,1);
      ctx.fillRect(x,y,1,h); ctx.fillRect(x+w-1,y,1,h);
    }
    rectStroke(gxL, gy-gh/2, gw, gh);
    rectStroke(gxR, gy-gh/2, gw, gh);
    // bridge
    ctx.fillRect(cx-2, gy, 4, 1);
  }

  // meta
  document.getElementById("meta").innerHTML = `
    <div><b>IP:</b> <code>${d.ip}</code></div>
    <div><b>raw u32:</b> <code>${d.raw>>>0}</code> · <b>mixed:</b> <code>${d.x>>>0}</code></div>
    <div style="margin-top:10px"><b>Discrete:</b></div>
    <div class="tiny">nose=${d.nose} · eyes+brows=${d.eyesBrows} · mouth=${d.mouth} · jaw=${d.jaw} · face=${d.face} · hairline=${d.hairline} · ears=${d.ears} · cheeks=${d.cheeks} · forehead=${d.forehead}</div>
  `;
}

document.getElementById("rnd").addEventListener("click", () => {
  const ip = randIP();
  document.getElementById("ip").value = ip;
  draw(ip);
});
document.getElementById("render").addEventListener("click", () => draw(document.getElementById("ip").value));
document.getElementById("ip").addEventListener("keydown", (e) => { if(e.key==="Enter") draw(e.target.value); });

const init = "198.51.100.7";
document.getElementById("ip").value = init;
draw(init);
</script>
</body>
</html>
