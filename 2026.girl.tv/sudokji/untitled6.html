<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUDOKU Negativeform Animation</title>

  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --cell-empty: #171717;
      --material: #f4f1e8;
      --void: #050505;
      --glow: rgba(255, 246, 210, 0.75);
      --grid-gap: 7px;
      --cell-size: min(9.2vw, 52px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 35%, #242018 0%, transparent 38%),
        radial-gradient(circle at 50% 65%, #111 0%, #050505 58%);
      color: var(--material);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(255,255,255,0.035) 50%,
          transparent 100%
        );
      background-size: 100% 7px;
      mix-blend-mode: overlay;
      opacity: 0.55;
      animation: scan 5s linear infinite;
    }

    @keyframes scan {
      from {
        transform: translateY(-24px);
      }

      to {
        transform: translateY(24px);
      }
    }

    .stage {
      position: relative;
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 28px;
    }

    .title {
      font-size: 12px;
      letter-spacing: 0.22em;
      opacity: 0.65;
      text-transform: uppercase;
    }

    #grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(9, var(--cell-size));
      grid-template-rows: repeat(9, var(--cell-size));
      gap: var(--grid-gap);
      padding: 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), transparent 40%),
        var(--panel);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      box-shadow:
        0 32px 90px rgba(0,0,0,0.75),
        inset 0 0 28px rgba(255,255,255,0.035);
      animation: panelBreath 3.8s ease-in-out infinite;
    }

    #grid::after {
      content: "";
      position: absolute;
      inset: 22px;
      pointer-events: none;
      border-radius: 10px;
      box-shadow:
        inset 0 0 40px rgba(255, 246, 210, 0.08),
        0 0 55px rgba(255, 246, 210, 0.08);
    }

    @keyframes panelBreath {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.012);
      }
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      display: grid;
      place-items: center;
      border-radius: 11px;
      font-size: calc(var(--cell-size) * 0.43);
      font-weight: 950;
      line-height: 1;
      user-select: none;
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 180ms ease,
        box-shadow 180ms ease,
        opacity 180ms ease;
    }

    .cell.empty {
      background: var(--cell-empty);
      color: rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      opacity: 0.65;
    }

    .cell.material {
      background:
        radial-gradient(circle at 35% 25%, #ffffff 0%, var(--material) 45%, #b8ad91 100%);
      color: #050505;
      box-shadow:
        0 0 18px var(--glow),
        0 0 42px rgba(255, 246, 210, 0.26),
        inset 0 0 0 1px rgba(255,255,255,0.55),
        inset 0 -7px 14px rgba(0,0,0,0.22);
      transform: translateY(-1px) scale(1.035);
      animation: materialPulse 2.4s ease-in-out infinite;
    }

    .cell.void {
      background:
        radial-gradient(circle at 50% 50%, #080808 0%, #020202 100%);
      color: transparent;
      box-shadow:
        inset 0 0 0 1px rgba(255, 246, 210, 0.14),
        inset 0 0 20px rgba(0,0,0,0.95);
      transform: scale(0.92);
    }

    @keyframes materialPulse {
      0%, 100% {
        filter: brightness(1);
      }

      50% {
        filter: brightness(1.16);
      }
    }

    .caption {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.42;
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="title">negativeform sudoku</div>
    <div id="grid"></div>
    <div class="caption">SUDOKU · 7×7 glyphs inside 9×9 grid</div>
  </main>

  <script>
    const glyph_S_4 = [
      "SSSSSSS",
      "S.....S",
      "S.SSSSS",
      "S.....S",
      "SSSSS.S",
      "S.....S",
      "SSSSSSS"
    ];

    const glyph_U_4 = [
      "U.....U",
      "U.....U",
      "U.....U",
      "U.....U",
      "U.....U",
      "U.....U",
      "UUUUUUU"
    ];

    const glyph_D_4 = [
      "DDDDDD.",
      "D.....D",
      "D.....D",
      "D.....D",
      "D.....D",
      "D.....D",
      "DDDDDD."
    ];

    const glyph_O_4 = [
      "OOOOOOO",
      "O.....O",
      "O.....O",
      "O.....O",
      "O.....O",
      "O.....O",
      "OOOOOOO"
    ];

    const glyph_K_4 = [
      "K.....K",
      "K....K.",
      "K...K..",
      "KKKK...",
      "K...K..",
      "K....K.",
      "K.....K"
    ];

    const glyphs = {
      S: glyph_S_4,
      U: glyph_U_4,
      D: glyph_D_4,
      O: glyph_O_4,
      K: glyph_K_4
    };

    const word = "SUDOKU";

    const gridSize = 9;
    const glyphWidth = 7;
    const glyphHeight = 7;
    const letterGap = 2;
    const offsetY = 1;
    const speed = 160;

    const gridElement = document.getElementById("grid");
    const cells = [];

    for (let i = 0; i < gridSize * gridSize; i++) {
      const cell = document.createElement("div");
      cell.className = "cell empty";
      cell.textContent = "×";
      gridElement.appendChild(cell);
      cells.push(cell);
    }

    function makeTextMatrix(text) {
      const width = text.length * glyphWidth + (text.length - 1) * letterGap;

      const matrix = Array.from(
        { length: glyphHeight },
        () => Array(width).fill(".")
      );

      let offsetX = 0;

      for (const char of text) {
        const glyph = glyphs[char];

        for (let y = 0; y < glyphHeight; y++) {
          for (let x = 0; x < glyphWidth; x++) {
            matrix[y][offsetX + x] = glyph[y][x];
          }
        }

        offsetX += glyphWidth + letterGap;
      }

      return matrix;
    }

    const textMatrix = makeTextMatrix(word);
    const textWidth = textMatrix[0].length;

    let frame = 0;

    function draw() {
      const clearGrid = Array.from(
        { length: gridSize },
        () => Array(gridSize).fill(null)
      );

      const horizontalOffset = gridSize - (frame % (textWidth + gridSize + 1));

      for (let y = 0; y < glyphHeight; y++) {
        for (let x = 0; x < textWidth; x++) {
          const targetY = offsetY + y;
          const targetX = horizontalOffset + x;

          if (
            targetY >= 0 &&
            targetY < gridSize &&
            targetX >= 0 &&
            targetX < gridSize
          ) {
            clearGrid[targetY][targetX] = textMatrix[y][x];
          }
        }
      }

      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          const value = clearGrid[y][x];
          const cell = cells[y * gridSize + x];

          if (value === null) {
            cell.className = "cell empty";
            cell.textContent = "×";
          } else if (value === ".") {
            cell.className = "cell void";
            cell.textContent = "";
          } else {
            cell.className = "cell material";
            cell.textContent = value;
          }
        }
      }

      frame++;
    }

    draw();
    setInterval(draw, speed);
  </script>
</body>
</html>
