<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUDKJI 9x9 Grid Animation</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #111;
      color: #f2f2f2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      display: grid;
      place-items: center;
    }

    .wrap {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(9, 42px);
      grid-template-rows: repeat(9, 42px);
      gap: 6px;
      padding: 18px;
      background: #1b1b1b;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .cell {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #2a2a2a;
      color: #555;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      transition:
        background 140ms ease,
        color 140ms ease,
        transform 140ms ease;
    }

    .cell.on {
      background: #f2f2f2;
      color: #111;
      transform: scale(1.05);
    }

    .label {
      opacity: 0.7;
      font-size: 13px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div id="grid" aria-label="9 mal 9 Schriftzug Animation"></div>
    <div class="label">SUDKJI · 9×9 GRID · 3×3 GLYPHS</div>
  </main>

  <script>
    const glyphs = {
      S: [
        "SSS",
        "XSX",
        "SSS"
      ],
      U: [
        "UXU",
        "UXU",
        "UUU"
      ],
      D: [
        "DDD",
        "DXD",
        "DDD"
      ],
      K: [
        "KXK",
        "KXX",
        "KXK"
      ],
      I: [
        "XIX",
        "XIX",
        "XIX"
      ],
      J: [
        "XJX",
        "XJX",
        "JJX"
      ]
    };

    const word = "SUDKJI";
    const gridSize = 9;
    const glyphSize = 3;
    const letterGap = 1;

    const gridElement = document.getElementById("grid");
    const cells = [];

    for (let i = 0; i < gridSize * gridSize; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = "x";
      gridElement.appendChild(cell);
      cells.push(cell);
    }

    function makeTextMatrix(text) {
      const height = glyphSize;
      const width = text.length * glyphSize + (text.length - 1) * letterGap;
      const matrix = Array.from({ length: height }, () => Array(width).fill("X"));

      let offsetX = 0;

      for (const char of text) {
        const glyph = glyphs[char];

        for (let y = 0; y < glyphSize; y++) {
          for (let x = 0; x < glyphSize; x++) {
            matrix[y][offsetX + x] = glyph[y][x];
          }
        }

        offsetX += glyphSize + letterGap;
      }

      return matrix;
    }

    const textMatrix = makeTextMatrix(word);
    const textWidth = textMatrix[0].length;
    const textHeight = textMatrix.length;

    let frame = 0;

    function draw() {
      const clearGrid = Array.from(
        { length: gridSize },
        () => Array(gridSize).fill("X")
      );

      const verticalOffset = 3;
      const horizontalOffset = gridSize - (frame % (textWidth + gridSize + 1));

      for (let y = 0; y < textHeight; y++) {
        for (let x = 0; x < textWidth; x++) {
          const targetY = verticalOffset + y;
          const targetX = horizontalOffset + x;

          if (
            targetY >= 0 &&
            targetY < gridSize &&
            targetX >= 0 &&
            targetX < gridSize
          ) {
            clearGrid[targetY][targetX] = textMatrix[y][x];
          }
        }
      }

      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          const value = clearGrid[y][x];
          const cell = cells[y * gridSize + x];

          cell.textContent = value.toLowerCase();

          if (value !== "X") {
            cell.classList.add("on");
            cell.textContent = value;
          } else {
            cell.classList.remove("on");
          }
        }
      }

      frame++;
    }

    draw();
    setInterval(draw, 180);
  </script>
</body>
</html>
