<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPv4 Face Generator</title>
  <style>
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 24px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    input {
      font: inherit;
      padding: 10px 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1b1b1b;
      color: #eee;
      min-width: 260px;
    }

    button {
      font: inherit;
      padding: 10px 14px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #eee;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    pre {
      background: #000;
      color: #ddd;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre;
      line-height: 1;
      font-size: 12px;
      min-height: 240px;
    }

    .error {
      color: #ff8080;
      margin-top: 8px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>IPv4 Face Generator</h1>

    <div class="row">
      <input id="ipInput" type="text" value="192.168.0.1" placeholder="IPv4 eingeben, z. B. 192.168.0.1">
      <button id="renderBtn" type="button">Render</button>
    </div>

    <div id="error" class="error"></div>
    <pre id="output"></pre>
  </div>

  <script src="./ip-gen.js"></script>
  <script>
    (function () {
      const ipInput = document.getElementById("ipInput");
      const renderBtn = document.getElementById("renderBtn");
      const output = document.getElementById("output");
      const error = document.getElementById("error");

      function render() {
        error.textContent = "";
        try {
          if (typeof buildFaceFromIPv4 !== "function") {
            throw new Error("buildFaceFromIPv4(ip) wurde in ip-gen.js nicht gefunden.");
          }
          output.textContent = buildFaceFromIPv4(ipInput.value.trim());
        } catch (err) {
          output.textContent = "";
          error.textContent = err.message || String(err);
        }
      }

      renderBtn.addEventListener("click", render);
      ipInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
