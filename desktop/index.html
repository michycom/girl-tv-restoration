<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>girl.tv Desktop</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { overflow: hidden; background: #111; }

    /* Fake macOS wallpaper */
    #wallpaper {
      position: fixed; inset: 0;
      background:
        radial-gradient(1200px 800px at 20% 30%, rgba(120,180,255,.35), transparent 60%),
        radial-gradient(900px 700px at 70% 70%, rgba(255,120,200,.25), transparent 55%),
        linear-gradient(135deg, #0b0f1a, #131b2b 55%, #0b0f1a);
      transform: scale(1.02);
      filter: saturate(1.1);
    }

    /* Top bar */
    #menubar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: rgba(20, 20, 22, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.92);
      z-index: 50;
      user-select: none;
    }

    #apple {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 7px;
      cursor: default;
      margin-right: 10px;
    }
    #apple:hover { background: rgba(255,255,255,0.12); }

    #menu-left {
      display: flex; gap: 14px; align-items: center;
      font-size: 13px;
    }
    .menu-item { padding: 6px 8px; border-radius: 8px; cursor: default; }
    .menu-item:hover { background: rgba(255,255,255,0.12); }

    #menu-right {
      margin-left: auto;
      opacity: 0.9;
      font-size: 12px;
      display: flex;
      align-items: center;
    }

    /* Dropdown */
    #dropdown {
      position: fixed;
      top: 36px; left: 10px;
      width: 320px;
      background: rgba(25,25,28,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,0.92);
      padding: 10px;
      z-index: 60;
      display: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    #dropdown .row { display:flex; gap:10px; align-items:center; padding: 10px 10px; border-radius: 10px; }
    #dropdown .row:hover { background: rgba(255,255,255,0.10); }
    #dropdown .emoji { width: 26px; text-align:center; }
    #dropdown .title { font-weight: 600; }
    #dropdown .sub { opacity: 0.78; font-size: 12px; margin-top: 2px; }

    /* Desktop area */
    #desktop {
      position: fixed;
      inset: 34px 0 0 0;
      padding: 22px;
      z-index: 10;
    }

    /* Icons */
    .icon {
      position: absolute;
      width: 92px;
      text-align: center;
      color: rgba(255,255,255,0.92);
      user-select: none;
      cursor: default;
    }
    .icon .thumb {
      width: 64px; height: 64px;
      margin: 0 auto 6px auto;
      border-radius: 14px;
      display: grid; place-items: center;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
    }
    .icon.folder .thumb { background: rgba(255,255,255,0.12); }
    .icon img {
      width: 64px; height: 64px; object-fit: cover;
      display:block;
    }
    .icon .label {
      font-size: 12px;
      line-height: 1.2;
      padding: 2px 6px;
      border-radius: 8px;
      display: inline-block;
      max-width: 92px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .icon.selected .label {
      background: rgba(20,110,255,0.55);
      outline: 1px solid rgba(255,255,255,0.25);
    }

    /* Path badge */
    #pathBadge {
      position: fixed;
      left: 14px;
      bottom: 12px;
      z-index: 40;
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      background: rgba(20,20,22,0.55);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Simple modal preview */
    #preview {
      position: fixed; inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #previewInner {
      width: min(1100px, 92vw);
      height: min(760px, 88vh);
      background: rgba(25,25,28,0.90);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.55);
      display: grid;
      grid-template-rows: 46px 1fr;
    }
    #previewBar {
      display:flex; align-items:center; gap:10px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      font-size: 13px;
    }
    #closeBtn {
      width: 28px; height: 28px;
      border-radius: 8px;
      display:grid; place-items:center;
      cursor: pointer;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
    }
    #closeBtn:hover { background: rgba(255,255,255,0.16); }
    #previewContent { overflow:auto; padding: 12px; }
    #previewContent img { max-width: 100%; height: auto; border-radius: 12px; }
    #previewContent pre {
      white-space: pre-wrap;
      color: rgba(255,255,255,0.88);
      font-size: 12px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div id="wallpaper"></div>

  <div id="menubar">
    <div id="apple" title="Menu"></div>
    <div id="menu-left">
      <div class="menu-item" id="menuAbout">About this Project</div>
      <div class="menu-item" id="menuDesktop"><b>Desktop</b></div>
      <div class="menu-item" id="menuShare">Share Browser-ID</div>
      <div class="menu-item" id="menuUpload">Upload to Local Share</div>
      <div class="menu-item" id="menuSync">Refresh / Sync</div>
      <div class="menu-item" id="menuAblage">Ablage</div>
    </div>
    <div id="menu-right"><span id="clock"></span></div>
  </div>

  <div id="dropdown" aria-hidden="true"></div>

  <div id="desktop"></div>
  <div id="pathBadge">/desktop/</div>

  <div id="preview">
    <div id="previewInner">
      <div id="previewBar">
        <div id="closeBtn">✕</div>
        <div id="previewTitle"></div>
      </div>
      <div id="previewContent"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
